# Mindspace Docker Compose
#
# Start the full Mindspace system:
#   docker compose up --build
#
# 3 services (health-checked, ordered startup):
#   qdrant    — Vector database for brain knowledge storage
#   brain     — Knowledge API (3200) for agent shared memory
#   mindspace — API (3100) + viz (4200) + SQLite
#
# Startup order: qdrant (healthy) → brain (healthy) → mindspace
# Data persists via named volumes (survives container restarts and reboots).

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  brain:
    build:
      context: .
      dockerfile: Dockerfile.brain
    ports:
      - "3200:3200"
    environment:
      - NODE_ENV=production
      - QDRANT_URL=http://qdrant:6333
      - BRAIN_API_KEY=${BRAIN_API_KEY:-changeme}
      - BRAIN_PUBLIC_URL=https://hive.xpollination.earth
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3200/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  mindspace:
    build: .
    ports:
      - "3100:3100"   # Mindspace API
      # Port 4200 now served by Theia IDE service
    volumes:
      - mindspace-data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/mindspace.db
      - BRAIN_API_URL=http://brain:3200
    depends_on:
      brain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3100/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  theia:
    build:
      context: ./mindspace-ide
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    volumes:
      - theia-workspace:/home/theia/workspace
      - mindspace-data:/app/data:ro
    environment:
      - MINDSPACE_API_URL=http://mindspace:3100
      - BRAIN_API_URL=http://brain:3200
      - SHELL=/bin/bash
    depends_on:
      mindspace:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mindspace-data:
    driver: local
  qdrant-data:
    driver: local
  theia-workspace:
    driver: local
