# Mindspace Docker Compose — Test System (fully isolated)
#
# Autonomous test stack on offset ports — shares NO infrastructure with prod.
#   qdrant-test (6334) → brain-test (3201) → mindspace-test (API 3101 + viz 4201)
#
# All data isolated on Hetzner volume under data-test/.
# Health-checked startup order, self-healing on reboot.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d --build
#   npm run start:test
#
# Requires .env with: BRAIN_API_KEY, JWT_SECRET (or uses test defaults)

services:
  qdrant-test:
    image: qdrant/qdrant:latest
    container_name: mindspace-qdrant-test
    ports:
      - "127.0.0.1:6334:6333"
    volumes:
      - /mnt/HC_Volume_105173237/mindspace/data-test/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  brain-test:
    build:
      context: .
      dockerfile: Dockerfile.brain
    container_name: mindspace-brain-test
    ports:
      - "127.0.0.1:3201:3200"
    volumes:
      - /mnt/HC_Volume_105173237/mindspace/data-test/brain:/app/data
    environment:
      - NODE_ENV=test
      - QDRANT_URL=http://qdrant-test:6333
      - BRAIN_API_KEY=${BRAIN_API_KEY:-test-brain-key}
      - BRAIN_PUBLIC_URL=http://localhost:3201
    depends_on:
      qdrant-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3200/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  mindspace-test:
    build: .
    container_name: mindspace-test
    ports:
      - "127.0.0.1:3101:3101"
      - "127.0.0.1:4201:4201"
    volumes:
      - /mnt/HC_Volume_105173237/mindspace/data-test/mindspace:/app/data
      - /home/developer/workspaces/github/PichlerThomas:/workspace:ro
    environment:
      - NODE_ENV=test
      - DATABASE_PATH=/app/data/mindspace.db
      - API_PORT=3101
      - VIZ_PORT=4201
      - XPO_WORKSPACE_PATH=/workspace
      - BRAIN_API_URL=http://brain-test:3200
      - BRAIN_API_KEY=${BRAIN_API_KEY:-test-brain-key}
      - JWT_SECRET=${JWT_SECRET:-xpo-test-jwt-secret-2026}
    depends_on:
      brain-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3101/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
