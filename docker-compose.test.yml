# Mindspace Docker Compose — Test System
#
# Test environment with own API + Viz, shared Brain + Qdrant with prod.
# All learning goes to one brain — no knowledge split.
#
# Port schema (see governance/environments.md for single source of truth):
#   Shared:  brain (3200), brain MCP (3201), qdrant (6333) — from prod
#   Own:     API (3101), Viz (4201)
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d --build
#   npm run start:test
#
# Optional: Add AIO Sandbox for L3 browser verification:
#   docker compose -f docker-compose.test.yml -f docker-compose.sandbox.yml up -d

services:
  mindspace-test:
    build:
      context: /home/developer/workspaces/github/PichlerThomas/xpollination-mindspace-rc
    container_name: mindspace-test
    ports:
      - "127.0.0.1:3101:3101"
      - "127.0.0.1:4201:4201"
    volumes:
      # Live-mount rc worktree (develop→rc) over /app — code changes visible after restart.
      # Rebuild only needed for: new npm dependencies, Dockerfile changes.
      - /home/developer/workspaces/github/PichlerThomas/xpollination-mindspace-rc:/app
      # Preserve node_modules from build (host workspace mount would overwrite them)
      - beta-node-modules:/app/node_modules
      # Data volumes (more specific = overrides workspace's data/)
      - /mnt/HC_Volume_105173237/mindspace/data-test/mindspace:/app/data
      - /mnt/HC_Volume_105173237/mindspace/data-prod:/app/mindspace-data:ro
      - /home/developer/workspaces/github/PichlerThomas:/workspace:ro
    environment:
      - NODE_ENV=test
      - DATABASE_PATH=/app/data/mindspace.db
      - API_PORT=3101
      - VIZ_PORT=4201
      - XPO_WORKSPACE_PATH=/workspace
      - BRAIN_API_URL=http://host.docker.internal:3200
      - JWT_SECRET=${JWT_SECRET:-xpo-test-jwt-secret-2026}
      - FRONTEND_URL=https://beta-mindspace.xpollination.earth
      - BRAIN_PUBLIC_URL=https://hive.xpollination.earth
      # CANONICAL_HIVE_URL — temporarily disabled.
      # The public proxy at beta-mindspace.xpollination.earth/api adds session-cookie
      # auth that blocks A2A device-key flow. When bodies switch to it, they get 401
      # on /a2a/connect (proxy auth, not real revocation). Until the proxy is fixed
      # to bypass auth for /api/a2a/* paths, bodies stay on the bootstrap URL
      # (localhost from req.host). See brain thought on "service discovery blocked
      # by proxy auth" for the full story.
      # - CANONICAL_HIVE_URL=https://beta-mindspace.xpollination.earth/api
      - LIVEKIT_URL=wss://meet.xpollination.earth
      - LIVEKIT_API_KEY=c15ad0a4d81c1507
      - LIVEKIT_API_SECRET=iv9l5sSFnGgZdmlBWF+bE4u/GxOnvjAH0kLFJlzdXIEQ4r/t
      - BRAIN_AGENT_KEY=xpo-agent-dev-33c65662-ccc8-4fd4-9f65-7277ba639cdf
      - SANDBOX_URL=${SANDBOX_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "Promise.all([fetch('http://localhost:3101/health'),fetch('http://localhost:4201/')]).then(rs=>process.exit(rs.every(r=>r.ok)?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - beta-net
    restart: unless-stopped


volumes:
  beta-node-modules:
    # Populated from build image on first run. Delete to refresh: docker volume rm beta-node-modules

networks:
  beta-net:
    driver: bridge
