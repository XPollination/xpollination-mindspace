# Mindspace Docker Compose — Test System
#
# Test environment with own API + Viz, shared Brain + Qdrant with prod.
# All learning goes to one brain — no knowledge split.
#
# Port schema (see governance/environments.md for single source of truth):
#   Shared:  brain (3200), brain MCP (3201), qdrant (6333) — from prod
#   Own:     API (3101), Viz (4201)
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d --build
#   npm run start:test
#
# AIO Sandbox: browser + MCP for agent L3 visual verification.
# Agents call sandbox MCP tools to navigate, screenshot, click.
# Sandbox browser reaches mindspace-test via Docker DNS on beta-net.

services:
  mindspace-test:
    build:
      context: /home/developer/workspaces/github/PichlerThomas/xpollination-mindspace-rc
    container_name: mindspace-test
    ports:
      - "127.0.0.1:3101:3101"
      - "127.0.0.1:4201:4201"
    volumes:
      - /mnt/HC_Volume_105173237/mindspace/data-test/mindspace:/app/data
      - /mnt/HC_Volume_105173237/mindspace/data-prod:/app/mindspace-data:ro
      - /home/developer/workspaces/github/PichlerThomas:/workspace:ro
    environment:
      - NODE_ENV=test
      - DATABASE_PATH=/app/data/mindspace.db
      - API_PORT=3101
      - VIZ_PORT=4201
      - XPO_WORKSPACE_PATH=/workspace
      - BRAIN_API_URL=http://host.docker.internal:3200
      - JWT_SECRET=${JWT_SECRET:-xpo-test-jwt-secret-2026}
      - FRONTEND_URL=https://beta-mindspace.xpollination.earth
      - BRAIN_PUBLIC_URL=https://hive.xpollination.earth
      - LIVEKIT_URL=wss://meet.xpollination.earth
      - LIVEKIT_API_KEY=c15ad0a4d81c1507
      - LIVEKIT_API_SECRET=iv9l5sSFnGgZdmlBWF+bE4u/GxOnvjAH0kLFJlzdXIEQ4r/t
      - BRAIN_AGENT_KEY=xpo-agent-dev-33c65662-ccc8-4fd4-9f65-7277ba639cdf
      - SANDBOX_URL=http://aio-sandbox:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "Promise.all([fetch('http://localhost:3101/health'),fetch('http://localhost:4201/')]).then(rs=>process.exit(rs.every(r=>r.ok)?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - beta-net
    restart: unless-stopped

  aio-sandbox:
    image: ghcr.io/agent-infra/sandbox:latest
    container_name: mindspace-sandbox
    security_opt:
      - seccomp:unconfined
    shm_size: "2gb"
    mem_limit: "2g"
    cpus: "1.0"
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - TZ=Europe/Vienna
      - DISABLE_JUPYTER=true
      - DISABLE_CODE_SERVER=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - beta-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/sandbox || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped


networks:
  beta-net:
    driver: bridge
