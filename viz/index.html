<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindspace Flow Visualization</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      overflow: hidden;
    }

    .header {
      background: #16213e;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #0f3460;
    }

    .project-dropdown {
      background: #16213e;
      color: #e94560;
      border: 1px solid #e94560;
      padding: 6px 12px;
      font-size: 16px;
      font-weight: 500;
      border-radius: 4px;
      cursor: pointer;
      outline: none;
    }

    .project-dropdown:hover {
      background: #1a2744;
    }

    .project-dropdown:focus {
      box-shadow: 0 0 0 2px rgba(233, 69, 96, 0.3);
    }

    .header-subtitle {
      color: #888;
      font-size: 14px;
      margin-left: 8px;
    }

    .search-container {
      flex: 1;
      max-width: 300px;
      margin: 0 20px;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 6px 12px;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      color: #eee;
      font-size: 13px;
      border-radius: 4px;
      outline: none;
    }

    .search-input:focus {
      border-color: #e94560;
    }

    .search-input::placeholder {
      color: #666;
    }

    .search-count {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
      font-size: 11px;
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #888;
      font-size: 12px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    .live-dot.error {
      background: #ef4444;
      animation: none;
    }

    .live-dot.flash {
      background: #60a5fa;
      transform: scale(1.5);
      transition: all 0.2s;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .package.updated {
      animation: nodeFlash 0.5s ease-out;
    }

    @keyframes nodeFlash {
      0% { filter: brightness(1.5); }
      100% { filter: brightness(1); }
    }

    .header-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .header-controls button {
      background: #0f3460;
      border: 1px solid #e94560;
      color: #e94560;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .header-controls button:hover {
      background: #e94560;
      color: #fff;
    }

    .zoom-controls {
      display: flex;
      gap: 5px;
    }

    .zoom-controls button {
      width: 30px;
      padding: 6px;
    }

    .main-container {
      display: flex;
      height: calc(100vh - 50px);
    }

    .viz-container {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #warehouse-svg {
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    #warehouse-svg:active {
      cursor: grabbing;
    }

    /* Station styles */
    .station-box {
      fill: #16213e;
      stroke: #0f3460;
      stroke-width: 2;
    }

    .station-box.has-agent {
      stroke: #22c55e;
      stroke-width: 3;
    }

    .station-label {
      fill: #888;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .station-role {
      fill: #e94560;
      font-size: 14px;
      font-weight: 600;
    }

    .agent-badge {
      fill: #22c55e;
      font-size: 10px;
    }

    .station-status {
      fill: #888;
      font-size: 10px;
    }

    /* Area styles */
    .area-box {
      fill: #0f1729;
      stroke: #0f3460;
      stroke-width: 1;
    }

    .area-label {
      fill: #666;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    /* Package styles */
    .package {
      cursor: pointer;
      transition: transform 0.2s;
    }

    .package:hover .package-box {
      stroke-width: 3;
      filter: brightness(1.2);
    }

    .package.selected .package-box {
      stroke: #e94560;
      stroke-width: 3;
      filter: drop-shadow(0 0 12px rgba(233, 69, 96, 0.5));
    }

    .package-box {
      stroke-width: 2;
      rx: 4;
      ry: 4;
    }

    /* Status-based colors */
    .package-box.status-pending {
      fill: #6b7280;
      stroke: #9ca3af;
    }

    .package-box.status-ready {
      fill: #3b82f6;
      stroke: #60a5fa;
    }

    .package-box.status-active {
      fill: #22c55e;
      stroke: #4ade80;
    }

    .package-box.status-done,
    .package-box.status-completed {
      fill: #14b8a6;
      stroke: #2dd4bf;
    }

    .package-label {
      fill: #fff;
      font-size: 9px;
      font-weight: 500;
      pointer-events: none;
    }

    .package-type {
      fill: rgba(255,255,255,0.6);
      font-size: 8px;
      pointer-events: none;
    }

    /* Detail panel */
    .detail-panel {
      width: 350px;
      background: #16213e;
      border-left: 1px solid #0f3460;
      padding: 20px;
      overflow-y: auto;
      display: none;
    }

    .detail-panel.visible {
      display: block;
    }

    .detail-panel h2 {
      font-size: 16px;
      color: #e94560;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid #0f3460;
    }

    .detail-panel .close-btn {
      float: right;
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 18px;
    }

    .detail-panel .close-btn:hover {
      color: #e94560;
    }

    .detail-field {
      margin-bottom: 12px;
    }

    .detail-field label {
      display: block;
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .detail-field .value {
      font-size: 14px;
      color: #eee;
    }

    .detail-field .description {
      font-size: 13px;
      color: #ccc;
      line-height: 1.5;
    }

    .detail-field .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }

    .badge.type-requirement { background: #3b82f6; }
    .badge.type-design { background: #22c55e; }
    .badge.type-task { background: #eab308; color: #000; }
    .badge.type-test { background: #a855f7; }

    .badge.status-pending { background: #6b7280; }
    .badge.status-ready { background: #3b82f6; }
    .badge.status-active { background: #22c55e; }
    .badge.status-done { background: #14b8a6; }
    .badge.status-completed { background: #14b8a6; }

    .detail-field .criteria-list {
      list-style: none;
      margin-top: 8px;
    }

    .detail-field .criteria-list li {
      padding: 4px 0;
      font-size: 12px;
      color: #ccc;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .detail-field .criteria-list li::before {
      content: 'o';
      color: #e94560;
      flex-shrink: 0;
    }

    .detail-field .node-links {
      list-style: none;
      margin-top: 4px;
    }

    .detail-field .node-links li {
      padding: 4px 0;
      font-size: 13px;
      color: #ccc;
    }

    .detail-field .node-links li.clickable {
      cursor: pointer;
      color: #60a5fa;
    }

    .detail-field .node-links li.clickable:hover {
      color: #e94560;
      text-decoration: underline;
    }

    .detail-field .node-links li.parent::before {
      content: '^ ';
      color: #e94560;
    }

    .detail-field .node-links li.child::before {
      content: 'v ';
      color: #22c55e;
    }

    .dual-links {
      font-size: 12px;
      margin-top: 4px;
    }

    .dual-link {
      padding: 2px 0;
      font-family: monospace;
      word-break: break-all;
    }

    .dual-link.git-link {
      color: #60a5fa;
      text-decoration: none;
    }

    .dual-link.git-link:hover {
      text-decoration: underline;
    }

    .dual-link.workspace-link {
      color: #888;
      font-size: 11px;
    }

    /* Legend */
    .legend {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(22, 33, 62, 0.95);
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #0f3460;
    }

    .legend h3 {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 3px;
    }

    .legend-color.pending { background: #6b7280; }
    .legend-color.ready { background: #3b82f6; }
    .legend-color.active { background: #22c55e; }
    .legend-color.done { background: #14b8a6; }

    /* Stats bar */
    .stats-bar {
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="header">
    <select id="project-selector" class="project-dropdown">
      <option value="">Loading...</option>
    </select>
    <span class="header-subtitle">Warehouse</span>
    <div class="search-container">
      <input type="text" id="node-search" class="search-input" placeholder="Search nodes...">
      <span id="search-count" class="search-count"></span>
    </div>
    <div class="header-controls">
      <span id="live-indicator" class="live-indicator">
        <span id="live-dot" class="live-dot"></span>
        <span>Live</span>
      </span>
      <span class="stats-bar" id="stats">Loading...</span>
      <div class="zoom-controls">
        <button id="zoom-in" title="Zoom In">+</button>
        <button id="zoom-out" title="Zoom Out">-</button>
        <button id="zoom-reset" title="Reset Zoom">R</button>
      </div>
      <button id="refresh-btn">Refresh</button>
    </div>
  </div>

  <div class="main-container">
    <div class="viz-container">
      <svg id="warehouse-svg">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#e94560"/>
          </marker>
        </defs>
        <g id="main-group">
          <g id="areas-layer"></g>
          <g id="stations-layer"></g>
          <g id="packages-layer"></g>
        </g>
      </svg>

      <div class="legend">
        <h3>Object Status</h3>
        <div class="legend-item"><div class="legend-color pending"></div> Pending</div>
        <div class="legend-item"><div class="legend-color ready"></div> Ready</div>
        <div class="legend-item"><div class="legend-color active"></div> Active</div>
        <div class="legend-item"><div class="legend-color done"></div> Done</div>
      </div>
    </div>

    <div class="detail-panel" id="detail-panel">
      <button class="close-btn" id="close-detail">x</button>
      <h2>Object Details</h2>
      <div id="detail-content"></div>
    </div>
  </div>

  <script>
    // Configuration
    const CONFIG = {
      stationWidth: 160,
      stationHeight: 180,
      stationGap: 30,
      packageWidth: 130,
      packageHeight: 40,
      packageGap: 8,
      queuePackageWidth: 100,
      queuePackageHeight: 35,
      initialViewBox: { x: -20, y: -20, width: 1000, height: 700 }
    };

    // Layout areas
    const LAYOUT = {
      stationsY: 20,
      queueY: 250,
      queueHeight: 150,
      completedY: 430,
      completedHeight: 220
    };

    // State
    let nodes = [];
    let stations = [];
    let currentViewBox = { ...CONFIG.initialViewBox };
    let isPanning = false;
    let panStart = { x: 0, y: 0 };
    let selectedNodeId = null;
    let searchQuery = '';
    let searchDebounceTimer = null;
    let lastDataHash = null;
    let pollInterval = null;
    const POLL_INTERVAL_MS = 5000;

    // DOM elements
    const svg = document.getElementById('warehouse-svg');
    const mainGroup = document.getElementById('main-group');
    const areasLayer = document.getElementById('areas-layer');
    const stationsLayer = document.getElementById('stations-layer');
    const packagesLayer = document.getElementById('packages-layer');
    const detailPanel = document.getElementById('detail-panel');
    const detailContent = document.getElementById('detail-content');
    const statsEl = document.getElementById('stats');
    const projectSelector = document.getElementById('project-selector');
    const searchInput = document.getElementById('node-search');
    const searchCountEl = document.getElementById('search-count');
    const liveDot = document.getElementById('live-dot');

    let currentProject = null;

    // Initialize viewBox
    updateViewBox();

    // Load projects list
    async function loadProjects() {
      try {
        const response = await fetch('/api/projects');
        const data = await response.json();

        projectSelector.innerHTML = '';
        data.projects.forEach(project => {
          const option = document.createElement('option');
          option.value = project.name;
          option.textContent = project.name;
          if (project.name === data.current) {
            option.selected = true;
            currentProject = project.name;
          }
          projectSelector.appendChild(option);
        });

        // Load data for current project
        await loadData();
      } catch (error) {
        console.error('Failed to load projects:', error);
        // Fallback to static data.json
        projectSelector.innerHTML = '<option>Local</option>';
        await loadDataStatic();
      }
    }

    // Load data from API
    async function loadData() {
      try {
        const projectParam = currentProject ? `?project=${currentProject}` : '';
        const response = await fetch('/api/data' + projectParam);
        const data = await response.json();
        nodes = data.nodes || [];
        stations = data.stations || [];
        renderVisualization();
        updateStats(data);
      } catch (error) {
        console.error('Failed to load data from API:', error);
        await loadDataStatic();
      }
    }

    // Fallback: load static data.json
    async function loadDataStatic() {
      try {
        const response = await fetch('data.json?' + Date.now());
        const data = await response.json();
        nodes = data.nodes || [];
        stations = data.stations || [];
        renderVisualization();
        updateStats(data);
      } catch (error) {
        console.error('Failed to load data:', error);
        statsEl.textContent = 'Error loading data';
      }
    }

    // Auto-refresh polling
    function computeDataHash(data) {
      return JSON.stringify(data).length + '-' + (data.node_count || 0) + '-' + (data.stations?.length || 0);
    }

    function findChangedNodeIds(oldNodes, newNodes) {
      const changed = [];
      for (const newNode of newNodes) {
        const oldNode = oldNodes.find(o => o.id === newNode.id);
        if (!oldNode || JSON.stringify(oldNode) !== JSON.stringify(newNode)) {
          changed.push(newNode.id);
        }
      }
      return changed;
    }

    function flashNodes(nodeIds) {
      nodeIds.forEach(id => {
        const el = document.querySelector(`.package[data-id="${id}"]`);
        if (el) {
          el.classList.add('updated');
          setTimeout(() => el.classList.remove('updated'), 500);
        }
      });
    }

    async function pollData() {
      try {
        const projectParam = currentProject ? `?project=${currentProject}` : '';
        const response = await fetch('/api/data' + projectParam);
        const data = await response.json();

        const newHash = computeDataHash(data);
        if (newHash !== lastDataHash) {
          const oldNodes = [...nodes];
          nodes = data.nodes || [];
          stations = data.stations || [];

          // Find changed nodes before re-render
          const changedIds = findChangedNodeIds(oldNodes, nodes);

          renderVisualization();
          updateStats(data);
          lastDataHash = newHash;

          // Flash indicator and changed nodes
          liveDot.classList.add('flash');
          setTimeout(() => liveDot.classList.remove('flash'), 300);
          if (changedIds.length > 0) {
            setTimeout(() => flashNodes(changedIds), 100);
          }
        }

        liveDot.classList.remove('error');
      } catch (error) {
        console.error('Poll failed:', error);
        liveDot.classList.add('error');
      }
    }

    function startPolling() {
      if (pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(pollData, POLL_INTERVAL_MS);
    }

    function stopPolling() {
      if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
      }
    }

    // Pause polling when tab hidden
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        stopPolling();
      } else {
        pollData(); // Immediate refresh when returning
        startPolling();
      }
    });

    function updateStats(data) {
      statsEl.textContent = `Q:${data.queue_count || 0} A:${data.active_count || 0} C:${data.completed_count || 0} | ${data.node_count} objects`;
    }

    // Search functionality
    function matchesSearch(node, query) {
      if (!query) return true;
      const lowerQuery = query.toLowerCase();
      // Search in slug
      if (node.slug.toLowerCase().includes(lowerQuery)) return true;
      // Search in all DNA fields
      const dna = node.dna || {};
      const searchableText = JSON.stringify(dna).toLowerCase();
      return searchableText.includes(lowerQuery);
    }

    function getFilteredNodes() {
      if (!searchQuery) return nodes;
      return nodes.filter(n => matchesSearch(n, searchQuery));
    }

    function updateSearchCount() {
      if (!searchQuery) {
        searchCountEl.textContent = '';
      } else {
        const filtered = getFilteredNodes();
        searchCountEl.textContent = `${filtered.length}/${nodes.length}`;
      }
    }

    function renderVisualization() {
      areasLayer.innerHTML = '';
      stationsLayer.innerHTML = '';
      packagesLayer.innerHTML = '';
      updateSearchCount();

      renderAreas();
      renderStations();
      renderQueue();
      renderCompleted();
    }

    function renderAreas() {
      const totalWidth = stations.length * (CONFIG.stationWidth + CONFIG.stationGap);

      // Queue area
      const queueRect = createSVGElement('rect', {
        class: 'area-box',
        x: 0, y: LAYOUT.queueY,
        width: totalWidth, height: LAYOUT.queueHeight,
        rx: 8
      });
      areasLayer.appendChild(queueRect);

      const queueLabel = createSVGElement('text', {
        class: 'area-label',
        x: 10, y: LAYOUT.queueY + 20
      });
      queueLabel.textContent = 'QUEUE (pending)';
      areasLayer.appendChild(queueLabel);

      // Completed area
      const completedRect = createSVGElement('rect', {
        class: 'area-box',
        x: 0, y: LAYOUT.completedY,
        width: totalWidth, height: LAYOUT.completedHeight,
        rx: 8
      });
      areasLayer.appendChild(completedRect);

      const completedLabel = createSVGElement('text', {
        class: 'area-label',
        x: 10, y: LAYOUT.completedY + 20
      });
      completedLabel.textContent = 'COMPLETED';
      areasLayer.appendChild(completedLabel);
    }

    function renderStations() {
      stations.forEach((station, index) => {
        const x = index * (CONFIG.stationWidth + CONFIG.stationGap);
        const y = LAYOUT.stationsY;

        // Station box
        const hasAgent = station.agent_id !== null;
        const rect = createSVGElement('rect', {
          class: 'station-box' + (hasAgent ? ' has-agent' : ''),
          x: x, y: y,
          width: CONFIG.stationWidth, height: CONFIG.stationHeight,
          rx: 8
        });
        stationsLayer.appendChild(rect);

        // Station role label
        const roleLabel = createSVGElement('text', {
          class: 'station-role',
          x: x + CONFIG.stationWidth / 2,
          y: y + 25,
          'text-anchor': 'middle'
        });
        roleLabel.textContent = station.name.replace(' Station', '').toUpperCase();
        stationsLayer.appendChild(roleLabel);

        // Agent badge if logged on
        if (station.agent_id) {
          const agentBadge = createSVGElement('text', {
            class: 'agent-badge',
            x: x + CONFIG.stationWidth / 2,
            y: y + 42,
            'text-anchor': 'middle'
          });
          agentBadge.textContent = '[' + station.agent_id + ']';
          stationsLayer.appendChild(agentBadge);
        }

        // Status label
        const statusLabel = createSVGElement('text', {
          class: 'station-status',
          x: x + CONFIG.stationWidth / 2,
          y: y + CONFIG.stationHeight - 10,
          'text-anchor': 'middle'
        });
        statusLabel.textContent = station.status;
        stationsLayer.appendChild(statusLabel);

        // Current object if loaded
        if (station.current_object_id) {
          const currentNode = nodes.find(n => n.id === station.current_object_id);
          if (currentNode && matchesSearch(currentNode, searchQuery)) {
            renderPackageInStation(currentNode, x, y);
          }
        }
      });
    }

    function renderPackageInStation(node, stationX, stationY) {
      const x = stationX + (CONFIG.stationWidth - CONFIG.packageWidth) / 2;
      const y = stationY + 55;

      const g = createSVGElement('g', { class: 'package', 'data-id': node.id });
      g.onclick = () => showDetail(node);

      const rect = createSVGElement('rect', {
        class: 'package-box status-' + node.status,
        x: x, y: y,
        width: CONFIG.packageWidth, height: CONFIG.packageHeight
      });
      g.appendChild(rect);

      const title = node.dna?.title || node.slug;
      const label = createSVGElement('text', {
        class: 'package-label',
        x: x + CONFIG.packageWidth / 2,
        y: y + CONFIG.packageHeight / 2 + 3,
        'text-anchor': 'middle'
      });
      label.textContent = truncate(title, 16);
      g.appendChild(label);

      packagesLayer.appendChild(g);
    }

    function renderQueue() {
      // Get IDs of nodes assigned to stations
      const assignedIds = stations.map(s => s.current_object_id).filter(Boolean);
      // Queue shows pending/ready nodes that are NOT assigned to a station AND match search
      const queuedNodes = nodes.filter(n =>
        (n.status === 'pending' || n.status === 'ready') &&
        !assignedIds.includes(n.id) &&
        matchesSearch(n, searchQuery)
      );
      const startY = LAYOUT.queueY + 40;
      const startX = 15;

      queuedNodes.forEach((node, index) => {
        const col = index % 8;
        const row = Math.floor(index / 8);
        const x = startX + col * (CONFIG.queuePackageWidth + 10);
        const y = startY + row * (CONFIG.queuePackageHeight + 8);

        const g = createSVGElement('g', { class: 'package', 'data-id': node.id });
        g.onclick = () => showDetail(node);

        const rect = createSVGElement('rect', {
          class: 'package-box status-' + node.status,
          x: x, y: y,
          width: CONFIG.queuePackageWidth, height: CONFIG.queuePackageHeight
        });
        g.appendChild(rect);

        const typeLabel = createSVGElement('text', {
          class: 'package-type',
          x: x + 5, y: y + 12
        });
        typeLabel.textContent = node.type.substring(0, 3).toUpperCase();
        g.appendChild(typeLabel);

        const title = node.dna?.title || node.slug;
        const label = createSVGElement('text', {
          class: 'package-label',
          x: x + CONFIG.queuePackageWidth / 2,
          y: y + CONFIG.queuePackageHeight / 2 + 6,
          'text-anchor': 'middle'
        });
        label.textContent = truncate(title, 12);
        g.appendChild(label);

        packagesLayer.appendChild(g);
      });
    }

    function renderCompleted() {
      // Get IDs of nodes assigned to stations
      const assignedIds = stations.map(s => s.current_object_id).filter(Boolean);
      // Completed shows done/completed nodes that are NOT assigned to a station AND match search
      const completedNodes = nodes.filter(n =>
        (n.status === 'completed' || n.status === 'done') &&
        !assignedIds.includes(n.id) &&
        matchesSearch(n, searchQuery)
      );
      const startY = LAYOUT.completedY + 40;
      const startX = 15;

      completedNodes.forEach((node, index) => {
        const col = index % 8;
        const row = Math.floor(index / 8);
        const x = startX + col * (CONFIG.queuePackageWidth + 10);
        const y = startY + row * (CONFIG.queuePackageHeight + 8);

        const g = createSVGElement('g', { class: 'package', 'data-id': node.id });
        g.onclick = () => showDetail(node);

        const rect = createSVGElement('rect', {
          class: 'package-box status-' + node.status,
          x: x, y: y,
          width: CONFIG.queuePackageWidth, height: CONFIG.queuePackageHeight
        });
        g.appendChild(rect);

        const typeLabel = createSVGElement('text', {
          class: 'package-type',
          x: x + 5, y: y + 12
        });
        typeLabel.textContent = node.type.substring(0, 3).toUpperCase();
        g.appendChild(typeLabel);

        const title = node.dna?.title || node.slug;
        const label = createSVGElement('text', {
          class: 'package-label',
          x: x + CONFIG.queuePackageWidth / 2,
          y: y + CONFIG.queuePackageHeight / 2 + 6,
          'text-anchor': 'middle'
        });
        label.textContent = truncate(title, 12);
        g.appendChild(label);

        packagesLayer.appendChild(g);
      });
    }

    function createSVGElement(tag, attrs) {
      const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
      for (const [key, value] of Object.entries(attrs)) {
        el.setAttribute(key, value);
      }
      return el;
    }

    function showDetail(node, doScroll = false) {
      selectNode(node.id);
      if (doScroll) scrollToNode(node.id);
      detailPanel.classList.add('visible');

      const parentNodes = (node.parent_ids || []).map(pid =>
        nodes.find(n => n.id === pid)
      ).filter(Boolean);

      const childNodes = nodes.filter(n =>
        n.parent_ids && n.parent_ids.includes(node.id)
      );

      const dna = node.dna || {};
      const acceptanceCriteria = dna.acceptance_criteria || [];

      detailContent.innerHTML = `
        <div class="detail-field">
          <label>Title</label>
          <div class="value">${dna.title || node.slug}</div>
        </div>
        <div class="detail-field">
          <label>Slug</label>
          <div class="value" style="font-family: monospace; font-size: 12px; color: #888;">${node.slug}</div>
        </div>
        <div class="detail-field">
          <label>Type</label>
          <div class="value"><span class="badge type-${node.type}">${node.type}</span></div>
        </div>
        <div class="detail-field">
          <label>Status</label>
          <div class="value"><span class="badge status-${node.status}">${node.status}</span></div>
        </div>
        ${dna.description ? `
        <div class="detail-field">
          <label>Description</label>
          <div class="description">${dna.description}</div>
        </div>
        ` : ''}
        ${acceptanceCriteria.length > 0 ? `
        <div class="detail-field">
          <label>Acceptance Criteria</label>
          <ul class="criteria-list">
            ${acceptanceCriteria.map(c => `<li>${c}</li>`).join('')}
          </ul>
        </div>
        ` : ''}
        <div class="detail-field">
          <label>Parents (${parentNodes.length})</label>
          ${parentNodes.length > 0
            ? `<ul class="node-links">${parentNodes.map(p =>
                `<li class="parent clickable" data-id="${p.id}">${p.dna?.title || p.slug}</li>`
              ).join('')}</ul>`
            : '<div class="value" style="color: #666;">None (root)</div>'}
        </div>
        <div class="detail-field">
          <label>Children (${childNodes.length})</label>
          ${childNodes.length > 0
            ? `<ul class="node-links">${childNodes.map(c =>
                `<li class="child clickable" data-id="${c.id}">${c.dna?.title || c.slug}</li>`
              ).join('')}</ul>`
            : '<div class="value" style="color: #666;">None (leaf)</div>'}
        </div>
        ${dna.pdsa_ref || node.type === 'design' ? `
        <div class="detail-field">
          <label>Dual Links</label>
          <div class="dual-links">
            ${dna.pdsa_ref ? `
              <div><a href="${dna.pdsa_ref.git || '#'}" target="_blank" class="dual-link git-link">Git: ${(dna.pdsa_ref.git || '').split('/').pop() || 'View on GitHub'}</a></div>
              <div class="dual-link workspace-link">WS: ${dna.pdsa_ref.workspace || 'N/A'}</div>
            ` : `
              <div><a href="https://github.com/PichlerThomas/xpollination-mcp-server/blob/main/docs/pdsa/" target="_blank" class="dual-link git-link">Git: docs/pdsa/</a></div>
              <div class="dual-link workspace-link">WS: /home/developer/workspaces/.../docs/pdsa/</div>
            `}
          </div>
        </div>
        ` : ''}
        <div class="detail-field">
          <label>ID</label>
          <div class="value" style="font-family: monospace; font-size: 10px; color: #666;">${node.id}</div>
        </div>
      `;

      detailContent.querySelectorAll('.clickable').forEach(el => {
        el.onclick = () => {
          const targetNode = nodes.find(n => n.id === el.dataset.id);
          if (targetNode) showDetail(targetNode, false); // auto-scroll disabled per Thomas
        };
      });
    }

    function hideDetail() {
      detailPanel.classList.remove('visible');
    }

    function selectNode(nodeId) {
      // Remove previous selection
      document.querySelectorAll('.package.selected').forEach(el =>
        el.classList.remove('selected')
      );

      // Add new selection
      selectedNodeId = nodeId;
      const el = document.querySelector(`.package[data-id="${nodeId}"]`);
      if (el) el.classList.add('selected');
    }

    function scrollToNode(nodeId) {
      const el = document.querySelector(`.package[data-id="${nodeId}"]`);
      if (!el) return;

      const rect = el.querySelector('.package-box');
      if (!rect) return;

      const x = parseFloat(rect.getAttribute('x'));
      const y = parseFloat(rect.getAttribute('y'));
      const width = parseFloat(rect.getAttribute('width'));
      const height = parseFloat(rect.getAttribute('height'));

      // Center the viewBox on this node
      currentViewBox.x = x + width / 2 - currentViewBox.width / 2;
      currentViewBox.y = y + height / 2 - currentViewBox.height / 2;
      updateViewBox();
    }

    // Zoom functions
    function updateViewBox() {
      svg.setAttribute('viewBox', `${currentViewBox.x} ${currentViewBox.y} ${currentViewBox.width} ${currentViewBox.height}`);
    }

    function zoom(factor) {
      const centerX = currentViewBox.x + currentViewBox.width / 2;
      const centerY = currentViewBox.y + currentViewBox.height / 2;
      currentViewBox.width *= factor;
      currentViewBox.height *= factor;
      currentViewBox.x = centerX - currentViewBox.width / 2;
      currentViewBox.y = centerY - currentViewBox.height / 2;
      updateViewBox();
    }

    function resetZoom() {
      currentViewBox = { ...CONFIG.initialViewBox };
      updateViewBox();
    }

    // Pan functions
    svg.addEventListener('mousedown', (e) => {
      if (e.target === svg || e.target.classList.contains('area-box') || e.target.classList.contains('station-box')) {
        isPanning = true;
        panStart = { x: e.clientX, y: e.clientY };
      }
    });

    svg.addEventListener('mousemove', (e) => {
      if (isPanning) {
        const dx = (e.clientX - panStart.x) * (currentViewBox.width / svg.clientWidth);
        const dy = (e.clientY - panStart.y) * (currentViewBox.height / svg.clientHeight);
        currentViewBox.x -= dx;
        currentViewBox.y -= dy;
        panStart = { x: e.clientX, y: e.clientY };
        updateViewBox();
      }
    });

    svg.addEventListener('mouseup', () => { isPanning = false; });
    svg.addEventListener('mouseleave', () => { isPanning = false; });

    svg.addEventListener('wheel', (e) => {
      e.preventDefault();
      const factor = e.deltaY > 0 ? 1.1 : 0.9;
      zoom(factor);
    });

    // Utility functions
    function truncate(str, len) {
      return str.length > len ? str.substring(0, len - 1) + '..' : str;
    }

    // Event listeners
    document.getElementById('zoom-in').onclick = () => zoom(0.8);
    document.getElementById('zoom-out').onclick = () => zoom(1.25);
    document.getElementById('zoom-reset').onclick = resetZoom;
    document.getElementById('refresh-btn').onclick = loadData;
    document.getElementById('close-detail').onclick = hideDetail;

    // Search handler with debounce
    searchInput.oninput = (e) => {
      clearTimeout(searchDebounceTimer);
      searchDebounceTimer = setTimeout(() => {
        searchQuery = e.target.value.trim();
        renderVisualization();
        updateSearchCount();
      }, 150);
    };

    // Project change handler
    projectSelector.onchange = async (e) => {
      currentProject = e.target.value;
      hideDetail();
      selectedNodeId = null;
      searchQuery = '';
      searchInput.value = '';
      await loadData();
    };

    // Initial load and start polling
    loadProjects().then(() => {
      lastDataHash = computeDataHash({ nodes, stations, node_count: nodes.length });
      startPolling();
    });
  </script>
</body>
</html>
