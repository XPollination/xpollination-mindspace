<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — XPollination Mindspace</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #fafafa; color: #222; max-width: 600px; margin: 0 auto; padding: 2rem; }
    h1 { color: #222; border-bottom: 2px solid #e0e0e0; padding-bottom: 0.5rem; }
    h2 { color: #444; margin-top: 2rem; }
    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.3rem; font-weight: 500; color: #333; }
    input[type="password"], input[type="text"] { width: 100%; padding: 0.5rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    button { padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    .btn-primary { background: #3070c0; color: #fff; }
    .btn-danger { background: #d32f2f; color: #fff; }
    .btn-secondary { background: #666; color: #fff; }
    .message { padding: 0.5rem; border-radius: 4px; margin-bottom: 1rem; display: none; }
    .success { background: #e8f5e9; color: #2e7d32; }
    .error { background: #ffebee; color: #c62828; }
    .api-key-display { font-family: monospace; background: #f5f5f5; padding: 0.5rem; border-radius: 4px; word-break: break-all; }
    .nav { margin-bottom: 2rem; }
    .nav a { color: #3070c0; text-decoration: none; margin-right: 1rem; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/">Dashboard</a>
    <a href="/logout">Logout</a>
  </div>

  <h1>Settings</h1>

  <!-- Change Password -->
  <div class="card">
    <h2>Change Password</h2>
    <div class="message" id="pw-msg"></div>
    <form id="change-password-form">
      <label for="current-password">Current Password</label>
      <input type="password" id="current-password" name="current_password" required>
      <label for="new-password">New Password</label>
      <input type="password" id="new-password" name="new_password" required>
      <label for="confirm-password">Confirm New Password</label>
      <input type="password" id="confirm-password" required>
      <button type="submit" class="btn-primary">Change Password</button>
    </form>
  </div>

  <!-- My Projects -->
  <div class="card">
    <h2>My Projects</h2>
    <div id="projects-list">Loading...</div>
    <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid #eee;">
      <label for="git-url">Add Project via Git URL</label>
      <div style="display:flex;gap:0.5rem;">
        <input type="text" id="git-url" placeholder="https://github.com/org/repo.git" style="flex:1;">
        <button class="btn-primary" onclick="addProject()">Add</button>
      </div>
      <div class="message" id="project-msg"></div>
    </div>
  </div>

  <!-- API Key -->
  <div class="card">
    <h2>API Key</h2>
    <p>Use this key to authenticate CLI tools and agents.</p>
    <div class="api-key-display" id="api-key-value">••••••••••••</div>
    <br>
    <button class="btn-secondary" onclick="revealApiKey()">Show API Key</button>
    <button class="btn-danger" onclick="regenerateApiKey()">Regenerate API Key</button>
  </div>

  <!-- Active Sessions -->
  <div class="card">
    <h2>Active Sessions</h2>
    <div id="sessions-list">Loading...</div>
  </div>

  <!-- Account -->
  <div class="card">
    <h2>Account</h2>
    <p>Signed in as <strong id="user-email">...</strong></p>
    <a href="/logout" class="btn-danger" style="text-decoration:none;display:inline-block;">Logout</a>
  </div>

  <script>
    document.getElementById('change-password-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const current = document.getElementById('current-password').value;
      const newPw = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      const msg = document.getElementById('pw-msg');
      if (newPw !== confirm) { msg.textContent = 'Passwords do not match'; msg.className = 'message error'; msg.style.display = 'block'; return; }
      try {
        const res = await fetch('/api/auth/change-password', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({current_password: current, new_password: newPw}) });
        const data = await res.json();
        if (res.ok) { msg.textContent = 'Password changed'; msg.className = 'message success'; } else { msg.textContent = data.error; msg.className = 'message error'; }
        msg.style.display = 'block';
      } catch { msg.textContent = 'Network error'; msg.className = 'message error'; msg.style.display = 'block'; }
    });
    let lastGeneratedKey = null;

    async function revealApiKey() {
      const el = document.getElementById('api-key-value');
      if (lastGeneratedKey) {
        el.textContent = lastGeneratedKey;
        return;
      }
      try {
        const res = await fetch('/api/keys');
        const keys = await res.json();
        if (Array.isArray(keys) && keys.length > 0) {
          const k = keys[0];
          el.innerHTML = '<strong>' + (k.name || 'API Key') + '</strong><br><span style="color:#888;font-size:0.85rem;">Key value is not retrievable after creation. Click Regenerate to create a new key that will be shown once.</span>';
        } else {
          el.textContent = 'No API key found. Click Regenerate to create one.';
        }
      } catch { el.textContent = 'Failed to load API key info'; }
    }

    async function regenerateApiKey() {
      if (!confirm('Regenerate API key? Your current key will stop working immediately.')) return;
      const el = document.getElementById('api-key-value');
      el.textContent = 'Generating...';
      try {
        const res = await fetch('/api/keys', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name: 'Agent Key'}) });
        const data = await res.json();
        if (data.key) {
          lastGeneratedKey = data.key;
          el.innerHTML = '<strong style="color:#2e7d32;">NEW KEY (copy now):</strong><br>' + data.key + '<br><span style="color:#c62828;font-size:0.85rem;">This key will not be shown again after you leave this page.</span>';
        } else {
          el.textContent = data.error || 'Failed to generate key';
        }
      } catch { el.textContent = 'Network error'; }
    }

    // Load sessions on page load
    async function loadSessions() {
      try {
        const res = await fetch('/api/auth/sessions');
        const data = await res.json();
        const el = document.getElementById('sessions-list');
        if (data.sessions && data.sessions.length > 0) {
          el.innerHTML = data.sessions.map(s =>
            '<div style="padding:0.3rem 0;border-bottom:1px solid #eee;font-size:0.85rem;">' +
            '<strong>' + (s.user_agent || 'unknown') + '</strong> — ' +
            s.ip_address + ' — ' +
            new Date(s.created_at).toLocaleDateString() +
            '</div>'
          ).join('');
        } else {
          el.textContent = 'No active sessions';
        }
      } catch { document.getElementById('sessions-list').textContent = 'Failed to load sessions'; }
    }

    // Load account info on page load
    async function loadAccount() {
      try {
        const res = await fetch('/api/auth/me');
        const data = await res.json();
        if (data.email) {
          document.getElementById('user-email').textContent = data.name + ' (' + data.email + ')';
        }
      } catch { /* silent — shows default "..." */ }
    }

    // Load user's projects
    async function loadMyProjects() {
      const el = document.getElementById('projects-list');
      try {
        const res = await fetch('/api/projects');
        const projects = await res.json();
        const list = Array.isArray(projects) ? projects : (projects.projects || []);
        if (list.length === 0) {
          el.innerHTML = '<p style="color:#888;font-size:0.85rem;">No projects yet. Add one via git URL below.</p>';
          return;
        }
        el.innerHTML = list.map(p =>
          '<div style="padding:0.5rem 0;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;">' +
          '<div><strong>' + (p.name || p.slug) + '</strong>' +
          (p.git_url ? '<br><span style="font-size:0.8rem;color:#888;">' + p.git_url + '</span>' : '') +
          '</div>' +
          '<span style="font-size:0.75rem;color:#aaa;">' + p.slug + '</span>' +
          '</div>'
        ).join('');
      } catch { el.textContent = 'Failed to load projects'; }
    }

    async function addProject() {
      const gitUrl = document.getElementById('git-url').value.trim();
      const msg = document.getElementById('project-msg');
      msg.style.display = 'none';

      if (!gitUrl) {
        msg.textContent = 'Please enter a git URL';
        msg.className = 'message error';
        msg.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/projects', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ git_url: gitUrl })
        });
        const data = await res.json();
        if (res.ok) {
          msg.textContent = 'Project "' + data.name + '" added successfully';
          msg.className = 'message success';
          msg.style.display = 'block';
          document.getElementById('git-url').value = '';
          loadMyProjects();
        } else {
          msg.textContent = data.error || 'Failed to add project';
          msg.className = 'message error';
          msg.style.display = 'block';
        }
      } catch {
        msg.textContent = 'Network error';
        msg.className = 'message error';
        msg.style.display = 'block';
      }
    }

    // Allow Enter key in git URL input
    document.getElementById('git-url').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addProject(); }
    });

    // Init
    loadMyProjects();
    loadSessions();
    loadAccount();
  </script>
</body>
</html>
