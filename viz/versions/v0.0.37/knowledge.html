<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindspace</title>
<link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/apple-touch-icon-180x180.png">
<link rel="icon" type="image/x-icon" href="/assets/favicons/favicon.ico">
<link rel="manifest" href="/assets/favicons/manifest.webmanifest">
<link rel="stylesheet" href="/mindspace.css">
<style>
.children{margin-top:32px;}
.children h2{font-size:18px;margin-bottom:12px;}
.child-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
.child-card{display:block;padding:14px;background:var(--ms-surface);border:1px solid var(--ms-border);border-radius:var(--ms-radius);text-decoration:none;color:var(--ms-text);transition:border-color 0.2s;}
.child-card:hover{border-color:var(--ms-link);text-decoration:none;}
.child-card h3{font-size:14px;margin-bottom:4px;color:var(--ms-link);}
.child-card p{font-size:12px;color:var(--ms-muted);margin:0;}
.metadata{margin-top:24px;padding-top:16px;border-top:1px solid var(--ms-border);font-size:12px;color:var(--ms-muted);}
@media(max-width:768px){.child-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:480px){.child-grid{grid-template-columns:1fr;}}
</style>
</head><body>
<script type="module" src="/js/mindspace-nav.js"></script>
<div class="ms-container" style="max-width:760px;">
<nav class="ms-breadcrumb" id="breadcrumb"></nav>
<div id="page-content">
  <div class="ms-loading"><div class="ms-spinner"></div><br>Loading...</div>
</div>
<div class="metadata" id="metadata"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script type="module" src="/js/knowledge-browser.js"></script>
</body></html>
