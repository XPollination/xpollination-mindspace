<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Map — Mindspace</title>
<link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/apple-touch-icon-180x180.png">
<link rel="icon" type="image/x-icon" href="/assets/favicons/favicon.ico">
<link rel="manifest" href="/assets/favicons/manifest.webmanifest">
<link rel="stylesheet" href="/mindspace.css">
<style>
.mission-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.mission-card{display:block;padding:16px;background:var(--ms-surface);border:1px solid var(--ms-border);border-radius:var(--ms-radius);text-decoration:none;color:var(--ms-text);transition:border-color 0.2s;cursor:pointer;}
.mission-card:hover{border-color:var(--ms-link);text-decoration:none;}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.card-title{font-size:15px;font-weight:600;}
.card-description{font-size:13px;color:var(--ms-muted);margin-bottom:8px;}
.cap-count{font-size:11px;color:var(--ms-muted);font-weight:500;}
.footer-stats{margin-top:32px;padding-top:16px;border-top:1px solid var(--ms-border);font-size:13px;color:var(--ms-muted);}
.deprecated{margin-top:32px;}
.deprecated h2{font-size:16px;color:var(--ms-status-cancelled);margin-bottom:12px;}
.dimmed .mission-card{opacity:0.6;}
@media(max-width:600px){.mission-grid{grid-template-columns:1fr;}}
</style>
</head><body>
<script type="module" src="/js/mindspace-nav.js"></script>
<div class="ms-container">
<h1 style="font-size:28px;margin-bottom:8px;">Mission Map</h1>
<p style="color:var(--ms-muted);margin-bottom:24px;">Overview of all missions and their capabilities</p>
<div id="mission-content">
  <div class="ms-loading"><div class="ms-spinner"></div><br>Connecting to Mindspace...</div>
</div>
<div class="footer-stats" id="footer-stats"></div>
</div>
<script type="module" src="/js/mission-map.js"></script>
</body></html>
