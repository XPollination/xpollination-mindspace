<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — XPollination Mindspace</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #fafafa; color: #222; max-width: 600px; margin: 0 auto; padding: 2rem; }
    h1 { color: #222; border-bottom: 2px solid #e0e0e0; padding-bottom: 0.5rem; }
    h2 { color: #444; margin-top: 2rem; }
    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.3rem; font-weight: 500; color: #333; }
    input[type="password"], input[type="text"] { width: 100%; padding: 0.5rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    button { padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    .btn-primary { background: #3070c0; color: #fff; }
    .btn-danger { background: #d32f2f; color: #fff; }
    .btn-secondary { background: #666; color: #fff; }
    .message { padding: 0.5rem; border-radius: 4px; margin-bottom: 1rem; display: none; }
    .success { background: #e8f5e9; color: #2e7d32; }
    .error { background: #ffebee; color: #c62828; }
    .api-key-display { font-family: monospace; background: #f5f5f5; padding: 0.5rem; border-radius: 4px; word-break: break-all; }
    .nav { margin-bottom: 2rem; }
    .nav a { color: #3070c0; text-decoration: none; margin-right: 1rem; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/">Dashboard</a>
    <a href="/logout">Logout</a>
  </div>

  <h1>Settings</h1>

  <!-- Change Password -->
  <div class="card">
    <h2>Change Password</h2>
    <div class="message" id="pw-msg"></div>
    <form id="change-password-form">
      <label for="current-password">Current Password</label>
      <input type="password" id="current-password" name="current_password" required>
      <label for="new-password">New Password</label>
      <input type="password" id="new-password" name="new_password" required>
      <label for="confirm-password">Confirm New Password</label>
      <input type="password" id="confirm-password" required>
      <button type="submit" class="btn-primary">Change Password</button>
    </form>
  </div>

  <!-- API Key -->
  <div class="card">
    <h2>API Key</h2>
    <p>Use this key to authenticate CLI tools and agents.</p>
    <div class="api-key-display" id="api-key-value">••••••••••••</div>
    <br>
    <button class="btn-secondary" onclick="revealApiKey()">Show API Key</button>
    <button class="btn-danger" onclick="regenerateApiKey()">Regenerate API Key</button>
  </div>

  <!-- Active Sessions -->
  <div class="card">
    <h2>Active Sessions</h2>
    <div id="sessions-list">Loading...</div>
  </div>

  <!-- Account -->
  <div class="card">
    <h2>Account</h2>
    <p>Signed in as <strong id="user-email">...</strong></p>
    <a href="/logout" class="btn-danger" style="text-decoration:none;display:inline-block;">Logout</a>
  </div>

  <script>
    document.getElementById('change-password-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const current = document.getElementById('current-password').value;
      const newPw = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      const msg = document.getElementById('pw-msg');
      if (newPw !== confirm) { msg.textContent = 'Passwords do not match'; msg.className = 'message error'; msg.style.display = 'block'; return; }
      try {
        const res = await fetch('/api/auth/change-password', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({current_password: current, new_password: newPw}) });
        const data = await res.json();
        if (res.ok) { msg.textContent = 'Password changed'; msg.className = 'message success'; } else { msg.textContent = data.error; msg.className = 'message error'; }
        msg.style.display = 'block';
      } catch { msg.textContent = 'Network error'; msg.className = 'message error'; msg.style.display = 'block'; }
    });
    // Load API keys
    async function revealApiKey() {
      const el = document.getElementById('api-key-value');
      el.textContent = 'Loading...';
      try {
        const res = await fetch('/api/keys');
        if (res.ok) {
          const keys = await res.json();
          if (Array.isArray(keys) && keys.length > 0) {
            el.textContent = keys.map(k => k.name || k.id).join(', ') + ' (key hidden — regenerate for new key)';
          } else {
            el.textContent = 'No API keys. Click Regenerate to create one.';
          }
        } else { el.textContent = 'Could not load API keys'; }
      } catch { el.textContent = 'API keys not available'; }
    }

    async function regenerateApiKey() {
      if (!confirm('Regenerate API key? Old key will stop working.')) return;
      try {
        const res = await fetch('/api/keys', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name:'settings-generated'}) });
        if (res.ok) {
          const data = await res.json();
          document.getElementById('api-key-value').textContent = data.key || 'Key generated';
        }
      } catch { document.getElementById('api-key-value').textContent = 'Failed to regenerate'; }
    }

    // Load active sessions
    async function loadSessions() {
      const el = document.getElementById('sessions-list');
      try {
        const res = await fetch('/api/auth/sessions');
        if (res.ok) {
          const data = await res.json();
          const sessions = data.sessions || data;
          if (Array.isArray(sessions) && sessions.length > 0) {
            el.innerHTML = sessions.map(s => '<div>' + (s.ip_address || 'unknown') + ' — ' + (s.created_at || '') + '</div>').join('');
          } else { el.textContent = 'No active sessions'; }
        } else { el.textContent = 'Could not load sessions'; }
      } catch { el.textContent = 'Sessions not available'; }
    }

    // Load user info
    async function loadUserInfo() {
      const el = document.getElementById('user-email');
      try {
        // Parse JWT from cookie to get user info
        const cookies = document.cookie.split(';').map(c => c.trim());
        const session = cookies.find(c => c.startsWith('ms_session='));
        if (session) {
          const token = session.split('=')[1];
          const payload = JSON.parse(atob(token.split('.')[1]));
          el.textContent = payload.email || payload.name || 'Unknown';
        } else { el.textContent = 'Not signed in'; }
      } catch { el.textContent = 'Unknown user'; }
    }

    // Initialize
    loadSessions();
    loadUserInfo();
  </script>
</body>
</html>
