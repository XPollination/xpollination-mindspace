<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — XPollination Mindspace</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0d1117; color: #c9d1d9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .register-box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 2rem; width: 320px; }
    h1 { text-align: center; font-size: 1.4rem; margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.3rem; font-size: 0.9rem; }
    input { width: 100%; padding: 0.5rem; margin-bottom: 1rem; background: #0d1117; border: 1px solid #30363d; border-radius: 4px; color: #c9d1d9; box-sizing: border-box; }
    button { width: 100%; padding: 0.6rem; background: #238636; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #2ea043; }
    .error { color: #f85149; font-size: 0.85rem; display: none; margin-bottom: 0.5rem; }
    .success { color: #3fb950; font-size: 0.85rem; display: none; margin-bottom: 0.5rem; }
    .login-link { text-align: center; margin-top: 1rem; font-size: 0.85rem; }
    .login-link a { color: #58a6ff; }
  </style>
</head>
<body>
  <div class="register-box">
    <h1>Create Account</h1>
    <div class="error" id="error"></div>
    <div class="success" id="success"></div>
    <form id="registerForm">
      <label for="invite_code">Invite Code</label>
      <input type="text" id="invite_code" name="invite_code" required placeholder="Enter your invite code">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required placeholder="Your name">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8">
      <button type="submit">Register</button>
    </form>
    <div class="login-link">Already have an account? <a href="/login">Sign in</a></div>
  </div>
  <script>
    // Pre-fill invite code from URL if present (e.g., /register?code=abc123 or /invite/abc123)
    const params = new URLSearchParams(window.location.search);
    if (params.get('code')) {
      document.getElementById('invite_code').value = params.get('code');
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const invite_code = document.getElementById('invite_code').value;
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      const successEl = document.getElementById('success');
      errorEl.style.display = 'none';
      successEl.style.display = 'none';
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ invite_code, name, email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          errorEl.textContent = data.error || 'Registration failed';
          errorEl.style.display = 'block';
          return;
        }
        successEl.textContent = 'Account created! Redirecting to login...';
        successEl.style.display = 'block';
        setTimeout(() => { window.location.href = '/login'; }, 1500);
      } catch (err) {
        errorEl.textContent = 'Network error';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
