<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — XPollination Mindspace</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0d1117; color: #c9d1d9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .login-box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 2rem; width: 320px; }
    h1 { text-align: center; font-size: 1.4rem; margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.3rem; font-size: 0.9rem; }
    input { width: 100%; padding: 0.5rem; margin-bottom: 1rem; background: #0d1117; border: 1px solid #30363d; border-radius: 4px; color: #c9d1d9; box-sizing: border-box; }
    button { width: 100%; padding: 0.6rem; background: #238636; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #2ea043; }
    .error { color: #f85149; font-size: 0.85rem; display: none; margin-bottom: 0.5rem; }
    .register-link { text-align: center; margin-top: 1rem; font-size: 0.85rem; }
    .register-link a { color: #58a6ff; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Mindspace Login</h1>
    <div class="error" id="error"></div>
    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password">
      <button type="submit">Sign In</button>
    </form>
    <div class="register-link">Have an invite? <a href="/register">Register</a></div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      errorEl.style.display = 'none';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          errorEl.textContent = data.error || 'Login failed';
          errorEl.style.display = 'block';
          return;
        }
        window.location.href = '/';
      } catch (err) {
        errorEl.textContent = 'Network error';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
