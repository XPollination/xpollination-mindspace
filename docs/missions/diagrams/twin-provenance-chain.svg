<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 550" font-family="system-ui, sans-serif">
  <title>Twin Provenance Chain — From Mission to Production</title>
  <desc>
    AGENT-READABLE: Every object is a twin. Every twin has a version. Every version has test reports.
    The A2A server tracks the provenance chain: Mission twin v1 → spawns Capability twins → spawns
    Task twins → each task iteration produces a Report twin. The release twin bundles tested versions.
    When a version reaches production, the chain proves: what was planned (mission), what was built
    (task), what was tested (report with screenshots), what was deployed (release). Digital twin
    everything means you can query any point in the chain at any time.
  </desc>

  <rect width="1100" height="550" fill="#0d1117" rx="8"/>
  <text x="550" y="28" fill="#3fb950" font-size="16" font-weight="700" text-anchor="middle">Twin Provenance Chain — From Mission to Production</text>
  <text x="550" y="48" fill="#8b949e" font-size="11" text-anchor="middle">Every object is a twin. Every twin has versions. Every version has test evidence.</text>

  <!-- Mission Twin -->
  <rect x="30" y="75" width="170" height="110" rx="8" fill="#0d2818" stroke="#3fb950" stroke-width="2"/>
  <text x="115" y="100" fill="#3fb950" font-size="12" font-weight="700" text-anchor="middle">Mission Twin</text>
  <text x="115" y="118" fill="#8b949e" font-size="9" text-anchor="middle">/m/756ae11a</text>
  <text x="115" y="136" fill="#c9d1d9" font-size="9" text-anchor="middle">LIAISON Setup UX</text>
  <text x="115" y="152" fill="#484f58" font-size="8" text-anchor="middle">content_version: 2</text>
  <text x="115" y="168" fill="#484f58" font-size="8" text-anchor="middle">status: active</text>

  <!-- Arrow M → C -->
  <line x1="200" y1="130" x2="235" y2="130" stroke="#3fb950" stroke-width="2"/>
  <polygon points="233,125 240,130 233,135" fill="#3fb950"/>
  <text x="218" y="122" fill="#484f58" font-size="7">spawns</text>

  <!-- Capability Twins -->
  <rect x="240" y="70" width="155" height="50" rx="6" fill="#1c2333" stroke="#58a6ff"/>
  <text x="317" y="90" fill="#58a6ff" font-size="10" font-weight="600" text-anchor="middle">CAP-1: Guard</text>
  <text x="317" y="105" fill="#8b949e" font-size="8" text-anchor="middle">/c/... | v1.0.0</text>

  <rect x="240" y="125" width="155" height="50" rx="6" fill="#1c2333" stroke="#58a6ff"/>
  <text x="317" y="145" fill="#58a6ff" font-size="10" font-weight="600" text-anchor="middle">CAP-2: Setup Msg</text>
  <text x="317" y="160" fill="#8b949e" font-size="8" text-anchor="middle">/c/... | v1.0.0</text>

  <rect x="240" y="180" width="155" height="50" rx="6" fill="#1c2333" stroke="#58a6ff"/>
  <text x="317" y="200" fill="#58a6ff" font-size="10" font-weight="600" text-anchor="middle">CAP-3: A2A Detect</text>
  <text x="317" y="215" fill="#8b949e" font-size="8" text-anchor="middle">/c/... | v1.0.0</text>

  <!-- Arrow C → T -->
  <line x1="395" y1="150" x2="435" y2="150" stroke="#58a6ff" stroke-width="2"/>
  <polygon points="433,145 440,150 433,155" fill="#58a6ff"/>
  <text x="418" y="142" fill="#484f58" font-size="7">work</text>

  <!-- Task Twins (iterations) -->
  <rect x="440" y="70" width="200" height="180" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="540" y="92" fill="#c9d1d9" font-size="11" font-weight="700" text-anchor="middle">Task Twin Iterations</text>

  <!-- Iteration 1 -->
  <rect x="455" y="100" width="170" height="35" rx="4" fill="#1c1117" stroke="#f85149"/>
  <text x="540" y="116" fill="#f85149" font-size="9" font-weight="600" text-anchor="middle">Iteration 1 — REWORK</text>
  <text x="540" y="129" fill="#8b949e" font-size="8" text-anchor="middle">Route fix + chat-bubble guards</text>

  <!-- Iteration 2 -->
  <rect x="455" y="142" width="170" height="35" rx="4" fill="#1c1117" stroke="#d29922"/>
  <text x="540" y="158" fill="#d29922" font-size="9" font-weight="600" text-anchor="middle">Iteration 2 — REWORK</text>
  <text x="540" y="171" fill="#8b949e" font-size="8" text-anchor="middle">Terminal fix + SSE dedup</text>

  <!-- Iteration 3 -->
  <rect x="455" y="184" width="170" height="35" rx="4" fill="#0d2818" stroke="#3fb950"/>
  <text x="540" y="200" fill="#3fb950" font-size="9" font-weight="600" text-anchor="middle">Iteration 3 — PASS</text>
  <text x="540" y="213" fill="#8b949e" font-size="8" text-anchor="middle">All L1+L2+L3 verified</text>

  <!-- Loop arrows between iterations -->
  <line x1="455" y1="135" x2="445" y2="135" stroke="#f85149" stroke-width="1"/>
  <line x1="445" y1="135" x2="445" y2="160" stroke="#f85149" stroke-width="1"/>
  <line x1="445" y1="160" x2="455" y2="160" stroke="#f85149" stroke-width="1"/>

  <line x1="455" y1="177" x2="445" y2="177" stroke="#d29922" stroke-width="1"/>
  <line x1="445" y1="177" x2="445" y2="200" stroke="#d29922" stroke-width="1"/>
  <line x1="445" y1="200" x2="455" y2="200" stroke="#d29922" stroke-width="1"/>

  <!-- Arrow T → R (each iteration → report) -->
  <line x1="625" y1="117" x2="680" y2="117" stroke="#f85149" stroke-width="1.5"/>
  <line x1="625" y1="159" x2="680" y2="159" stroke="#d29922" stroke-width="1.5"/>
  <line x1="625" y1="201" x2="680" y2="201" stroke="#3fb950" stroke-width="1.5"/>

  <!-- Report Twins (1 per iteration) -->
  <rect x="680" y="70" width="200" height="180" rx="8" fill="#161b22" stroke="#d29922" stroke-width="2"/>
  <text x="780" y="92" fill="#d29922" font-size="11" font-weight="700" text-anchor="middle">Report Twins (1:1)</text>

  <rect x="695" y="102" width="170" height="30" rx="4" fill="#1c1117" stroke="#f85149"/>
  <text x="780" y="117" fill="#f85149" font-size="9" text-anchor="middle">/r/... iter1: 2/4 FAIL</text>
  <text x="860" y="127" fill="#484f58" font-size="7">3 screenshots</text>

  <rect x="695" y="144" width="170" height="30" rx="4" fill="#1c1117" stroke="#d29922"/>
  <text x="780" y="159" fill="#d29922" font-size="9" text-anchor="middle">/r/... iter2: 3/4 PARTIAL</text>
  <text x="860" y="169" fill="#484f58" font-size="7">5 screenshots</text>

  <rect x="695" y="186" width="170" height="30" rx="4" fill="#0d2818" stroke="#3fb950"/>
  <text x="780" y="201" fill="#3fb950" font-size="9" text-anchor="middle">/r/... iter3: 4/4 PASS</text>
  <text x="860" y="211" fill="#484f58" font-size="7">5 screenshots</text>

  <!-- Arrow: Passing report → Release -->
  <line x1="880" y1="201" x2="920" y2="201" stroke="#3fb950" stroke-width="2"/>
  <line x1="920" y1="201" x2="920" y2="320" stroke="#3fb950" stroke-width="2"/>
  <polygon points="916,318 920,325 924,318" fill="#3fb950"/>
  <text x="930" y="260" fill="#3fb950" font-size="8">proven</text>

  <!-- Release Twin -->
  <rect x="810" y="325" width="260" height="110" rx="8" fill="#0d2818" stroke="#3fb950" stroke-width="2"/>
  <text x="940" y="350" fill="#3fb950" font-size="13" font-weight="700" text-anchor="middle">Release Twin</text>
  <text x="940" y="368" fill="#8b949e" font-size="9" text-anchor="middle">v0.3.0 — tagged on main</text>
  <text x="830" y="390" fill="#c9d1d9" font-size="9">includes:</text>
  <text x="830" y="405" fill="#8b949e" font-size="9">  CAP-1 v1.0.0 (report /r/... PASS)</text>
  <text x="830" y="420" fill="#8b949e" font-size="9">  CAP-2 v1.0.0 (report /r/... PASS)</text>
  <text x="830" y="435" fill="#8b949e" font-size="9">  CAP-3 v1.0.0 (report /r/... PASS)</text>

  <!-- A2A Server -->
  <rect x="30" y="290" width="440" height="230" rx="8" fill="#1c2333" stroke="#58a6ff" stroke-width="2"/>
  <text x="250" y="318" fill="#58a6ff" font-size="14" font-weight="700" text-anchor="middle">A2A Server — The Orchestrator Knows Everything</text>

  <text x="50" y="345" fill="#c9d1d9" font-size="10" font-weight="600">What it tracks per twin:</text>
  <text x="50" y="363" fill="#8b949e" font-size="9">  twin_id → current_version → linked_reports[] → status</text>
  <text x="50" y="381" fill="#8b949e" font-size="9">  report.checks[] → L1/L2/L3 pass/fail per check</text>
  <text x="50" y="399" fill="#8b949e" font-size="9">  report.screenshots[] → visual evidence</text>

  <text x="50" y="425" fill="#c9d1d9" font-size="10" font-weight="600">What it can answer:</text>
  <text x="50" y="443" fill="#3fb950" font-size="9">  "What version of CAP-1 is in prod?" → v1.0.0 (release v0.3.0)</text>
  <text x="50" y="458" fill="#3fb950" font-size="9">  "Was it tested?" → Yes, report /r/... iteration 3, 4/4 PASS</text>
  <text x="50" y="473" fill="#3fb950" font-size="9">  "Show me the evidence" → 5 screenshots, 3 rework iterations</text>
  <text x="50" y="488" fill="#3fb950" font-size="9">  "What failed before?" → iter1: black terminal, iter2: SSE flood</text>
  <text x="50" y="503" fill="#d29922" font-size="9">  "What's untested in develop?" → CAP-4 has no report yet</text>

  <!-- Connection lines -->
  <line x1="250" y1="290" x2="250" y2="250" stroke="#58a6ff" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="250" y1="250" x2="115" y2="185" stroke="#58a6ff" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="250" y1="250" x2="540" y2="250" stroke="#58a6ff" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="250" y1="250" x2="780" y2="250" stroke="#58a6ff" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="550" y="540" fill="#484f58" font-size="8" text-anchor="middle">MISSION-TWIN-PROVENANCE v1 | 2026-03-27 | Digital Twin Everything — the chain from intent to evidence to production</text>
</svg>
