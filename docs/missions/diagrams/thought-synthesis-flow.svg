<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="system-ui, sans-serif">
  <title>CAP-1: Thought Synthesis Flow</title>
  <desc>
    AGENT-READABLE: Thought synthesis is NOT time-based buffering. It uses topic-boundary detection.
    Flow: All speakers' audio → continuous transcript with speaker attribution → topic boundary detector
    (detects when conversation shifts topic via semantic shift + speaker change patterns) → sends
    30-60s multi-speaker dialogue segment to LLM → LLM performs cross-speaker synthesis: extracts
    the group thought that emerged from the interaction (not what any individual said) → outputs
    { thought, attributions: [{ speaker, contribution_type }] } → Brain write with group_token
    as contributor_id. The synthesis becomes shared context for CAP-2 voice editor.
    Key: a meaningful thought emerges over 30-60s across speakers. Thomas frames, Robin challenges,
    Thomas resolves. The synthesis captures the resolution that no individual stated alone.
  </desc>

  <rect width="900" height="400" fill="#0d1117" rx="8"/>
  <text x="450" y="30" fill="#3fb950" font-size="15" font-weight="700" text-anchor="middle">CAP-1: Thought Synthesis Flow</text>

  <!-- Speaker streams -->
  <rect x="30" y="55" width="150" height="100" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="105" y="78" fill="#c9d1d9" font-size="12" font-weight="600" text-anchor="middle">Speaker Streams</text>
  <text x="105" y="100" fill="#58a6ff" font-size="11" text-anchor="middle">Thomas: "I think..."</text>
  <text x="105" y="118" fill="#d29922" font-size="11" text-anchor="middle">Robin: "But what if..."</text>
  <text x="105" y="136" fill="#bc8cff" font-size="11" text-anchor="middle">Thomas: "Right, so..."</text>

  <line x1="180" y1="105" x2="220" y2="105" stroke="#3fb950" stroke-width="2"/>
  <text x="200" y="98" fill="#8b949e" font-size="9" text-anchor="middle">30-60s</text>

  <!-- Topic boundary detector -->
  <rect x="220" y="65" width="165" height="80" rx="6" fill="#0d2818" stroke="#3fb950"/>
  <text x="302" y="88" fill="#3fb950" font-size="11" font-weight="700" text-anchor="middle">Topic Boundary</text>
  <text x="302" y="105" fill="#3fb950" font-size="11" font-weight="700" text-anchor="middle">Detector</text>
  <text x="302" y="125" fill="#8b949e" font-size="9" text-anchor="middle">semantic shift +</text>
  <text x="302" y="137" fill="#8b949e" font-size="9" text-anchor="middle">speaker change pattern</text>

  <line x1="385" y1="105" x2="425" y2="105" stroke="#3fb950" stroke-width="2"/>
  <text x="405" y="98" fill="#8b949e" font-size="9" text-anchor="middle">trigger</text>

  <!-- LLM Synthesis -->
  <rect x="425" y="50" width="200" height="110" rx="8" fill="#1c2333" stroke="#58a6ff" stroke-width="2"/>
  <text x="525" y="75" fill="#58a6ff" font-size="12" font-weight="700" text-anchor="middle">LLM: Cross-Speaker</text>
  <text x="525" y="92" fill="#58a6ff" font-size="12" font-weight="700" text-anchor="middle">Synthesis</text>
  <text x="525" y="115" fill="#c9d1d9" font-size="10" text-anchor="middle">Input: multi-speaker dialogue</text>
  <text x="525" y="132" fill="#c9d1d9" font-size="10" text-anchor="middle">Output: one group thought</text>
  <text x="525" y="149" fill="#8b949e" font-size="9" text-anchor="middle">+ per-speaker attribution</text>

  <line x1="625" y1="105" x2="665" y2="105" stroke="#58a6ff" stroke-width="2"/>

  <!-- Output -->
  <rect x="665" y="50" width="210" height="110" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="770" y="75" fill="#3fb950" font-size="12" font-weight="700" text-anchor="middle">Brain Write</text>
  <text x="770" y="97" fill="#c9d1d9" font-size="10" text-anchor="middle">contributor: grp-a7f3e2</text>
  <text x="770" y="114" fill="#c9d1d9" font-size="10" text-anchor="middle">thought: "Federation model</text>
  <text x="770" y="128" fill="#c9d1d9" font-size="10" text-anchor="middle">enables sovereign nodes..."</text>
  <text x="770" y="148" fill="#bc8cff" font-size="10" text-anchor="middle">attributions: [thomas: framing,</text>
  <text x="770" y="162" fill="#bc8cff" font-size="10" text-anchor="middle">robin: challenge that refined]</text>

  <!-- Shared context arrow down to CAP-2 -->
  <line x1="525" y1="160" x2="525" y2="200" stroke="#d29922" stroke-width="2" stroke-dasharray="4"/>
  <text x="530" y="190" fill="#d29922" font-size="10">shared context</text>

  <!-- CAP-2 context box -->
  <rect x="350" y="200" width="350" height="55" rx="6" fill="#2b1d0e" stroke="#d29922"/>
  <text x="525" y="222" fill="#d29922" font-size="11" font-weight="600" text-anchor="middle">→ CAP-2: Voice Editor Context</text>
  <text x="525" y="242" fill="#8b949e" font-size="10" text-anchor="middle">"Hey Mindspace, write that as the vision" resolves from synthesis</text>

  <!-- Bottom: Key insight -->
  <rect x="30" y="280" width="840" height="100" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="450" y="305" fill="#c9d1d9" font-size="13" font-weight="700" text-anchor="middle">Why Synthesis, Not Filtering</text>

  <rect x="60" y="320" width="240" height="45" rx="4" fill="#0d1117" stroke="#30363d"/>
  <text x="180" y="338" fill="#8b949e" font-size="11" text-anchor="middle">Old: "Is this meaningful?"</text>
  <text x="180" y="355" fill="#8b949e" font-size="10" text-anchor="middle">→ Yes/No per utterance</text>

  <text x="320" y="345" fill="#3fb950" font-size="16">→</text>

  <rect x="350" y="320" width="500" height="45" rx="4" fill="#0d2818" stroke="#3fb950"/>
  <text x="600" y="338" fill="#3fb950" font-size="11" text-anchor="middle">New: "What insight emerged from this dialogue?"</text>
  <text x="600" y="355" fill="#3fb950" font-size="10" text-anchor="middle">→ One thought no individual stated, with attribution per speaker</text>
</svg>
