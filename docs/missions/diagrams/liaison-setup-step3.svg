<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Step 3: Agents Page — Terminal Shows OAuth</title>
  <desc>
    AGENT-READABLE: User clicked "Complete setup →" and arrived at /agents page. The agent grid
    shows the LIAISON agent card with a terminal view. Inside the terminal (xterm.js via WebSocket
    to /ws/terminal/{sessionName}), Claude Code's OAuth prompt is visible with a clickable URL.
    User clicks the URL which opens claude.ai in a new browser tab for OAuth authorization.
  </desc>

  <rect width="900" height="500" fill="#0d1117" rx="8"/>
  <text x="450" y="30" fill="#3fb950" font-size="15" font-weight="700" text-anchor="middle">Step 3: Agents Page — Terminal Shows OAuth URL</text>

  <!-- Browser window frame -->
  <rect x="40" y="50" width="820" height="420" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <rect x="40" y="50" width="820" height="36" rx="8" fill="#21262d"/>
  <rect x="40" y="74" width="820" height="12" fill="#21262d"/>
  <circle cx="62" cy="68" r="5" fill="#f85149"/>
  <circle cx="80" cy="68" r="5" fill="#d29922"/>
  <circle cx="98" cy="68" r="5" fill="#3fb950"/>
  <rect x="140" y="58" width="580" height="20" rx="4" fill="#0d1117" stroke="#30363d"/>
  <text x="156" y="72" fill="#8b949e" font-size="10">mindspace.xpollination.org/agents</text>

  <!-- Nav sidebar (minimal) -->
  <rect x="60" y="100" width="120" height="350" rx="4" fill="#0d1117" stroke="#30363d"/>
  <rect x="75" y="140" width="90" height="20" rx="3" fill="#161b22"/>
  <text x="120" y="154" fill="#8b949e" font-size="9" text-anchor="middle">Projects</text>
  <rect x="75" y="166" width="90" height="20" rx="3" fill="#161b22"/>
  <text x="120" y="180" fill="#8b949e" font-size="9" text-anchor="middle">Knowledge</text>
  <rect x="75" y="192" width="90" height="20" rx="3" fill="#21262d" stroke="#58a6ff"/>
  <text x="120" y="206" fill="#58a6ff" font-size="9" font-weight="600" text-anchor="middle">Agents</text>

  <!-- Page header -->
  <text x="210" y="118" fill="#c9d1d9" font-size="14" font-weight="700">Agents</text>
  <text x="310" y="118" fill="#8b949e" font-size="11">Dashboard</text>
  <text x="395" y="118" fill="#58a6ff" font-size="11" font-weight="600" text-decoration="underline">Terminal</text>

  <!-- LIAISON Agent Card -->
  <rect x="200" y="135" width="640" height="300" rx="8" fill="#161b22" stroke="#f5c2e7" stroke-width="2"/>

  <!-- Card header -->
  <rect x="200" y="135" width="640" height="38" rx="8" fill="#21262d"/>
  <rect x="200" y="158" width="640" height="15" fill="#21262d"/>
  <!-- Role badge -->
  <rect x="216" y="143" width="65" height="20" rx="10" fill="#f5c2e7" opacity="0.2"/>
  <text x="248" y="157" fill="#f5c2e7" font-size="10" font-weight="700" text-anchor="middle">LIAISON</text>
  <!-- Status -->
  <circle cx="300" cy="153" r="4" fill="#d29922"/>
  <text x="310" y="157" fill="#d29922" font-size="10">Starting...</text>
  <!-- Session name -->
  <text x="790" y="157" fill="#484f58" font-size="9" text-anchor="end">agent-liaison-user42</text>

  <!-- TERMINAL (xterm.js) -->
  <rect x="216" y="180" width="608" height="240" rx="6" fill="#0d1117" stroke="#30363d"/>

  <!-- Terminal content — Claude Code OAuth prompt -->
  <text x="230" y="200" fill="#8b949e" font-size="11" font-family="monospace">$ claude</text>
  <text x="230" y="218" fill="#c9d1d9" font-size="11" font-family="monospace">Claude Code v1.0.12</text>
  <text x="230" y="236" fill="#c9d1d9" font-size="11" font-family="monospace"> </text>
  <text x="230" y="254" fill="#d29922" font-size="11" font-family="monospace">To authenticate, visit this URL:</text>
  <text x="230" y="272" fill="#c9d1d9" font-size="11" font-family="monospace"> </text>

  <!-- OAuth URL — highlighted as clickable -->
  <rect x="226" y="278" width="590" height="22" rx="3" fill="#1c2333"/>
  <text x="230" y="294" fill="#58a6ff" font-size="11" font-family="monospace" text-decoration="underline">https://claude.ai/oauth/authorize?client_id=cc-prod&amp;redirect_uri=...</text>

  <text x="230" y="318" fill="#c9d1d9" font-size="11" font-family="monospace"> </text>
  <text x="230" y="336" fill="#8b949e" font-size="11" font-family="monospace">Waiting for authentication...</text>

  <!-- Blinking cursor -->
  <rect x="438" y="328" width="8" height="14" fill="#3fb950" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Callout: click the URL -->
  <rect x="230" y="360" width="280" height="46" rx="6" fill="#1c2333" stroke="#58a6ff" stroke-width="2"/>
  <text x="370" y="378" fill="#58a6ff" font-size="11" font-weight="700" text-anchor="middle">User Action: Click the OAuth URL</text>
  <text x="370" y="394" fill="#8b949e" font-size="9" text-anchor="middle">Opens new browser tab to claude.ai for authorization</text>

  <!-- Arrow from URL to callout -->
  <line x1="520" y1="300" x2="520" y2="360" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Chat bubble (still visible, but dimmed) -->
  <g transform="translate(810, 430)" opacity="0.4">
    <circle cx="0" cy="0" r="20" fill="#ea580c"/>
    <text x="0" y="5" fill="#fff" font-size="14" text-anchor="middle">&#x1f4ac;</text>
  </g>

  <!-- New tab indicator -->
  <rect x="580" y="360" width="230" height="46" rx="6" fill="#0d2818" stroke="#3fb950"/>
  <text x="695" y="378" fill="#3fb950" font-size="10" font-weight="600" text-anchor="middle">Opens in new tab:</text>
  <text x="695" y="394" fill="#8b949e" font-size="9" text-anchor="middle">claude.ai OAuth consent screen</text>
</svg>
