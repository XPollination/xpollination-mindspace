<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <radialGradient id="space2" cx="50%" cy="60%" r="80%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1120"/>
    </radialGradient>
    <radialGradient id="starGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef9c3" stop-opacity="1"/>
      <stop offset="40%" stop-color="#facc15" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#facc15" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Hintergrund -->
  <rect width="900" height="540" fill="url(#space2)"/>
  <g fill="#cbd5e1" opacity="0.5">
    <circle cx="120" cy="80" r="1"/>
    <circle cx="280" cy="60" r="1.5"/>
    <circle cx="450" cy="40" r="1"/>
    <circle cx="620" cy="80" r="1"/>
    <circle cx="60" cy="280" r="1"/>
    <circle cx="200" cy="500" r="1"/>
    <circle cx="800" cy="280" r="1"/>
    <circle cx="850" cy="380" r="1.5"/>
    <circle cx="180" cy="380" r="1"/>
    <circle cx="730" cy="440" r="1"/>
  </g>

  <!-- Titel -->
  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">Die Flotte</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#94a3b8">Drei Schiffe · eine geteilte Karte · Wissen kompounded</text>

  <!-- Geteilter Stern -->
  <circle cx="800" cy="120" r="55" fill="url(#starGlow2)"/>
  <g transform="translate(800,120)">
    <polygon points="0,-22 6,-7 22,-7 9,3 14,18 0,9 -14,18 -9,3 -22,-7 -6,-7" fill="#fde047" stroke="#fbbf24" stroke-width="1"/>
  </g>
  <text x="800" y="195" text-anchor="middle" font-size="12" font-weight="700" fill="#fde047">Geteilte Vision</text>

  <!-- ============ SCHIFF 1: WIEN (blau) ============ -->
  <!-- Pfad: Start → Sackgasse → zurück → vor -->
  <path d="M 60 460 Q 160 440 240 400" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <!-- Sackgassen-Abzweig (rot) -->
  <path d="M 240 400 Q 290 340 340 290" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="4 3"/>
  <g transform="translate(340,290)">
    <circle r="11" fill="#7f1d1d" stroke="#ef4444" stroke-width="2"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#fecaca" stroke-width="2.5"/>
    <line x1="-5" y1="5" x2="5" y2="-5" stroke="#fecaca" stroke-width="2.5"/>
  </g>
  <text x="358" y="285" font-size="10" font-weight="700" fill="#fca5a5">Sackgasse</text>
  <text x="358" y="298" font-size="9" fill="#fca5a5" font-style="italic">(als Verdikt geteilt)</text>
  <!-- Wien fährt zurück und weiter -->
  <path d="M 240 400 Q 360 380 480 350 Q 580 320 660 240" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <g transform="translate(660,240) rotate(-40)">
    <path d="M -16 -8 L 18 0 L -16 8 L -8 0 Z" fill="#60a5fa" stroke="#0f172a" stroke-width="1"/>
  </g>
  <text x="660" y="265" text-anchor="middle" font-size="10" font-weight="700" fill="#93c5fd">⛵ Wien</text>

  <!-- ============ SCHIFF 2: BERLIN (grün) ============ -->
  <!-- Berlin sieht Wiens Sackgasse und meidet sie -->
  <path d="M 60 360 Q 180 340 260 310" fill="none" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
  <text x="160" y="330" font-size="9" fill="#6ee7b7" font-style="italic">"Wien hat's getestet — meiden"</text>
  <!-- Berlin geht direkter und macht Durchbruch -->
  <path d="M 260 310 Q 360 290 460 280" fill="none" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
  <g transform="translate(460,280)">
    <circle r="13" fill="#059669" stroke="#6ee7b7" stroke-width="2.5"/>
    <text y="5" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">✦</text>
  </g>
  <text x="460" y="255" text-anchor="middle" font-size="11" font-weight="700" fill="#6ee7b7">Durchbruch</text>
  <text x="460" y="312" text-anchor="middle" font-size="9" fill="#6ee7b7" font-style="italic">(für alle sichtbar)</text>
  <path d="M 460 280 Q 560 220 690 170" fill="none" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
  <g transform="translate(690,170) rotate(-30)">
    <path d="M -16 -8 L 18 0 L -16 8 L -8 0 Z" fill="#34d399" stroke="#0f172a" stroke-width="1"/>
  </g>
  <text x="690" y="195" text-anchor="middle" font-size="10" font-weight="700" fill="#6ee7b7">⛵ Berlin</text>

  <!-- ============ SCHIFF 3: MADRID (orange) ============ -->
  <!-- Madrid kommt später, nutzt Berlins Durchbruch direkt -->
  <path d="M 60 240 Q 180 220 260 220" fill="none" stroke="#fb923c" stroke-width="3" stroke-linecap="round"/>
  <text x="160" y="210" font-size="9" fill="#fdba74" font-style="italic">"Berlin hat den Weg gefunden"</text>
  <path d="M 260 220 Q 360 240 460 280" fill="none" stroke="#fb923c" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 2"/>
  <path d="M 460 280 Q 580 200 720 130" fill="none" stroke="#fb923c" stroke-width="3" stroke-linecap="round"/>
  <g transform="translate(720,130) rotate(-32)">
    <path d="M -16 -8 L 18 0 L -16 8 L -8 0 Z" fill="#fb923c" stroke="#0f172a" stroke-width="1"/>
  </g>
  <text x="720" y="155" text-anchor="middle" font-size="10" font-weight="700" fill="#fdba74">⛵ Madrid</text>

  <!-- Pattern-Detection-Hinweis -->
  <g transform="translate(40,420)">
    <rect width="280" height="90" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="14" y="22" font-size="11" font-weight="700" fill="#f1f5f9">Was die Flotte sieht</text>
    <text x="14" y="42" font-size="10" fill="#cbd5e1">• Sackgassen werden nur einmal getestet</text>
    <text x="14" y="58" font-size="10" fill="#cbd5e1">• Durchbrüche propagieren sofort</text>
    <text x="14" y="74" font-size="10" fill="#cbd5e1">• Kreis-Detection: "drei Schiffe denselben Pfad"</text>
  </g>

  <!-- Footer -->
  <text x="450" y="510" text-anchor="middle" font-size="12" fill="#94a3b8" font-style="italic">
    Sackgassen, Durchbrüche, Routen — alles wird geteilt. Jede Reise macht die kollektive Karte schlauer.
  </text>
</svg>
