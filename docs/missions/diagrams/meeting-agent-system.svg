<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="system-ui, sans-serif">
  <title>Meeting Companion Agent — System Architecture</title>
  <desc>
    AGENT-READABLE: Meeting room contains N authenticated participants + 1 companion agent (browser-side).
    Agent has 3 parallel capabilities: (1) Speech API continuous listening → LLM distillation → Brain write with group_token,
    (2) Wake word "Hey Mindspace" → LLM intent parsing → A2A message router → response to chat,
    (3) Group token issuance at activation → anonymous group signature covering all participants.
    All brain writes use the group_token as contributor_id (GDPR: non-reversible externally).
    A2A execution is LLM-less — mechanical routing only. LLM is translator, not executor.
  </desc>

  <!-- Background -->
  <rect width="900" height="620" fill="#0d1117" rx="8"/>

  <!-- Meeting Room box -->
  <rect x="30" y="20" width="840" height="220" rx="8" fill="none" stroke="#30363d" stroke-width="2"/>
  <text x="50" y="48" fill="#58a6ff" font-size="14" font-weight="700">MEETING ROOM (LiveKit WebRTC)</text>

  <!-- Participants -->
  <rect x="60" y="65" width="120" height="55" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="120" y="88" fill="#c9d1d9" font-size="12" text-anchor="middle">Thomas</text>
  <text x="120" y="105" fill="#8b949e" font-size="10" text-anchor="middle">Safari Mac</text>

  <rect x="200" y="65" width="120" height="55" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="260" y="88" fill="#c9d1d9" font-size="12" text-anchor="middle">Robin</text>
  <text x="260" y="105" fill="#8b949e" font-size="10" text-anchor="middle">Chrome</text>

  <rect x="340" y="65" width="120" height="55" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="400" y="88" fill="#c9d1d9" font-size="12" text-anchor="middle">Person N</text>
  <text x="400" y="105" fill="#8b949e" font-size="10" text-anchor="middle">any browser</text>

  <text x="500" y="92" fill="#8b949e" font-size="11">← Authenticated via</text>
  <text x="500" y="108" fill="#8b949e" font-size="11">   Mindspace JWT</text>

  <!-- Companion Agent -->
  <rect x="140" y="145" width="280" height="75" rx="8" fill="#1c2333" stroke="#58a6ff" stroke-width="2"/>
  <text x="280" y="170" fill="#58a6ff" font-size="13" font-weight="700" text-anchor="middle">🤖 Companion Agent (in browser)</text>
  <text x="280" y="190" fill="#8b949e" font-size="11" text-anchor="middle">Activated by ANY participant</text>
  <text x="280" y="206" fill="#8b949e" font-size="11" text-anchor="middle">One per room — serves everyone</text>

  <!-- Connection lines from participants to agent -->
  <line x1="120" y1="120" x2="200" y2="145" stroke="#30363d" stroke-dasharray="4"/>
  <line x1="260" y1="120" x2="270" y2="145" stroke="#30363d" stroke-dasharray="4"/>
  <line x1="400" y1="120" x2="350" y2="145" stroke="#30363d" stroke-dasharray="4"/>

  <!-- Three output arrows from agent -->
  <line x1="190" y1="220" x2="140" y2="280" stroke="#3fb950" stroke-width="2"/>
  <line x1="280" y1="220" x2="280" y2="280" stroke="#d29922" stroke-width="2"/>
  <line x1="370" y1="220" x2="440" y2="280" stroke="#bc8cff" stroke-width="2"/>

  <!-- CAP-1: Thought Distillation -->
  <rect x="30" y="280" width="240" height="140" rx="8" fill="#0d2818" stroke="#3fb950" stroke-width="2"/>
  <text x="150" y="305" fill="#3fb950" font-size="13" font-weight="700" text-anchor="middle">CAP-1: Thought Distillation</text>
  <text x="150" y="325" fill="#c9d1d9" font-size="11" text-anchor="middle">Speech API (continuous)</text>
  <text x="150" y="342" fill="#8b949e" font-size="10" text-anchor="middle">↓ 3s pause buffer</text>
  <text x="150" y="359" fill="#c9d1d9" font-size="11" text-anchor="middle">LLM: "meaningful thought?"</text>
  <text x="150" y="376" fill="#8b949e" font-size="10" text-anchor="middle">Yes → distill  |  No → discard</text>
  <text x="150" y="396" fill="#3fb950" font-size="11" text-anchor="middle">→ Brain write (group_token)</text>

  <!-- CAP-2: Voice Commands -->
  <rect x="290" y="280" width="240" height="140" rx="8" fill="#2b1d0e" stroke="#d29922" stroke-width="2"/>
  <text x="410" y="305" fill="#d29922" font-size="13" font-weight="700" text-anchor="middle">CAP-2: Voice Commands</text>
  <text x="410" y="325" fill="#c9d1d9" font-size="11" text-anchor="middle">"Hey Mindspace" (wake word)</text>
  <text x="410" y="342" fill="#8b949e" font-size="10" text-anchor="middle">↓ command speech captured</text>
  <text x="410" y="359" fill="#c9d1d9" font-size="11" text-anchor="middle">LLM: intent → A2A message</text>
  <text x="410" y="376" fill="#8b949e" font-size="10" text-anchor="middle">POST /a2a/message</text>
  <text x="410" y="396" fill="#d29922" font-size="11" text-anchor="middle">→ Response → Chat card</text>

  <!-- CAP-3: Group Provenance -->
  <rect x="550" y="280" width="310" height="140" rx="8" fill="#1c1533" stroke="#bc8cff" stroke-width="2"/>
  <text x="705" y="305" fill="#bc8cff" font-size="13" font-weight="700" text-anchor="middle">CAP-3: Group Provenance</text>
  <text x="705" y="325" fill="#c9d1d9" font-size="11" text-anchor="middle">At activation: enumerate participants</text>
  <text x="705" y="345" fill="#c9d1d9" font-size="11" text-anchor="middle">→ SHA-256(sorted_ids + salt)</text>
  <text x="705" y="365" fill="#c9d1d9" font-size="11" text-anchor="middle">→ group_token = "grp-a7f3e2..."</text>
  <text x="705" y="388" fill="#8b949e" font-size="10" text-anchor="middle">External: cannot trace → individuals</text>
  <text x="705" y="405" fill="#8b949e" font-size="10" text-anchor="middle">Internal: per-person credit computed</text>

  <!-- Bottom: Services -->
  <rect x="30" y="450" width="200" height="70" rx="8" fill="#161b22" stroke="#3fb950"/>
  <text x="130" y="480" fill="#3fb950" font-size="13" font-weight="600" text-anchor="middle">Brain API</text>
  <text x="130" y="498" fill="#8b949e" font-size="10" text-anchor="middle">Thoughts with group_token</text>

  <rect x="250" y="450" width="200" height="70" rx="8" fill="#161b22" stroke="#d29922"/>
  <text x="350" y="480" fill="#d29922" font-size="13" font-weight="600" text-anchor="middle">A2A Router</text>
  <text x="350" y="498" fill="#8b949e" font-size="10" text-anchor="middle">LLM-less mechanical routing</text>

  <rect x="470" y="450" width="200" height="70" rx="8" fill="#161b22" stroke="#bc8cff"/>
  <text x="570" y="480" fill="#bc8cff" font-size="13" font-weight="600" text-anchor="middle">Provenance Store</text>
  <text x="570" y="498" fill="#8b949e" font-size="10" text-anchor="middle">group → members mapping</text>

  <rect x="690" y="450" width="170" height="70" rx="8" fill="#161b22" stroke="#8b949e"/>
  <text x="775" y="480" fill="#c9d1d9" font-size="13" font-weight="600" text-anchor="middle">LLM</text>
  <text x="775" y="498" fill="#8b949e" font-size="10" text-anchor="middle">Distill + Parse intent</text>

  <!-- Arrows to services -->
  <line x1="150" y1="420" x2="130" y2="450" stroke="#3fb950" stroke-width="1.5"/>
  <line x1="410" y1="420" x2="350" y2="450" stroke="#d29922" stroke-width="1.5"/>
  <line x1="705" y1="420" x2="570" y2="450" stroke="#bc8cff" stroke-width="1.5"/>

  <!-- LLM connections -->
  <line x1="150" y1="370" x2="690" y2="475" stroke="#8b949e" stroke-dasharray="3" stroke-width="1" opacity="0.5"/>
  <line x1="410" y1="370" x2="690" y2="475" stroke="#8b949e" stroke-dasharray="3" stroke-width="1" opacity="0.5"/>

  <!-- Legend -->
  <text x="50" y="560" fill="#3fb950" font-size="11">■ CAP-1: Thought Distillation (continuous)</text>
  <text x="50" y="580" fill="#d29922" font-size="11">■ CAP-2: Voice Commands (on demand)</text>
  <text x="50" y="600" fill="#bc8cff" font-size="11">■ CAP-3: Group Provenance (at activation)</text>
  <text x="500" y="560" fill="#8b949e" font-size="11">--- Dashed = LLM calls (translator, not executor)</text>
  <text x="500" y="580" fill="#8b949e" font-size="11">─── Solid = Data flow</text>
  <text x="500" y="600" fill="#58a6ff" font-size="11">All three capabilities active simultaneously</text>
</svg>
