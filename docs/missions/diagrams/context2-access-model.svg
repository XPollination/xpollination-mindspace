<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="system-ui, sans-serif">
  <title>Context 2 Access Model — What Agents Can and Cannot Do</title>
  <desc>
    AGENT-READABLE: The container is the body. Agents communicate through defined paths only.
    CAN: A2A messages (transitions, queries, creates), Brain (query, contribute), project workspace
    (read-write, scoped), internet (Anthropic API for Claude Code), git (delegated credentials).
    CANNOT: direct PM database access, docker commands, SSH to host, modify other projects.
    The A2A server is LLM-less — pure protocol. Agents (LLM) decide what to do. Server validates
    if it's allowed. Database is a storage adapter behind A2A, never accessed directly.
  </desc>

  <rect width="900" height="450" fill="#0d1117" rx="8"/>
  <text x="450" y="28" fill="#3fb950" font-size="15" font-weight="700" text-anchor="middle">Context 2 Access Model — The Body's Boundaries</text>

  <!-- Container box -->
  <rect x="30" y="50" width="540" height="380" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="300" y="75" fill="#58a6ff" font-size="12" font-weight="700" text-anchor="middle">Docker Container (the body)</text>

  <!-- Agent -->
  <rect x="60" y="95" width="140" height="50" rx="6" fill="#1c2333" stroke="#f5c2e7" stroke-width="2"/>
  <text x="130" y="118" fill="#f5c2e7" font-size="12" font-weight="700" text-anchor="middle">Claude Code</text>
  <text x="130" y="133" fill="#8b949e" font-size="9" text-anchor="middle">the soul (LLM)</text>

  <!-- CAN DO -->
  <rect x="60" y="165" width="490" height="245" rx="6" fill="#0d2818" stroke="#3fb950"/>
  <text x="305" y="185" fill="#3fb950" font-size="11" font-weight="700" text-anchor="middle">CAN (defined paths)</text>

  <text x="80" y="210" fill="#3fb950" font-size="10">A2A Messages</text>
  <text x="250" y="210" fill="#8b949e" font-size="9">TRANSITION, OBJECT_QUERY/CREATE/UPDATE, HUMAN_INPUT</text>

  <text x="80" y="232" fill="#3fb950" font-size="10">Brain</text>
  <text x="250" y="232" fill="#8b949e" font-size="9">BRAIN_QUERY, BRAIN_CONTRIBUTE (via MCP)</text>

  <text x="80" y="254" fill="#3fb950" font-size="10">Project Workspace</text>
  <text x="250" y="254" fill="#8b949e" font-size="9">read + write (scoped to assigned project)</text>

  <text x="80" y="276" fill="#3fb950" font-size="10">Git</text>
  <text x="250" y="276" fill="#8b949e" font-size="9">commit, push (delegated credentials from Robin)</text>

  <text x="80" y="298" fill="#3fb950" font-size="10">Dev Tools</text>
  <text x="250" y="298" fill="#8b949e" font-size="9">node, npm, vitest, build tools (inside container)</text>

  <text x="80" y="320" fill="#3fb950" font-size="10">Internet</text>
  <text x="250" y="320" fill="#8b949e" font-size="9">Anthropic API (soul → source auth)</text>

  <text x="80" y="345" fill="#3fb950" font-size="10">Sandbox Browser</text>
  <text x="250" y="345" fill="#8b949e" font-size="9">AIO Sandbox MCP (L3 visual verification)</text>

  <line x1="80" y1="360" x2="530" y2="360" stroke="#30363d"/>

  <text x="80" y="380" fill="#f85149" font-size="10" font-weight="600">CANNOT</text>
  <text x="80" y="396" fill="#f85149" font-size="9">Direct PM database (SQLite)</text>
  <text x="280" y="396" fill="#f85149" font-size="9">Docker commands</text>
  <text x="420" y="396" fill="#f85149" font-size="9">SSH to host</text>

  <!-- External: A2A Server -->
  <rect x="610" y="95" width="260" height="120" rx="8" fill="#0d2818" stroke="#3fb950" stroke-width="2"/>
  <text x="740" y="120" fill="#3fb950" font-size="12" font-weight="700" text-anchor="middle">A2A Server</text>
  <text x="740" y="138" fill="#8b949e" font-size="9" text-anchor="middle">LLM-less protocol endpoint</text>
  <text x="740" y="156" fill="#c9d1d9" font-size="9" text-anchor="middle">validates → checks permissions →</text>
  <text x="740" y="170" fill="#c9d1d9" font-size="9" text-anchor="middle">updates DB → broadcasts SSE</text>
  <text x="740" y="190" fill="#484f58" font-size="8" text-anchor="middle">agents decide WHAT. server decides IF ALLOWED.</text>

  <!-- Arrow: Agent → A2A -->
  <line x1="200" y1="120" x2="610" y2="150" stroke="#3fb950" stroke-width="2"/>
  <polygon points="608,145 615,150 608,155" fill="#3fb950"/>

  <!-- DB behind A2A -->
  <rect x="660" y="240" width="160" height="40" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="740" y="260" fill="#8b949e" font-size="10" text-anchor="middle">SQLite (storage)</text>
  <text x="740" y="274" fill="#484f58" font-size="8" text-anchor="middle">only A2A server touches this</text>

  <line x1="740" y1="215" x2="740" y2="240" stroke="#30363d" stroke-width="1.5"/>

  <!-- Brain -->
  <rect x="660" y="310" width="160" height="40" rx="6" fill="#161b22" stroke="#bc8cff"/>
  <text x="740" y="330" fill="#bc8cff" font-size="10" font-weight="600" text-anchor="middle">Brain + Qdrant</text>
  <text x="740" y="344" fill="#8b949e" font-size="8" text-anchor="middle">shared knowledge</text>

  <!-- Git Remote -->
  <rect x="660" y="380" width="160" height="40" rx="6" fill="#161b22" stroke="#d29922"/>
  <text x="740" y="400" fill="#d29922" font-size="10" font-weight="600" text-anchor="middle">GitHub</text>
  <text x="740" y="414" fill="#8b949e" font-size="8" text-anchor="middle">git push (delegated creds)</text>
</svg>
