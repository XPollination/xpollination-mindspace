<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Step 1: First Visit — Chat Bubble Appears</title>
  <desc>
    AGENT-READABLE: User visits any authenticated Mindspace page. The chat-bubble component
    loads in the bottom-right corner. Behind the scenes, _ensureLiaison() calls GET /api/agents/me/liaison
    and gets { running: false }. No tmux session exists yet. The bubble is visible but no action
    is taken until the user clicks it.
  </desc>

  <rect width="900" height="500" fill="#0d1117" rx="8"/>
  <text x="450" y="30" fill="#3fb950" font-size="15" font-weight="700" text-anchor="middle">Step 1: First Visit — Chat Bubble Appears</text>

  <!-- Browser window frame -->
  <rect x="40" y="50" width="820" height="420" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <!-- Browser chrome -->
  <rect x="40" y="50" width="820" height="36" rx="8" fill="#21262d"/>
  <rect x="40" y="74" width="820" height="12" fill="#21262d"/>
  <!-- Browser dots -->
  <circle cx="62" cy="68" r="5" fill="#f85149"/>
  <circle cx="80" cy="68" r="5" fill="#d29922"/>
  <circle cx="98" cy="68" r="5" fill="#3fb950"/>
  <!-- URL bar -->
  <rect x="140" y="58" width="580" height="20" rx="4" fill="#0d1117" stroke="#30363d"/>
  <text x="156" y="72" fill="#8b949e" font-size="10">mindspace.xpollination.org/projects</text>

  <!-- Page content mockup -->
  <rect x="60" y="100" width="160" height="350" rx="4" fill="#0d1117" stroke="#30363d"/>
  <text x="140" y="125" fill="#c9d1d9" font-size="11" font-weight="600" text-anchor="middle">Navigation</text>
  <rect x="75" y="140" width="130" height="24" rx="3" fill="#21262d"/>
  <text x="140" y="156" fill="#58a6ff" font-size="10" text-anchor="middle">Projects</text>
  <rect x="75" y="170" width="130" height="24" rx="3" fill="#161b22"/>
  <text x="140" y="186" fill="#8b949e" font-size="10" text-anchor="middle">Knowledge</text>
  <rect x="75" y="200" width="130" height="24" rx="3" fill="#161b22"/>
  <text x="140" y="216" fill="#8b949e" font-size="10" text-anchor="middle">Agents</text>
  <rect x="75" y="230" width="130" height="24" rx="3" fill="#161b22"/>
  <text x="140" y="246" fill="#8b949e" font-size="10" text-anchor="middle">Settings</text>

  <!-- Main content area -->
  <rect x="240" y="100" width="600" height="350" rx="4" fill="#0d1117" stroke="#30363d"/>
  <text x="540" y="130" fill="#c9d1d9" font-size="14" font-weight="600" text-anchor="middle">My Projects</text>
  <!-- Project cards -->
  <rect x="270" y="150" width="250" height="80" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="290" y="175" fill="#c9d1d9" font-size="12" font-weight="600">xpollination-mindspace</text>
  <text x="290" y="195" fill="#8b949e" font-size="10">3 agents connected</text>
  <text x="290" y="215" fill="#3fb950" font-size="10">Active</text>

  <rect x="540" y="150" width="250" height="80" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="560" y="175" fill="#c9d1d9" font-size="12" font-weight="600">content-pipeline</text>
  <text x="560" y="195" fill="#8b949e" font-size="10">1 agent connected</text>
  <text x="560" y="215" fill="#3fb950" font-size="10">Active</text>

  <!-- CHAT BUBBLE — the star of this step -->
  <g transform="translate(790, 410)">
    <!-- Glow effect -->
    <circle cx="0" cy="0" r="30" fill="#ea580c" opacity="0.15"/>
    <!-- Bubble -->
    <circle cx="0" cy="0" r="24" fill="#ea580c" stroke="#fb923c" stroke-width="2"/>
    <text x="0" y="6" fill="#fff" font-size="18" text-anchor="middle">&#x1f4ac;</text>
  </g>

  <!-- Callout arrow pointing to bubble -->
  <line x1="700" y1="380" x2="770" y2="405" stroke="#fb923c" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="550" y="355" width="155" height="36" rx="6" fill="#fb923c" opacity="0.15" stroke="#fb923c"/>
  <text x="627" y="370" fill="#fb923c" font-size="10" font-weight="600" text-anchor="middle">Chat bubble appears</text>
  <text x="627" y="383" fill="#fb923c" font-size="9" text-anchor="middle">Click to interact with LIAISON</text>

  <!-- Behind the scenes box -->
  <rect x="270" y="280" width="520" height="140" rx="6" fill="#0d2818" stroke="#3fb950" stroke-dasharray="6,3"/>
  <text x="530" y="302" fill="#3fb950" font-size="11" font-weight="700" text-anchor="middle">Behind the Scenes</text>

  <text x="290" y="322" fill="#8b949e" font-size="10">1. mindspace-nav.js injects &lt;chat-bubble&gt;</text>
  <text x="290" y="340" fill="#8b949e" font-size="10">2. A2AClient created, _connectA2A() called</text>
  <text x="290" y="358" fill="#8b949e" font-size="10">3. GET /api/agents/me/liaison</text>
  <text x="520" y="358" fill="#f85149" font-size="10">→ { running: false }</text>
  <text x="290" y="376" fill="#8b949e" font-size="10">4. No sessionStorage flags set → setup flow pending</text>
  <text x="290" y="394" fill="#8b949e" font-size="10">5. Bubble waits for user click</text>
</svg>
