<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="system-ui, sans-serif">
  <title>Meeting Companion Agent — Meeting Lifecycle</title>
  <desc>
    AGENT-READABLE: Complete meeting lifecycle in 4 phases.
    PRE-MEETING: Participants authenticate via Mindspace JWT, receive LiveKit tokens, join room.
    ACTIVATION: One participant clicks agent button → system enumerates all participants → issues anonymous group token
    (SHA-256 of sorted participant IDs + random salt) → starts speech recognition → all capabilities go live.
    DURING MEETING: Two parallel tracks — (1) continuous thought distillation: speech → 3s buffer → LLM filter/distill →
    brain write with group_token, (2) on-demand voice commands: "Hey Mindspace" wake word → command capture → LLM intent
    parse → A2A message → response rendered in chat. Created objects auto-linked to thought trail as provenance.
    AFTER MEETING: Brain queryable by group_token for full thought trail. Provenance resolver computes per-person credit
    from internal group→members mapping. Artifacts (missions, capabilities) linked to originating thoughts.
  </desc>

  <!-- Background -->
  <rect width="900" height="700" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="450" y="35" fill="#c9d1d9" font-size="16" font-weight="700" text-anchor="middle">Meeting Lifecycle — From Join to Provenance</text>

  <!-- Phase 1: Pre-Meeting -->
  <rect x="30" y="55" width="840" height="80" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="50" y="78" fill="#8b949e" font-size="12" font-weight="700">PRE-MEETING</text>
  <circle cx="80" cy="105" r="5" fill="#3fb950"/>
  <text x="95" y="110" fill="#c9d1d9" font-size="11">Login → JWT</text>
  <line x1="170" y1="105" x2="200" y2="105" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="230" cy="105" r="5" fill="#3fb950"/>
  <text x="245" y="110" fill="#c9d1d9" font-size="11">LiveKit Token</text>
  <line x1="340" y1="105" x2="370" y2="105" stroke="#30363d" stroke-width="2"/>
  <circle cx="400" cy="105" r="5" fill="#3fb950"/>
  <text x="415" y="110" fill="#c9d1d9" font-size="11">Join Room</text>
  <line x1="480" y1="105" x2="510" y2="105" stroke="#30363d" stroke-width="2"/>
  <circle cx="540" cy="105" r="5" fill="#3fb950"/>
  <text x="555" y="110" fill="#c9d1d9" font-size="11">Video + Audio live</text>

  <!-- Phase 2: Activation -->
  <rect x="30" y="150" width="840" height="105" rx="6" fill="#1c2333" stroke="#58a6ff"/>
  <text x="50" y="175" fill="#58a6ff" font-size="12" font-weight="700">AGENT ACTIVATION (one person clicks 🤖)</text>

  <rect x="50" y="190" width="155" height="45" rx="4" fill="#0d1117" stroke="#58a6ff"/>
  <text x="127" y="210" fill="#c9d1d9" font-size="10" text-anchor="middle">1. Enumerate</text>
  <text x="127" y="224" fill="#c9d1d9" font-size="10" text-anchor="middle">participants</text>

  <text x="220" y="215" fill="#58a6ff" font-size="14">→</text>

  <rect x="240" y="190" width="155" height="45" rx="4" fill="#0d1117" stroke="#bc8cff"/>
  <text x="317" y="210" fill="#c9d1d9" font-size="10" text-anchor="middle">2. Issue group token</text>
  <text x="317" y="224" fill="#bc8cff" font-size="9" text-anchor="middle">SHA-256(ids + salt)</text>

  <text x="410" y="215" fill="#58a6ff" font-size="14">→</text>

  <rect x="430" y="190" width="155" height="45" rx="4" fill="#0d1117" stroke="#3fb950"/>
  <text x="507" y="210" fill="#c9d1d9" font-size="10" text-anchor="middle">3. Start speech</text>
  <text x="507" y="224" fill="#c9d1d9" font-size="10" text-anchor="middle">recognition</text>

  <text x="600" y="215" fill="#58a6ff" font-size="14">→</text>

  <rect x="620" y="190" width="230" height="45" rx="4" fill="#0d1117" stroke="#d29922"/>
  <text x="735" y="210" fill="#c9d1d9" font-size="10" text-anchor="middle">4. All capabilities LIVE</text>
  <text x="735" y="224" fill="#8b949e" font-size="9" text-anchor="middle">distill + commands + provenance</text>

  <!-- Phase 3: During Meeting — Two tracks -->
  <rect x="30" y="270" width="840" height="280" rx="6" fill="none" stroke="#30363d"/>
  <text x="50" y="295" fill="#c9d1d9" font-size="12" font-weight="700">DURING MEETING (parallel tracks)</text>

  <!-- Track A: Thought Distillation -->
  <rect x="50" y="310" width="380" height="220" rx="6" fill="#0d2818" stroke="#3fb950" opacity="0.8"/>
  <text x="240" y="335" fill="#3fb950" font-size="12" font-weight="700" text-anchor="middle">TRACK A: Continuous Thought Distillation</text>

  <rect x="70" y="350" width="130" height="35" rx="4" fill="#0d1117" stroke="#3fb950"/>
  <text x="135" y="372" fill="#c9d1d9" font-size="10" text-anchor="middle">All speech audio</text>

  <text x="215" y="370" fill="#3fb950" font-size="12">→</text>

  <rect x="230" y="350" width="100" height="35" rx="4" fill="#0d1117" stroke="#3fb950"/>
  <text x="280" y="372" fill="#c9d1d9" font-size="10" text-anchor="middle">3s buffer</text>

  <text x="345" y="370" fill="#3fb950" font-size="12">→</text>

  <rect x="360" y="350" width="50" height="35" rx="4" fill="#0d1117" stroke="#8b949e"/>
  <text x="385" y="372" fill="#c9d1d9" font-size="10" text-anchor="middle">LLM</text>

  <!-- Decision diamond approximated as rotated square -->
  <rect x="142" y="405" width="70" height="35" rx="4" fill="#0d1117" stroke="#3fb950"/>
  <text x="177" y="422" fill="#3fb950" font-size="10" text-anchor="middle" font-weight="600">Meaningful?</text>

  <text x="100" y="450" fill="#c9d1d9" font-size="10">No → discard</text>

  <text x="230" y="437" fill="#3fb950" font-size="10">Yes ↓</text>

  <rect x="200" y="450" width="200" height="45" rx="4" fill="#0d1117" stroke="#3fb950" stroke-width="2"/>
  <text x="300" y="468" fill="#3fb950" font-size="11" text-anchor="middle" font-weight="600">Brain Write</text>
  <text x="300" y="484" fill="#8b949e" font-size="9" text-anchor="middle">contributor_id = grp-xxxxx</text>

  <!-- Track B: Voice Commands -->
  <rect x="450" y="310" width="400" height="220" rx="6" fill="#2b1d0e" stroke="#d29922" opacity="0.8"/>
  <text x="650" y="335" fill="#d29922" font-size="12" font-weight="700" text-anchor="middle">TRACK B: Voice Commands (on demand)</text>

  <rect x="470" y="350" width="150" height="35" rx="4" fill="#0d1117" stroke="#d29922"/>
  <text x="545" y="365" fill="#d29922" font-size="10" text-anchor="middle" font-weight="600">"Hey Mindspace"</text>
  <text x="545" y="378" fill="#8b949e" font-size="9" text-anchor="middle">wake word detected</text>

  <text x="635" y="370" fill="#d29922" font-size="12">→</text>

  <rect x="650" y="350" width="100" height="35" rx="4" fill="#0d1117" stroke="#8b949e"/>
  <text x="700" y="372" fill="#c9d1d9" font-size="10" text-anchor="middle">LLM Parse</text>

  <text x="765" y="370" fill="#d29922" font-size="12">→</text>

  <rect x="775" y="350" width="55" height="35" rx="4" fill="#0d1117" stroke="#d29922"/>
  <text x="802" y="372" fill="#c9d1d9" font-size="9" text-anchor="middle">A2A</text>

  <rect x="490" y="405" width="340" height="30" rx="4" fill="#0d1117" stroke="#d29922"/>
  <text x="660" y="425" fill="#8b949e" font-size="10" text-anchor="middle">CREATE mission | UPDATE description | QUERY objects | TRANSITION state</text>

  <rect x="490" y="450" width="340" height="30" rx="4" fill="#0d1117" stroke="#d29922"/>
  <text x="660" y="470" fill="#d29922" font-size="11" text-anchor="middle">Response → Chat card in meeting UI</text>

  <rect x="490" y="490" width="340" height="30" rx="4" fill="#0d1117" stroke="#3fb950" stroke-dasharray="3"/>
  <text x="660" y="510" fill="#3fb950" font-size="10" text-anchor="middle">Auto-link: thought trail → created object (provenance)</text>

  <!-- Phase 4: After Meeting -->
  <rect x="30" y="565" width="840" height="110" rx="6" fill="#161b22" stroke="#bc8cff"/>
  <text x="50" y="590" fill="#bc8cff" font-size="12" font-weight="700">AFTER MEETING — Queryable Knowledge + Provenance</text>

  <rect x="50" y="605" width="240" height="50" rx="4" fill="#0d1117" stroke="#3fb950"/>
  <text x="170" y="625" fill="#3fb950" font-size="11" text-anchor="middle">"What did the group discuss?"</text>
  <text x="170" y="642" fill="#8b949e" font-size="9" text-anchor="middle">Brain query: contributor_id = grp-xxxxx</text>

  <rect x="310" y="605" width="240" height="50" rx="4" fill="#0d1117" stroke="#bc8cff"/>
  <text x="430" y="625" fill="#bc8cff" font-size="11" text-anchor="middle">Provenance Credit</text>
  <text x="430" y="642" fill="#8b949e" font-size="9" text-anchor="middle">grp-xxxxx → Thomas 60%, Robin 40%</text>

  <rect x="570" y="605" width="280" height="50" rx="4" fill="#0d1117" stroke="#d29922"/>
  <text x="710" y="625" fill="#d29922" font-size="11" text-anchor="middle">Artifacts + Thought Trail</text>
  <text x="710" y="642" fill="#8b949e" font-size="9" text-anchor="middle">Missions linked to originating group thoughts</text>
</svg>
