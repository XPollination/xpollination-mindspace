<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="system-ui, sans-serif">
  <title>Meeting Lifecycle v2 — Create, Evolve, Ship</title>
  <desc>
    AGENT-READABLE: Evolved meeting lifecycle. Meetings are collaborative editing sessions on living documents.
    PRE-MEETING: Auth → LiveKit token → Join. Optionally: load existing mission for review session.
    ACTIVATION: One person clicks agent → enumerate participants → group token → speech recognition starts.
    DURING MEETING (three parallel tracks): Track A = Thought Synthesis (topic-boundary detection,
    cross-speaker synthesis, per-speaker attribution, brain write with group_token). Track B = Voice
    Mission Editor (5 roles: Creator, Writer, Reviser, Reader, Navigator). Reviser is key: rewrites
    existing sections with new framing from conversation, detects cascade implications. Track C =
    Provenance (every action linked to thought trail, content_version tracked, synthesis attribution
    for credit). CRITICAL: Track A feeds context into Track B. "Write what we just discussed" resolves
    from synthesis. Tracks are coupled, not independent.
    AFTER MEETING: Mission evolved (not just created). Full revision history linked to thought trail.
    Provenance credit computed from synthesis attributions. Artifacts ready for execution (status: ready).
  </desc>

  <rect width="900" height="720" fill="#0d1117" rx="8"/>
  <text x="450" y="32" fill="#c9d1d9" font-size="15" font-weight="700" text-anchor="middle">Meeting Lifecycle v2 — Create, Evolve, Ship</text>

  <!-- Phase 1: Pre-Meeting -->
  <rect x="30" y="50" width="840" height="70" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="50" y="73" fill="#8b949e" font-size="11" font-weight="700">PRE-MEETING</text>
  <text x="50" y="100" fill="#c9d1d9" font-size="11">Auth → Token → Join Room</text>
  <text x="340" y="100" fill="#d29922" font-size="11">Optional: load existing mission for review/evolution session</text>

  <!-- Phase 2: Activation -->
  <rect x="30" y="135" width="840" height="65" rx="6" fill="#1c2333" stroke="#58a6ff"/>
  <text x="50" y="158" fill="#58a6ff" font-size="11" font-weight="700">AGENT ACTIVATION</text>
  <text x="50" y="185" fill="#c9d1d9" font-size="10">Enumerate participants → Group token (SHA-256) → Speech recognition ON → All capabilities LIVE</text>

  <!-- Phase 3: During Meeting -->
  <rect x="30" y="215" width="840" height="350" rx="6" fill="none" stroke="#30363d"/>
  <text x="50" y="240" fill="#c9d1d9" font-size="12" font-weight="700">DURING MEETING — Three Coupled Tracks</text>

  <!-- Track A: Synthesis -->
  <rect x="45" y="255" width="260" height="145" rx="6" fill="#0d2818" stroke="#3fb950" opacity="0.9"/>
  <text x="175" y="278" fill="#3fb950" font-size="11" font-weight="700" text-anchor="middle">Track A: Thought Synthesis</text>
  <text x="175" y="298" fill="#c9d1d9" font-size="9" text-anchor="middle">Topic-boundary detection</text>
  <text x="175" y="314" fill="#c9d1d9" font-size="9" text-anchor="middle">Cross-speaker synthesis (30-60s)</text>
  <text x="175" y="330" fill="#c9d1d9" font-size="9" text-anchor="middle">Per-speaker attribution</text>
  <text x="175" y="350" fill="#3fb950" font-size="10" text-anchor="middle">→ Brain write (group_token)</text>

  <rect x="60" y="370" width="230" height="22" rx="3" fill="#0d1117" stroke="#3fb950"/>
  <text x="175" y="386" fill="#8b949e" font-size="9" text-anchor="middle">Continuous, background, always-on</text>

  <!-- Coupling arrow A→B -->
  <line x1="305" y1="330" x2="335" y2="330" stroke="#d29922" stroke-width="2"/>
  <text x="320" y="322" fill="#d29922" font-size="8" text-anchor="middle">context</text>

  <!-- Track B: Voice Editor -->
  <rect x="335" y="255" width="310" height="255" rx="6" fill="#2b1d0e" stroke="#d29922" opacity="0.9"/>
  <text x="490" y="278" fill="#d29922" font-size="11" font-weight="700" text-anchor="middle">Track B: Voice Mission Editor</text>
  <text x="490" y="298" fill="#c9d1d9" font-size="9" text-anchor="middle">"Hey Mindspace" → command mode</text>

  <!-- Mini role boxes -->
  <rect x="350" y="310" width="85" height="30" rx="3" fill="#0d1117" stroke="#3fb950"/>
  <text x="392" y="330" fill="#3fb950" font-size="9" text-anchor="middle">Creator</text>

  <rect x="445" y="310" width="85" height="30" rx="3" fill="#0d1117" stroke="#58a6ff"/>
  <text x="487" y="330" fill="#58a6ff" font-size="9" text-anchor="middle">Writer</text>

  <rect x="540" y="310" width="90" height="30" rx="3" fill="#0d1117" stroke="#d29922" stroke-width="2"/>
  <text x="585" y="330" fill="#d29922" font-size="9" font-weight="700" text-anchor="middle">Reviser ★</text>

  <rect x="350" y="350" width="85" height="30" rx="3" fill="#0d1117" stroke="#bc8cff"/>
  <text x="392" y="370" fill="#bc8cff" font-size="9" text-anchor="middle">Reader</text>

  <rect x="445" y="350" width="85" height="30" rx="3" fill="#0d1117" stroke="#8b949e"/>
  <text x="487" y="370" fill="#c9d1d9" font-size="9" text-anchor="middle">Navigator</text>

  <!-- Reviser detail -->
  <rect x="350" y="395" width="280" height="50" rx="4" fill="#0d1117" stroke="#d29922"/>
  <text x="490" y="413" fill="#d29922" font-size="10" text-anchor="middle" font-weight="600">Reviser: find section → rewrite with</text>
  <text x="490" y="430" fill="#d29922" font-size="10" text-anchor="middle" font-weight="600">new framing → detect cascades</text>

  <rect x="350" y="455" width="280" height="30" rx="4" fill="#0d1117" stroke="#58a6ff"/>
  <text x="490" y="475" fill="#58a6ff" font-size="9" text-anchor="middle">Resolves: "that", "write it", "what Robin said", "update it too"</text>

  <rect x="350" y="490" width="280" height="15" rx="2" fill="#0d2818" stroke="#3fb950"/>
  <text x="490" y="501" fill="#3fb950" font-size="8" text-anchor="middle">Every edit → chat card + thought trail link + version++</text>

  <!-- Track C: Provenance -->
  <rect x="665" y="255" width="190" height="145" rx="6" fill="#1c1533" stroke="#bc8cff" opacity="0.9"/>
  <text x="760" y="278" fill="#bc8cff" font-size="11" font-weight="700" text-anchor="middle">Track C: Provenance</text>
  <text x="760" y="300" fill="#c9d1d9" font-size="9" text-anchor="middle">Group token wraps all</text>
  <text x="760" y="316" fill="#c9d1d9" font-size="9" text-anchor="middle">Synthesis attribution</text>
  <text x="760" y="332" fill="#c9d1d9" font-size="9" text-anchor="middle">→ per-person credit</text>
  <text x="760" y="352" fill="#c9d1d9" font-size="9" text-anchor="middle">Edit → linked to thought</text>
  <text x="760" y="370" fill="#c9d1d9" font-size="9" text-anchor="middle">Version history = meeting</text>
  <text x="760" y="386" fill="#bc8cff" font-size="9" text-anchor="middle">trail of WHY things changed</text>

  <!-- Coupling arrow B→C -->
  <line x1="645" y1="330" x2="665" y2="330" stroke="#bc8cff" stroke-width="2"/>

  <!-- Phase 4: After Meeting -->
  <rect x="30" y="580" width="840" height="120" rx="6" fill="#161b22" stroke="#3fb950"/>
  <text x="50" y="605" fill="#3fb950" font-size="12" font-weight="700">AFTER MEETING — Evolved Artifacts + Full Trail</text>

  <rect x="50" y="620" width="200" height="60" rx="4" fill="#0d1117" stroke="#d29922"/>
  <text x="150" y="642" fill="#d29922" font-size="11" text-anchor="middle" font-weight="600">Mission Evolved</text>
  <text x="150" y="660" fill="#8b949e" font-size="9" text-anchor="middle">Not just created — debated,</text>
  <text x="150" y="672" fill="#8b949e" font-size="9" text-anchor="middle">revised, framing shifted</text>

  <rect x="270" y="620" width="200" height="60" rx="4" fill="#0d1117" stroke="#3fb950"/>
  <text x="370" y="642" fill="#3fb950" font-size="11" text-anchor="middle" font-weight="600">Thought Trail</text>
  <text x="370" y="660" fill="#8b949e" font-size="9" text-anchor="middle">Every revision linked to</text>
  <text x="370" y="672" fill="#8b949e" font-size="9" text-anchor="middle">the insight that caused it</text>

  <rect x="490" y="620" width="180" height="60" rx="4" fill="#0d1117" stroke="#bc8cff"/>
  <text x="580" y="642" fill="#bc8cff" font-size="11" text-anchor="middle" font-weight="600">Credit Computed</text>
  <text x="580" y="660" fill="#8b949e" font-size="9" text-anchor="middle">Contribution-to-synthesis</text>
  <text x="580" y="672" fill="#8b949e" font-size="9" text-anchor="middle">not speech volume</text>

  <rect x="690" y="620" width="165" height="60" rx="4" fill="#0d1117" stroke="#58a6ff"/>
  <text x="772" y="642" fill="#58a6ff" font-size="11" text-anchor="middle" font-weight="600">Ready to Execute</text>
  <text x="772" y="660" fill="#8b949e" font-size="9" text-anchor="middle">Mission → ready status</text>
  <text x="772" y="672" fill="#8b949e" font-size="9" text-anchor="middle">Agent team picks it up</text>
</svg>
