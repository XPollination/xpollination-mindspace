<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="system-ui, sans-serif">
  <title>Event-Driven Workflow — Gates in the Event Handler, Not the Agent</title>
  <desc>
    AGENT-READABLE: Agents don't talk to each other. They PUBLISH events and SUBSCRIBE to events
    matching their role. The A2A server is the event bus. Workflow gates validate every transition
    in the event handler — not in the agent. Flow: LIAISON publishes TASK_CREATED → DEV subscribes,
    reacts by claiming → workflow gate validates ready→active → DEV publishes TASK_TRANSITIONED
    → QA subscribes, reacts by reviewing → gate validates → QA publishes → LIAISON subscribes,
    presents to Thomas. Each transition is validated independently. No agent knows the next agent.
  </desc>

  <rect width="1000" height="600" fill="#0d1117" rx="8"/>
  <text x="500" y="28" fill="#3fb950" font-size="15" font-weight="700" text-anchor="middle">Event-Driven Workflow — Gates in the Event Handler, Not the Agent</text>

  <!-- Event Bus (A2A Server) — central horizontal bar -->
  <rect x="50" y="240" width="900" height="60" rx="6" fill="#0d2818" stroke="#3fb950" stroke-width="3"/>
  <text x="500" y="265" fill="#3fb950" font-size="14" font-weight="700" text-anchor="middle">A2A Event Bus (Nervous System)</text>
  <text x="500" y="282" fill="#8b949e" font-size="10" text-anchor="middle">Validates every transition · Enforces gates · Routes to subscribers</text>

  <!-- LIAISON (left) -->
  <rect x="60" y="60" width="160" height="140" rx="10" fill="#161b22" stroke="#ea580c" stroke-width="2"/>
  <text x="140" y="85" fill="#ea580c" font-size="13" font-weight="700" text-anchor="middle">LIAISON</text>
  <text x="140" y="105" fill="#8b949e" font-size="9" text-anchor="middle">Subscribes to:</text>
  <text x="140" y="118" fill="#3fb950" font-size="9" text-anchor="middle">APPROVAL_NEEDED</text>
  <text x="140" y="131" fill="#3fb950" font-size="9" text-anchor="middle">REVIEW_NEEDED (final)</text>
  <text x="140" y="150" fill="#8b949e" font-size="9" text-anchor="middle">Publishes:</text>
  <text x="140" y="163" fill="#ea580c" font-size="9" text-anchor="middle">TASK_CREATED</text>
  <text x="140" y="176" fill="#ea580c" font-size="9" text-anchor="middle">TASK_APPROVED</text>

  <!-- DEV (center-left) -->
  <rect x="280" y="60" width="160" height="140" rx="10" fill="#161b22" stroke="#2563eb" stroke-width="2"/>
  <text x="360" y="85" fill="#2563eb" font-size="13" font-weight="700" text-anchor="middle">DEV</text>
  <text x="360" y="105" fill="#8b949e" font-size="9" text-anchor="middle">Subscribes to:</text>
  <text x="360" y="118" fill="#3fb950" font-size="9" text-anchor="middle">TASK_ASSIGNED (role=dev)</text>
  <text x="360" y="131" fill="#3fb950" font-size="9" text-anchor="middle">REWORK_NEEDED</text>
  <text x="360" y="150" fill="#8b949e" font-size="9" text-anchor="middle">Publishes:</text>
  <text x="360" y="163" fill="#2563eb" font-size="9" text-anchor="middle">TASK_TRANSITIONED</text>
  <text x="360" y="176" fill="#2563eb" font-size="9" text-anchor="middle">(active → review)</text>

  <!-- QA (center-right) -->
  <rect x="500" y="60" width="160" height="140" rx="10" fill="#161b22" stroke="#dc2626" stroke-width="2"/>
  <text x="580" y="85" fill="#dc2626" font-size="13" font-weight="700" text-anchor="middle">QA</text>
  <text x="580" y="105" fill="#8b949e" font-size="9" text-anchor="middle">Subscribes to:</text>
  <text x="580" y="118" fill="#3fb950" font-size="9" text-anchor="middle">REVIEW_NEEDED (role=qa)</text>
  <text x="580" y="131" fill="#3fb950" font-size="9" text-anchor="middle">TASK_ASSIGNED (role=qa)</text>
  <text x="580" y="150" fill="#8b949e" font-size="9" text-anchor="middle">Publishes:</text>
  <text x="580" y="163" fill="#dc2626" font-size="9" text-anchor="middle">TASK_TRANSITIONED</text>
  <text x="580" y="176" fill="#dc2626" font-size="9" text-anchor="middle">(review → approval)</text>

  <!-- PDSA (right) -->
  <rect x="720" y="60" width="160" height="140" rx="10" fill="#161b22" stroke="#bc8cff" stroke-width="2"/>
  <text x="800" y="85" fill="#bc8cff" font-size="13" font-weight="700" text-anchor="middle">PDSA</text>
  <text x="800" y="105" fill="#8b949e" font-size="9" text-anchor="middle">Subscribes to:</text>
  <text x="800" y="118" fill="#3fb950" font-size="9" text-anchor="middle">TASK_ASSIGNED (role=pdsa)</text>
  <text x="800" y="131" fill="#3fb950" font-size="9" text-anchor="middle">REVIEW_NEEDED (role=pdsa)</text>
  <text x="800" y="150" fill="#8b949e" font-size="9" text-anchor="middle">Publishes:</text>
  <text x="800" y="163" fill="#bc8cff" font-size="9" text-anchor="middle">TASK_TRANSITIONED</text>
  <text x="800" y="176" fill="#bc8cff" font-size="9" text-anchor="middle">(active → approval)</text>

  <!-- SSE connections (agents → bus) -->
  <line x1="140" y1="200" x2="140" y2="240" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="360" y1="200" x2="360" y2="240" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="580" y1="200" x2="580" y2="240" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="800" y1="200" x2="800" y2="240" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="500" y="225" fill="#8b949e" font-size="8" text-anchor="middle">SSE streams (persistent connections)</text>

  <!-- Workflow Gates (below bus) -->
  <rect x="100" y="340" width="800" height="80" rx="8" fill="#1a0d2e" stroke="#bc8cff" stroke-width="2"/>
  <text x="500" y="362" fill="#bc8cff" font-size="13" font-weight="700" text-anchor="middle">Workflow Gates (validated on EVERY transition)</text>

  <!-- Gate boxes -->
  <rect x="120" y="372" width="120" height="35" rx="4" fill="#0d1117" stroke="#ea580c"/>
  <text x="180" y="387" fill="#ea580c" font-size="8" font-weight="600" text-anchor="middle">State Machine</text>
  <text x="180" y="399" fill="#8b949e" font-size="7" text-anchor="middle">ready→active valid?</text>

  <rect x="260" y="372" width="120" height="35" rx="4" fill="#0d1117" stroke="#2563eb"/>
  <text x="320" y="387" fill="#2563eb" font-size="8" font-weight="600" text-anchor="middle">Role Check</text>
  <text x="320" y="399" fill="#8b949e" font-size="7" text-anchor="middle">actor matches role?</text>

  <rect x="400" y="372" width="120" height="35" rx="4" fill="#0d1117" stroke="#dc2626"/>
  <text x="460" y="387" fill="#dc2626" font-size="8" font-weight="600" text-anchor="middle">DNA Quality</text>
  <text x="460" y="399" fill="#8b949e" font-size="7" text-anchor="middle">required fields set?</text>

  <rect x="540" y="372" width="120" height="35" rx="4" fill="#0d1117" stroke="#3fb950"/>
  <text x="600" y="387" fill="#3fb950" font-size="8" font-weight="600" text-anchor="middle">Brain Gate</text>
  <text x="600" y="399" fill="#8b949e" font-size="7" text-anchor="middle">contributed learnings?</text>

  <rect x="680" y="372" width="120" height="35" rx="4" fill="#0d1117" stroke="#ea580c"/>
  <text x="740" y="387" fill="#ea580c" font-size="8" font-weight="600" text-anchor="middle">Human Gate</text>
  <text x="740" y="399" fill="#8b949e" font-size="7" text-anchor="middle">Thomas approved?</text>

  <!-- Arrow from bus to gates -->
  <line x1="500" y1="300" x2="500" y2="340" stroke="#bc8cff" stroke-width="2" marker-end="url(#ag)"/>
  <text x="530" y="325" fill="#bc8cff" font-size="9">Every event</text>

  <!-- Comparison at bottom -->
  <rect x="100" y="450" width="350" height="120" rx="8" fill="#161b22" stroke="#dc2626" stroke-width="1" stroke-dasharray="4"/>
  <text x="275" y="472" fill="#dc2626" font-size="11" font-weight="700" text-anchor="middle">OLD: Imperative (tightly coupled)</text>
  <text x="275" y="492" fill="#8b949e" font-size="9" text-anchor="middle">LIAISON tells DEV: "do this task"</text>
  <text x="275" y="507" fill="#8b949e" font-size="9" text-anchor="middle">DEV tells QA: "review this"</text>
  <text x="275" y="522" fill="#8b949e" font-size="9" text-anchor="middle">QA tells LIAISON: "approve this"</text>
  <text x="275" y="542" fill="#dc2626" font-size="9" text-anchor="middle">Each agent knows the next agent</text>
  <text x="275" y="557" fill="#dc2626" font-size="9" text-anchor="middle">Breaks if agent is missing</text>

  <rect x="550" y="450" width="350" height="120" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="725" y="472" fill="#3fb950" font-size="11" font-weight="700" text-anchor="middle">NEW: Event-Driven (decoupled)</text>
  <text x="725" y="492" fill="#8b949e" font-size="9" text-anchor="middle">LIAISON publishes: TASK_CREATED</text>
  <text x="725" y="507" fill="#8b949e" font-size="9" text-anchor="middle">DEV reacts → publishes: TRANSITIONED</text>
  <text x="725" y="522" fill="#8b949e" font-size="9" text-anchor="middle">QA reacts → publishes: REVIEWED</text>
  <text x="725" y="542" fill="#3fb950" font-size="9" text-anchor="middle">No agent knows any other agent</text>
  <text x="725" y="557" fill="#3fb950" font-size="9" text-anchor="middle">Works with 1 agent or 10 agents</text>

  <defs>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#bc8cff"/></marker>
  </defs>
</svg>
