<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <radialGradient id="space" cx="50%" cy="60%" r="80%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1120"/>
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef9c3" stop-opacity="1"/>
      <stop offset="40%" stop-color="#facc15" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#facc15" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Hintergrund: Sternenraum -->
  <rect width="900" height="560" fill="url(#space)"/>
  <!-- Sterne im Hintergrund -->
  <g fill="#cbd5e1" opacity="0.5">
    <circle cx="120" cy="80" r="1"/>
    <circle cx="180" cy="200" r="1.5"/>
    <circle cx="320" cy="60" r="1"/>
    <circle cx="450" cy="120" r="1"/>
    <circle cx="540" cy="80" r="1.5"/>
    <circle cx="680" cy="60" r="1"/>
    <circle cx="60" cy="280" r="1"/>
    <circle cx="240" cy="500" r="1"/>
    <circle cx="820" cy="280" r="1"/>
    <circle cx="850" cy="420" r="1.5"/>
    <circle cx="160" cy="400" r="1"/>
    <circle cx="700" cy="380" r="1"/>
  </g>

  <!-- Titel -->
  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">Die Karte</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#94a3b8">Sechs Objekte · ein Schiff · ein Stern</text>

  <!-- Navigatoren-Box (oben links) -->
  <g transform="translate(40,90)">
    <rect width="200" height="64" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="100" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Navigatoren</text>
    <text x="100" y="42" text-anchor="middle" font-size="11" fill="#cbd5e1">Thomas + Robin</text>
    <text x="100" y="56" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">PM-UI = Karte</text>
  </g>
  <!-- Pfeil von Navigatoren zum Schiff -->
  <line x1="240" y1="122" x2="430" y2="245" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="290" y="170" font-size="11" fill="#94a3b8" font-style="italic">lenken →</text>

  <!-- Stern (Vision) - oben rechts -->
  <circle cx="790" cy="120" r="70" fill="url(#starGlow)"/>
  <g transform="translate(790,120)">
    <polygon points="0,-26 7,-8 26,-8 11,4 17,22 0,11 -17,22 -11,4 -26,-8 -7,-8" fill="#fde047" stroke="#fbbf24" stroke-width="1"/>
  </g>
  <text x="790" y="215" text-anchor="middle" font-size="14" font-weight="700" fill="#fde047">★ STERN</text>
  <text x="790" y="232" text-anchor="middle" font-size="11" fill="#fcd34d">Vision — wird schärfer</text>

  <!-- Pfad: Mission A → Mission B → Entscheidung → Kurskorrektur → Stern -->
  <!-- Segment 1: gefahren (durchgezogen blau) -->
  <path d="M 90 470 Q 180 440 260 400" fill="none" stroke="#60a5fa" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Segment 2: gefahren -->
  <path d="M 260 400 Q 340 360 410 320" fill="none" stroke="#60a5fa" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Segment 3: gefahren bis Entdeckung -->
  <path d="M 410 320 Q 480 290 540 270" fill="none" stroke="#60a5fa" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Segment 4: Kurskorrektur (Knick) -->
  <path d="M 540 270 Q 600 200 660 180" fill="none" stroke="#ef4444" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Segment 5: weiter Richtung Stern (geplant, gestrichelt) -->
  <path d="M 660 180 Q 720 160 770 140" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="5 5"/>

  <!-- Wegpunkt 1 (Mission A) -->
  <circle cx="90" cy="470" r="12" fill="#1e3a8a" stroke="#93c5fd" stroke-width="2.5"/>
  <text x="90" y="500" text-anchor="middle" font-size="11" font-weight="700" fill="#dbeafe">Wegpunkt</text>
  <text x="90" y="514" text-anchor="middle" font-size="10" fill="#93c5fd">Mission A</text>

  <!-- Wegpunkt 2 (Mission B) -->
  <circle cx="260" cy="400" r="12" fill="#1e3a8a" stroke="#93c5fd" stroke-width="2.5"/>
  <text x="260" y="430" text-anchor="middle" font-size="10" fill="#93c5fd">Mission B</text>

  <!-- Verzweigung (Entscheidung) -->
  <g transform="translate(410,320)">
    <circle r="15" fill="#6d28d9" stroke="#c4b5fd" stroke-width="2.5"/>
    <text y="5" text-anchor="middle" font-size="14" font-weight="700" fill="#f5f3ff">⌥</text>
  </g>
  <text x="410" y="295" text-anchor="middle" font-size="11" font-weight="700" fill="#c4b5fd">Verzweigung</text>
  <text x="410" y="282" text-anchor="middle" font-size="10" fill="#a78bfa">(Entscheidung)</text>
  <!-- Verworfener Zweig (gestrichelt, abgehend) -->
  <path d="M 410 320 Q 380 400 350 480" fill="none" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4 4" stroke-linecap="round"/>
  <text x="345" y="500" text-anchor="middle" font-size="10" fill="#a78bfa" font-style="italic">verworfen</text>
  <text x="345" y="514" text-anchor="middle" font-size="9" fill="#a78bfa" font-style="italic">— wird gemerkt</text>

  <!-- Seitenpfad / Erkundung (kleine Schleife oben) -->
  <path d="M 540 270 Q 600 180 540 150 Q 480 180 540 270" fill="none" stroke="#fb923c" stroke-width="2.5" stroke-dasharray="3 3"/>
  <circle cx="540" cy="155" r="7" fill="#fb923c"/>
  <text x="540" y="135" text-anchor="middle" font-size="11" font-weight="700" fill="#fdba74">Seitenpfad</text>
  <text x="540" y="121" text-anchor="middle" font-size="10" fill="#fdba74">(Erkundung mit Verdikt)</text>

  <!-- Fund (Entdeckung) -->
  <g transform="translate(540,270)">
    <circle r="14" fill="#059669" stroke="#6ee7b7" stroke-width="2.5"/>
    <text y="5" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">✦</text>
  </g>
  <text x="490" y="265" text-anchor="end" font-size="11" font-weight="700" fill="#6ee7b7">Fund</text>
  <text x="490" y="278" text-anchor="end" font-size="10" fill="#34d399">verändert die Karte</text>

  <!-- Kurskorrektur Marker -->
  <g transform="translate(610,210)">
    <circle r="11" fill="#dc2626" stroke="#fca5a5" stroke-width="2"/>
    <text y="4" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">↺</text>
  </g>
  <text x="635" y="208" font-size="11" font-weight="700" fill="#fca5a5">Kurskorrektur</text>
  <text x="635" y="222" font-size="10" fill="#fca5a5">durch Fund ausgelöst</text>

  <!-- Schiff (Claude) - aktuelle Position -->
  <g transform="translate(660,180) rotate(-32)">
    <path d="M -20 -10 L 22 0 L -20 10 L -10 0 Z" fill="#e2e8f0" stroke="#0f172a" stroke-width="1.5"/>
    <circle cx="-4" cy="0" r="3" fill="#3b82f6"/>
  </g>
  <text x="690" y="158" font-size="12" font-weight="700" fill="#f1f5f9">⛵ Schiff</text>
  <text x="690" y="172" font-size="10" fill="#cbd5e1">(Claude + Body)</text>

  <!-- Legende unten -->
  <g transform="translate(40,535)" font-size="10" fill="#94a3b8">
    <text>─── gefahrener Pfad &#160;&#160; - - - geplant / verworfen &#160;&#160; ⌥ Entscheidung &#160;&#160; ✦ Fund &#160;&#160; ↺ Kurskorrektur &#160;&#160; ⛵ Schiff</text>
  </g>
</svg>
