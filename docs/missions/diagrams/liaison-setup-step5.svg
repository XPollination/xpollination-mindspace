<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Step 5: Return Visit — Chat Works</title>
  <desc>
    AGENT-READABLE: User navigates back to any Mindspace page. Chat bubble loads. _ensureLiaison()
    checks sessionStorage.getItem('cb_liaison_authenticated') → 'true'. Skips entire setup flow.
    GET /api/agents/me/liaison returns { running: true }. Chat bubble connects to LIAISON via A2A.
    User can type messages and get responses. The setup message never appears again.
  </desc>

  <rect width="900" height="500" fill="#0d1117" rx="8"/>
  <text x="450" y="30" fill="#3fb950" font-size="15" font-weight="700" text-anchor="middle">Step 5: Return Visit — Chat Just Works</text>

  <!-- Browser window frame -->
  <rect x="40" y="50" width="820" height="420" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <rect x="40" y="50" width="820" height="36" rx="8" fill="#21262d"/>
  <rect x="40" y="74" width="820" height="12" fill="#21262d"/>
  <circle cx="62" cy="68" r="5" fill="#f85149"/>
  <circle cx="80" cy="68" r="5" fill="#d29922"/>
  <circle cx="98" cy="68" r="5" fill="#3fb950"/>
  <rect x="140" y="58" width="580" height="20" rx="4" fill="#0d1117" stroke="#30363d"/>
  <text x="156" y="72" fill="#8b949e" font-size="10">mindspace.xpollination.org/knowledge</text>

  <!-- Page content (different page — knowledge) -->
  <rect x="60" y="100" width="780" height="110" rx="4" fill="#0d1117" stroke="#30363d"/>
  <text x="80" y="125" fill="#c9d1d9" font-size="14" font-weight="700">Knowledge Space</text>
  <text x="80" y="145" fill="#8b949e" font-size="11">46 best practices | 32 queries | 3 topics</text>
  <rect x="80" y="160" width="200" height="30" rx="4" fill="#161b22" stroke="#30363d"/>
  <text x="180" y="179" fill="#8b949e" font-size="10" text-anchor="middle">Search knowledge...</text>

  <!-- CHAT BUBBLE with green dot (connected) -->
  <g transform="translate(790, 410)">
    <circle cx="0" cy="0" r="24" fill="#ea580c" stroke="#fb923c" stroke-width="2"/>
    <text x="0" y="6" fill="#fff" font-size="18" text-anchor="middle">&#x1f4ac;</text>
    <!-- Green connected dot -->
    <circle cx="14" cy="-14" r="7" fill="#0d1117"/>
    <circle cx="14" cy="-14" r="5" fill="#3fb950"/>
  </g>

  <!-- EXPANDED CHAT PANEL — working conversation -->
  <rect x="440" y="130" width="380" height="310" rx="12" fill="#161b22" stroke="#3fb950" stroke-width="2"/>

  <!-- Panel header with green status -->
  <rect x="440" y="130" width="380" height="40" rx="12" fill="#0d2818"/>
  <rect x="440" y="155" width="380" height="15" fill="#0d2818"/>
  <text x="460" y="155" fill="#c9d1d9" font-size="12" font-weight="700">Decision Interface</text>
  <circle cx="790" cy="150" r="4" fill="#3fb950"/>
  <text x="778" y="154" fill="#3fb950" font-size="9" text-anchor="end">connected</text>

  <!-- Chat messages — real conversation -->
  <rect x="454" y="175" width="352" height="205" rx="4" fill="#0d1117"/>

  <!-- User message -->
  <rect x="530" y="185" width="260" height="32" rx="8" fill="#1c2333"/>
  <text x="540" y="198" fill="#58a6ff" font-size="9" font-weight="700">You</text>
  <text x="540" y="210" fill="#c9d1d9" font-size="10">What tasks are pending for review?</text>

  <!-- LIAISON response -->
  <rect x="464" y="225" width="300" height="50" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="474" y="238" fill="#f5c2e7" font-size="9" font-weight="700">LIAISON</text>
  <text x="474" y="252" fill="#c9d1d9" font-size="10">3 tasks in review: ms-chat-persist,</text>
  <text x="474" y="266" fill="#c9d1d9" font-size="10">ms-terminal-ws-fix, ms-agent-runtime</text>

  <!-- User message 2 -->
  <rect x="564" y="283" width="226" height="28" rx="8" fill="#1c2333"/>
  <text x="574" y="296" fill="#58a6ff" font-size="9" font-weight="700">You</text>
  <text x="574" y="308" fill="#c9d1d9" font-size="10">Approve ms-terminal-ws-fix</text>

  <!-- System transition -->
  <rect x="464" y="319" width="260" height="22" rx="4" fill="#0d2818"/>
  <text x="474" y="334" fill="#3fb950" font-size="9">System: ms-terminal-ws-fix &#x2192; complete</text>

  <!-- LIAISON confirmation -->
  <rect x="464" y="349" width="300" height="22" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="474" y="362" fill="#f5c2e7" font-size="9" font-weight="700">LIAISON</text>
  <text x="530" y="362" fill="#c9d1d9" font-size="10">Done. Task approved and completed.</text>

  <!-- Input bar -->
  <rect x="440" y="390" width="380" height="40" fill="#21262d" stroke="#30363d"/>
  <text x="460" y="414" fill="#484f58" font-size="11">Type a message to LIAISON...</text>
  <rect x="746" y="396" width="56" height="28" rx="4" fill="#ea580c"/>
  <text x="774" y="414" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">Send</text>

  <!-- NO SETUP MESSAGE callout -->
  <rect x="60" y="240" width="350" height="90" rx="8" fill="#0d2818" stroke="#3fb950" stroke-width="2"/>
  <text x="235" y="265" fill="#3fb950" font-size="13" font-weight="700" text-anchor="middle">No Setup Message!</text>
  <text x="80" y="285" fill="#8b949e" font-size="10">cb_liaison_authenticated = "true" in sessionStorage</text>
  <text x="80" y="300" fill="#8b949e" font-size="10">_ensureLiaison() skips setup → connects directly</text>
  <text x="80" y="315" fill="#8b949e" font-size="10">Works on any page: /projects, /knowledge, /agents...</text>

  <!-- Check mark -->
  <text x="235" y="238" fill="#3fb950" font-size="28" text-anchor="middle">&#x2713;</text>

  <!-- Arrow from callout to chat -->
  <line x1="410" y1="280" x2="440" y2="280" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
