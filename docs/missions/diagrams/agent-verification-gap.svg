<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" font-family="system-ui, sans-serif">
  <title>The Verification Gap — Why Backend Tests Miss UX Bugs</title>
  <desc>
    AGENT-READABLE: Three verification levels. Level 1 (grep/read): code exists in file — catches
    syntax errors and missing functions. Level 2 (curl): endpoint responds correctly — catches route
    bugs, auth failures, wrong status codes. Level 3 (browser): UX works end-to-end — catches
    rendering failures, event floods, WebSocket issues, visual layout bugs. Agents currently stop
    at Level 2 and report "verified". Thomas tests at Level 3 and finds bugs. The gap between
    Level 2 and Level 3 is where every visual bug lives.
  </desc>

  <rect width="1100" height="500" fill="#0d1117" rx="8"/>
  <text x="550" y="30" fill="#3fb950" font-size="16" font-weight="700" text-anchor="middle">The Verification Gap</text>
  <text x="550" y="50" fill="#8b949e" font-size="11" text-anchor="middle">Why backend tests miss UX bugs — and what each level catches</text>

  <!-- Level 1: Code Exists -->
  <rect x="40" y="75" width="320" height="170" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <rect x="40" y="75" width="320" height="32" rx="8" fill="#21262d"/>
  <rect x="40" y="99" width="320" height="8" fill="#21262d"/>
  <text x="200" y="96" fill="#8b949e" font-size="13" font-weight="700" text-anchor="middle">Level 1: Code Exists</text>
  <text x="60" y="128" fill="#c9d1d9" font-size="11">Tools: grep, Read, Glob</text>
  <text x="60" y="148" fill="#3fb950" font-size="10">Catches:</text>
  <text x="60" y="164" fill="#8b949e" font-size="10">  - Missing functions</text>
  <text x="60" y="178" fill="#8b949e" font-size="10">  - Wrong file paths</text>
  <text x="60" y="192" fill="#8b949e" font-size="10">  - Syntax errors in source</text>
  <text x="60" y="212" fill="#f85149" font-size="10">Misses:</text>
  <text x="60" y="226" fill="#484f58" font-size="10">  - Everything runtime</text>

  <!-- Arrow 1→2 -->
  <line x1="360" y1="160" x2="395" y2="160" stroke="#3fb950" stroke-width="2"/>
  <polygon points="393,155 400,160 393,165" fill="#3fb950"/>

  <!-- Level 2: Endpoint Responds -->
  <rect x="400" y="75" width="320" height="170" rx="8" fill="#161b22" stroke="#d29922" stroke-width="2"/>
  <rect x="400" y="75" width="320" height="32" rx="8" fill="#2d1b00"/>
  <rect x="400" y="99" width="320" height="8" fill="#2d1b00"/>
  <text x="560" y="96" fill="#d29922" font-size="13" font-weight="700" text-anchor="middle">Level 2: Endpoint Responds</text>
  <text x="420" y="128" fill="#c9d1d9" font-size="11">Tools: curl, WebFetch, node -e</text>
  <text x="420" y="148" fill="#3fb950" font-size="10">Catches:</text>
  <text x="420" y="164" fill="#8b949e" font-size="10">  - Route ordering bugs (404 vs 200)</text>
  <text x="420" y="178" fill="#8b949e" font-size="10">  - Auth failures, wrong JSON shape</text>
  <text x="420" y="192" fill="#8b949e" font-size="10">  - Missing sessionStorage keys in source</text>
  <text x="420" y="212" fill="#f85149" font-size="10">Misses:</text>
  <text x="420" y="226" fill="#484f58" font-size="10">  - WebSocket/SSE behavior, DOM rendering</text>

  <!-- GAP -->
  <rect x="725" y="100" width="10" height="120" rx="2" fill="#f85149" opacity="0.3"/>
  <text x="730" y="92" fill="#f85149" font-size="10" font-weight="700" text-anchor="middle">GAP</text>

  <!-- Arrow 2→3 -->
  <line x1="720" y1="160" x2="740" y2="160" stroke="#f85149" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="738,155 745,160 738,165" fill="#f85149"/>

  <!-- Level 3: UX Works -->
  <rect x="750" y="75" width="320" height="170" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <rect x="750" y="75" width="320" height="32" rx="8" fill="#0d2240"/>
  <rect x="750" y="99" width="320" height="8" fill="#0d2240"/>
  <text x="910" y="96" fill="#58a6ff" font-size="13" font-weight="700" text-anchor="middle">Level 3: UX Works</text>
  <text x="770" y="128" fill="#c9d1d9" font-size="11">Tools: AIO Sandbox (browser + CDP)</text>
  <text x="770" y="148" fill="#3fb950" font-size="10">Catches:</text>
  <text x="770" y="164" fill="#8b949e" font-size="10">  - Black terminal (WebSocket no data)</text>
  <text x="770" y="178" fill="#8b949e" font-size="10">  - SSE event flood (connected x100)</text>
  <text x="770" y="192" fill="#8b949e" font-size="10">  - Layout breaks, missing elements</text>
  <text x="770" y="208" fill="#8b949e" font-size="10">  - Click flows that silently fail</text>
  <text x="770" y="226" fill="#3fb950" font-size="10">  = What the user actually sees</text>

  <!-- Incident box -->
  <rect x="40" y="270" width="1030" height="100" rx="8" fill="#1c1117" stroke="#f85149"/>
  <text x="555" y="295" fill="#f85149" font-size="13" font-weight="700" text-anchor="middle">Incident: 2026-03-27 — LIAISON Setup UX</text>

  <text x="60" y="318" fill="#c9d1d9" font-size="11">Level 1 check: grep found cb_liaison_authenticated (3 refs), _addSetupMessage (2 refs), Complete setup (1 ref)</text>
  <text x="1040" y="318" fill="#3fb950" font-size="11" text-anchor="end">PASS</text>

  <text x="60" y="338" fill="#c9d1d9" font-size="11">Level 2 check: curl GET /api/agents/me/liaison returned { running: false } — route fix confirmed</text>
  <text x="1040" y="338" fill="#3fb950" font-size="11" text-anchor="end">PASS</text>

  <text x="60" y="358" fill="#c9d1d9" font-size="11">Level 3 check (Thomas in browser): black terminal, connected event flood every 3s, no agent output</text>
  <text x="1040" y="358" fill="#f85149" font-size="11" text-anchor="end">FAIL</text>

  <!-- Solution box -->
  <rect x="40" y="390" width="1030" height="90" rx="8" fill="#0d2818" stroke="#3fb950"/>
  <text x="555" y="415" fill="#3fb950" font-size="13" font-weight="700" text-anchor="middle">Solution: AIO Sandbox — Close the Gap</text>
  <text x="60" y="438" fill="#c9d1d9" font-size="11">Agent launches sandbox browser → navigates to beta → clicks through the flow → takes screenshots → sees visual bugs</text>
  <text x="60" y="458" fill="#c9d1d9" font-size="11">Before reporting "verified", agent must reach Level 3. Backend passing is necessary but NOT sufficient.</text>
  <text x="60" y="475" fill="#8b949e" font-size="10">Tool: github.com/agent-infra/sandbox — Docker container with Chrome CDP + VNC + MCP servers</text>
</svg>
