<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="system-ui, -apple-system, sans-serif">
  <text x="550" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a202c">Viz Screen Map: Every Screen, Every Flow</text>

  <!-- Screen 1: Mission Map (landing) -->
  <rect x="420" y="55" width="260" height="70" rx="8" fill="#ebf8ff" stroke="#4299e1" stroke-width="2"/>
  <text x="550" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6cb0">1. Mission Map</text>
  <text x="550" y="95" text-anchor="middle" font-size="9" fill="#4a7fb5">LANDING PAGE — all missions as cards</text>
  <text x="550" y="108" text-anchor="middle" font-size="8" fill="#718096">Active | Deprecated | Status badges</text>

  <!-- Screen 2: Mission Document -->
  <rect x="130" y="180" width="220" height="70" rx="8" fill="#f0fff4" stroke="#48bb78" stroke-width="2"/>
  <text x="240" y="205" text-anchor="middle" font-size="12" font-weight="bold" fill="#276749">2. Mission Document</text>
  <text x="240" y="220" text-anchor="middle" font-size="9" fill="#48bb78">/m/{id}/{slug} — PLATFORM-001 style</text>
  <text x="240" y="233" text-anchor="middle" font-size="8" fill="#718096">Content + Releases + Capabilities</text>

  <!-- Screen 3: Capability Document -->
  <rect x="420" y="180" width="260" height="70" rx="8" fill="#f0fff4" stroke="#48bb78" stroke-width="2"/>
  <text x="550" y="205" text-anchor="middle" font-size="12" font-weight="bold" fill="#276749">3. Capability Document</text>
  <text x="550" y="220" text-anchor="middle" font-size="9" fill="#48bb78">/c/{id}/{slug} — service spec</text>
  <text x="550" y="233" text-anchor="middle" font-size="8" fill="#718096">Content + Requirements + Version History</text>

  <!-- Screen 4: Requirement Document -->
  <rect x="750" y="180" width="220" height="70" rx="8" fill="#fffbeb" stroke="#d69e2e" stroke-width="2"/>
  <text x="860" y="205" text-anchor="middle" font-size="12" font-weight="bold" fill="#744210">4. Requirement Document</text>
  <text x="860" y="220" text-anchor="middle" font-size="9" fill="#d69e2e">/r/{id}/{slug} — EARS spec</text>
  <text x="860" y="233" text-anchor="middle" font-size="8" fill="#718096">9 sections + GWT + Tasks</text>

  <!-- Screen 5: Task Detail -->
  <rect x="750" y="310" width="220" height="70" rx="8" fill="#faf5ff" stroke="#9f7aea" stroke-width="2"/>
  <text x="860" y="335" text-anchor="middle" font-size="12" font-weight="bold" fill="#553c9a">5. Task Detail</text>
  <text x="860" y="350" text-anchor="middle" font-size="9" fill="#9f7aea">/t/{id}/{slug} — DNA view</text>
  <text x="860" y="363" text-anchor="middle" font-size="8" fill="#718096">Status + AC checklist + Scope</text>

  <!-- Screen 6: Search Results -->
  <rect x="30" y="55" width="200" height="70" rx="8" fill="#fed7e2" stroke="#ed64a6" stroke-width="2"/>
  <text x="130" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#97266d">6. Search Results</text>
  <text x="130" y="95" text-anchor="middle" font-size="9" fill="#ed64a6">Vector search — any query</text>
  <text x="130" y="108" text-anchor="middle" font-size="8" fill="#718096">Type badges + previews + scores</text>

  <!-- Screen 7: Kanban Board -->
  <rect x="30" y="310" width="200" height="70" rx="8" fill="#fefcbf" stroke="#d69e2e" stroke-width="2"/>
  <text x="130" y="335" text-anchor="middle" font-size="12" font-weight="bold" fill="#744210">7. Kanban Board</text>
  <text x="130" y="350" text-anchor="middle" font-size="9" fill="#d69e2e">Task management view</text>
  <text x="130" y="363" text-anchor="middle" font-size="8" fill="#718096">Columns by status + drag</text>

  <!-- Screen 8: Release Manager -->
  <rect x="270" y="310" width="200" height="70" rx="8" fill="#e9d8fd" stroke="#9f7aea" stroke-width="2"/>
  <text x="370" y="335" text-anchor="middle" font-size="12" font-weight="bold" fill="#553c9a">8. Release Manager</text>
  <text x="370" y="350" text-anchor="middle" font-size="9" fill="#9f7aea">Backlog → Release selection</text>
  <text x="370" y="363" text-anchor="middle" font-size="8" fill="#718096">Phase picker + release button</text>

  <!-- Screen 9: Version History -->
  <rect x="510" y="310" width="200" height="70" rx="8" fill="#c6f6d5" stroke="#48bb78" stroke-width="2"/>
  <text x="610" y="335" text-anchor="middle" font-size="12" font-weight="bold" fill="#276749">9. Version History</text>
  <text x="610" y="350" text-anchor="middle" font-size="9" fill="#48bb78">Capability version timeline</text>
  <text x="610" y="363" text-anchor="middle" font-size="8" fill="#718096">Tasks + Reqs + Commits per version</text>

  <!-- Arrows: navigation flows -->
  <!-- Mission Map → Mission Doc -->
  <line x1="460" y1="125" x2="310" y2="175" stroke="#4a5568" stroke-width="1.5"/>
  <text x="370" y="145" font-size="7" fill="#718096">click mission</text>

  <!-- Mission Map → Cap Doc (direct if known) -->
  <line x1="550" y1="125" x2="550" y2="175" stroke="#4a5568" stroke-width="1"/>

  <!-- Mission Doc → Cap Doc -->
  <line x1="350" y1="215" x2="415" y2="215" stroke="#48bb78" stroke-width="1.5"/>
  <text x="383" y="208" font-size="7" fill="#48bb78">drill into cap</text>

  <!-- Cap Doc → Req Doc -->
  <line x1="680" y1="215" x2="745" y2="215" stroke="#48bb78" stroke-width="1.5"/>
  <text x="713" y="208" font-size="7" fill="#48bb78">drill into req</text>

  <!-- Req Doc → Task Detail -->
  <line x1="860" y1="250" x2="860" y2="305" stroke="#d69e2e" stroke-width="1.5"/>
  <text x="875" y="280" font-size="7" fill="#d69e2e">drill into task</text>

  <!-- Back arrows (breadcrumbs) -->
  <line x1="240" y1="175" x2="440" y2="118" stroke="#a0aec0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="550" y1="175" x2="550" y2="130" stroke="#a0aec0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="750" y1="200" x2="685" y2="200" stroke="#a0aec0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="860" y1="305" x2="860" y2="255" stroke="#a0aec0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Cross-references (sideways) -->
  <line x1="240" y1="250" x2="130" y2="305" stroke="#ed64a6" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="155" y="275" font-size="7" fill="#ed64a6">search</text>

  <line x1="350" y1="230" x2="750" y2="200" stroke="#fc8181" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="550" y="240" font-size="7" fill="#fc8181">cross-ref: shared capability → all parent missions</text>

  <!-- Mission Doc → Release Manager -->
  <line x1="240" y1="250" x2="340" y2="305" stroke="#9f7aea" stroke-width="1.5"/>
  <text x="270" y="280" font-size="7" fill="#9f7aea">releases</text>

  <!-- Cap Doc → Version History -->
  <line x1="580" y1="250" x2="600" y2="305" stroke="#48bb78" stroke-width="1.5"/>
  <text x="600" y="280" font-size="7" fill="#48bb78">versions</text>

  <!-- Search → any page -->
  <line x1="130" y1="125" x2="240" y2="175" stroke="#ed64a6" stroke-width="1.5"/>
  <line x1="200" y1="90" x2="420" y2="90" stroke="#ed64a6" stroke-width="1"/>
  <line x1="230" y1="90" x2="750" y2="190" stroke="#ed64a6" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Kanban ↔ Task Detail -->
  <line x1="230" y1="345" x2="745" y2="340" stroke="#d69e2e" stroke-width="1"/>
  <text x="490" y="335" font-size="7" fill="#744210">click task card</text>

  <!-- Search bar label -->
  <rect x="30" y="420" width="1040" height="35" rx="4" fill="#f7fafc" stroke="#e2e8f0"/>
  <text x="550" y="442" text-anchor="middle" font-size="10" fill="#4a5568">Search bar is ALWAYS visible in header — accessible from EVERY screen. Results link to any document page.</text>

  <!-- Header bar -->
  <rect x="30" y="470" width="1040" height="55" rx="6" fill="#1a202c"/>
  <text x="80" y="498" font-size="14" font-weight="bold" fill="white">Mindspace</text>
  <rect x="250" y="487" width="300" height="24" rx="12" fill="#2d3748"/>
  <text x="270" y="503" font-size="9" fill="#a0aec0">&#x1F50D; Search the knowledge space...</text>
  <rect x="600" y="487" width="80" height="24" rx="4" fill="#4299e1"/>
  <text x="640" y="503" text-anchor="middle" font-size="9" font-weight="bold" fill="white">Knowledge</text>
  <rect x="690" y="487" width="55" height="24" rx="4" fill="#2d3748" stroke="#4a5568"/>
  <text x="717" y="503" text-anchor="middle" font-size="9" fill="#a0aec0">Tasks</text>
  <rect x="755" y="487" width="70" height="24" rx="4" fill="#2d3748" stroke="#4a5568"/>
  <text x="790" y="503" text-anchor="middle" font-size="9" fill="#a0aec0">Releases</text>
  <circle cx="850" cy="499" r="10" fill="#2d3748" stroke="#4a5568"/>
  <text x="850" y="503" text-anchor="middle" font-size="10">&#x2600;</text>

  <!-- Navigation legend -->
  <rect x="30" y="540" width="1040" height="140" rx="6" fill="#f7fafc" stroke="#e2e8f0"/>
  <text x="550" y="565" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a202c">Navigation Principles</text>

  <text x="50" y="590" font-size="9" fill="#4a5568">&#x2022; <tspan font-weight="bold">Drill down:</tspan> Mission → Capability → Requirement → Task (hierarchy traversal, the map)</text>
  <text x="50" y="608" font-size="9" fill="#4a5568">&#x2022; <tspan font-weight="bold">Drill up:</tspan> Breadcrumbs at top of every document page — click any ancestor</text>
  <text x="50" y="626" font-size="9" fill="#4a5568">&#x2022; <tspan font-weight="bold">Jump sideways:</tspan> Cross-references show shared capabilities across missions, sibling requirements</text>
  <text x="50" y="644" font-size="9" fill="#4a5568">&#x2022; <tspan font-weight="bold">Warp drive:</tspan> Search bar — type any concept, jump to any level in any mission</text>
  <text x="50" y="662" font-size="9" fill="#4a5568">&#x2022; <tspan font-weight="bold">Agent readable:</tspan> Every page at /{type}/{id}.md returns plain text with diagram descriptions inline</text>
</svg>