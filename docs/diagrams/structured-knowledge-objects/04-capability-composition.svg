<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, -apple-system, sans-serif">
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a202c">Capability Composition: Shared Services Across Missions</text>
  <text x="450" y="50" text-anchor="middle" font-size="11" fill="#718096">Capabilities are independent microservices — composed by missions, not owned</text>

  <!-- Active Missions (top row) -->
  <rect x="30" y="70" width="250" height="45" rx="8" fill="#ebf8ff" stroke="#4299e1" stroke-width="2"/>
  <text x="155" y="98" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6cb0">Structured Knowledge Objects</text>

  <rect x="330" y="70" width="250" height="45" rx="8" fill="#f0fff4" stroke="#48bb78" stroke-width="2"/>
  <text x="455" y="98" text-anchor="middle" font-size="12" font-weight="bold" fill="#276749">Self-Healing Infrastructure</text>

  <rect x="630" y="70" width="250" height="45" rx="8" fill="#fffbeb" stroke="#d69e2e" stroke-width="2"/>
  <text x="755" y="98" text-anchor="middle" font-size="12" font-weight="bold" fill="#744210">Fair Attribution</text>

  <!-- Shared Capabilities (middle) -->
  <rect x="50" y="170" width="130" height="50" rx="6" fill="#fed7d7" stroke="#fc8181" stroke-width="1.5"/>
  <text x="115" y="192" text-anchor="middle" font-size="10" font-weight="bold" fill="#c53030">CAP-AUTH</text>
  <text x="115" y="207" text-anchor="middle" font-size="8" fill="#e53e3e">Identity</text>

  <rect x="200" y="170" width="130" height="50" rx="6" fill="#fed7d7" stroke="#fc8181" stroke-width="1.5"/>
  <text x="265" y="192" text-anchor="middle" font-size="10" font-weight="bold" fill="#c53030">CAP-TASK-ENGINE</text>
  <text x="265" y="207" text-anchor="middle" font-size="8" fill="#e53e3e">Workflow</text>

  <rect x="350" y="170" width="130" height="50" rx="6" fill="#fed7d7" stroke="#fc8181" stroke-width="1.5"/>
  <text x="415" y="188" text-anchor="middle" font-size="10" font-weight="bold" fill="#c53030">CAP-AGENT</text>
  <text x="415" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#c53030">PROTOCOL</text>
  <text x="415" y="215" text-anchor="middle" font-size="8" fill="#e53e3e">A2A</text>

  <rect x="500" y="170" width="130" height="50" rx="6" fill="#fed7d7" stroke="#fc8181" stroke-width="1.5"/>
  <text x="565" y="188" text-anchor="middle" font-size="10" font-weight="bold" fill="#c53030">CAP-KNOWLEDGE</text>
  <text x="565" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#c53030">BROWSER</text>
  <text x="565" y="215" text-anchor="middle" font-size="8" fill="#e53e3e">Rendering</text>

  <rect x="650" y="170" width="100" height="50" rx="6" fill="#fed7d7" stroke="#fc8181" stroke-width="1.5"/>
  <text x="700" y="192" text-anchor="middle" font-size="10" font-weight="bold" fill="#c53030">CAP-DEPLOY</text>
  <text x="700" y="207" text-anchor="middle" font-size="8" fill="#e53e3e">Lifecycle</text>

  <rect x="770" y="170" width="100" height="50" rx="6" fill="#fed7d7" stroke="#fc8181" stroke-width="1.5"/>
  <text x="820" y="192" text-anchor="middle" font-size="10" font-weight="bold" fill="#c53030">CAP-HEALTH</text>
  <text x="820" y="207" text-anchor="middle" font-size="8" fill="#e53e3e">Monitor</text>

  <!-- COMPOSES arrows from missions to shared caps -->
  <!-- Structured Knowledge → AUTH, TASK-ENGINE, AGENT-PROTOCOL, KB -->
  <line x1="100" y1="115" x2="100" y2="165" stroke="#4299e1" stroke-width="1.5"/>
  <line x1="155" y1="115" x2="250" y2="165" stroke="#4299e1" stroke-width="1.5"/>
  <line x1="155" y1="115" x2="400" y2="165" stroke="#4299e1" stroke-width="1.2" stroke-dasharray="4,2"/>
  <line x1="200" y1="115" x2="550" y2="165" stroke="#4299e1" stroke-width="1.2" stroke-dasharray="4,2"/>

  <!-- Self-Healing → DEPLOY, HEALTH -->
  <line x1="420" y1="115" x2="700" y2="165" stroke="#48bb78" stroke-width="1.5"/>
  <line x1="480" y1="115" x2="820" y2="165" stroke="#48bb78" stroke-width="1.5"/>

  <!-- Fair Attribution → AUTH (shared!) -->
  <line x1="700" y1="115" x2="130" y2="165" stroke="#d69e2e" stroke-width="1.2" stroke-dasharray="4,2"/>

  <!-- Own Capabilities (bottom) -->
  <text x="155" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#4299e1">Own capabilities:</text>

  <rect x="30" y="285" width="120" height="40" rx="5" fill="#ebf8ff" stroke="#4299e1" stroke-width="1"/>
  <text x="90" y="305" text-anchor="middle" font-size="8" font-weight="bold" fill="#2b6cb0">OBJECT-INTERFACE</text>
  <text x="90" y="318" text-anchor="middle" font-size="7" fill="#4a7fb5">Templates</text>

  <rect x="160" y="285" width="120" height="40" rx="5" fill="#ebf8ff" stroke="#4299e1" stroke-width="1"/>
  <text x="220" y="305" text-anchor="middle" font-size="8" font-weight="bold" fill="#2b6cb0">CAP-PROVENANCE</text>
  <text x="220" y="318" text-anchor="middle" font-size="7" fill="#4a7fb5">Versioning</text>

  <rect x="290" y="285" width="120" height="40" rx="5" fill="#ebf8ff" stroke="#4299e1" stroke-width="1"/>
  <text x="350" y="305" text-anchor="middle" font-size="8" font-weight="bold" fill="#2b6cb0">OBJECT-GRAPH</text>
  <text x="350" y="318" text-anchor="middle" font-size="7" fill="#4a7fb5">Relationships</text>

  <rect x="420" y="285" width="120" height="40" rx="5" fill="#ebf8ff" stroke="#4299e1" stroke-width="1"/>
  <text x="480" y="305" text-anchor="middle" font-size="8" font-weight="bold" fill="#2b6cb0">VIZ-KNOWLEDGE</text>
  <text x="480" y="318" text-anchor="middle" font-size="7" fill="#4a7fb5">UI Redesign</text>

  <!-- Self-Healing own -->
  <text x="710" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#48bb78">Own:</text>
  <rect x="650" y="285" width="100" height="40" rx="5" fill="#f0fff4" stroke="#48bb78" stroke-width="1"/>
  <text x="700" y="305" text-anchor="middle" font-size="8" font-weight="bold" fill="#276749">WATCHDOG</text>
  <rect x="760" y="285" width="100" height="40" rx="5" fill="#f0fff4" stroke="#48bb78" stroke-width="1"/>
  <text x="810" y="305" text-anchor="middle" font-size="8" font-weight="bold" fill="#276749">STARTUP-CHECK</text>

  <!-- Fair Attribution own -->
  <text x="755" y="355" text-anchor="middle" font-size="11" font-weight="bold" fill="#d69e2e">Own:</text>
  <rect x="650" y="365" width="100" height="40" rx="5" fill="#fffbeb" stroke="#d69e2e" stroke-width="1"/>
  <text x="700" y="385" text-anchor="middle" font-size="8" font-weight="bold" fill="#744210">PROVENANCE</text>
  <rect x="760" y="365" width="100" height="40" rx="5" fill="#fffbeb" stroke="#d69e2e" stroke-width="1"/>
  <text x="810" y="385" text-anchor="middle" font-size="8" font-weight="bold" fill="#744210">TOKEN</text>

  <!-- Legend -->
  <rect x="30" y="370" width="280" height="110" rx="6" fill="#f7fafc" stroke="#e2e8f0"/>
  <text x="170" y="392" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a5568">The Microservice Principle</text>
  <text x="45" y="412" font-size="9" fill="#718096">Red boxes = shared capabilities (independent services)</text>
  <text x="45" y="428" font-size="9" fill="#718096">One service, multiple consumers</text>
  <text x="45" y="444" font-size="9" fill="#718096">Extending for one mission benefits all</text>
  <text x="45" y="460" font-size="9" fill="#718096">Provenance Chain follows composition graph</text>
</svg>