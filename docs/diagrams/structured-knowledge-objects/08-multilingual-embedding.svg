<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, -apple-system, sans-serif">
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a202c">Multilingual Vector Space: Concepts Not Words</text>
  <text x="450" y="50" text-anchor="middle" font-size="11" fill="#718096">Same concept in any language → near vectors</text>

  <!-- Before: separated clusters -->
  <rect x="30" y="70" width="400" height="200" rx="8" fill="#fff5f5" stroke="#fc8181" stroke-width="1.5"/>
  <text x="230" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#c53030">English-Primary Embeddings (current)</text>

  <!-- English cluster -->
  <circle cx="130" cy="160" r="40" fill="#ebf8ff" stroke="#4299e1" opacity="0.4"/>
  <text x="130" y="130" text-anchor="middle" font-size="8" fill="#2b6cb0">English cluster</text>
  <circle cx="110" cy="155" r="4" fill="#4299e1"/>
  <text x="110" y="168" text-anchor="middle" font-size="7" fill="#2b6cb0">relationship DB</text>
  <circle cx="145" cy="145" r="4" fill="#4299e1"/>
  <text x="155" y="142" font-size="7" fill="#2b6cb0">permissions</text>
  <circle cx="135" cy="175" r="4" fill="#4299e1"/>
  <text x="150" y="185" font-size="7" fill="#2b6cb0">access control</text>

  <!-- German cluster (far away) -->
  <circle cx="320" cy="190" r="35" fill="#fefcbf" stroke="#d69e2e" opacity="0.4"/>
  <text x="320" y="165" text-anchor="middle" font-size="8" fill="#744210">German cluster</text>
  <circle cx="305" cy="190" r="4" fill="#d69e2e"/>
  <text x="305" y="205" text-anchor="middle" font-size="7" fill="#744210">Beziehungen</text>
  <circle cx="335" cy="185" r="4" fill="#d69e2e"/>
  <text x="345" y="198" font-size="7" fill="#744210">Rechte</text>

  <!-- Distance line -->
  <line x1="150" y1="165" x2="300" y2="188" stroke="#e53e3e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="225" y="170" text-anchor="middle" font-size="9" font-weight="bold" fill="#e53e3e">cos=0.35</text>
  <text x="225" y="182" text-anchor="middle" font-size="8" fill="#e53e3e">same concept, far apart</text>

  <text x="230" y="250" text-anchor="middle" font-size="9" fill="#c53030">Search for "relationship database" misses "Beziehungs-Layer"</text>

  <!-- After: unified cluster -->
  <rect x="470" y="70" width="400" height="200" rx="8" fill="#f0fff4" stroke="#48bb78" stroke-width="1.5"/>
  <text x="670" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#276749">Multilingual Embeddings (target)</text>

  <!-- Single concept cluster -->
  <circle cx="670" cy="170" r="55" fill="#c6f6d5" stroke="#48bb78" opacity="0.3"/>
  <text x="670" y="130" text-anchor="middle" font-size="8" fill="#276749">concept: relationship-based access</text>

  <circle cx="645" cy="155" r="4" fill="#4299e1"/>
  <text x="625" y="150" font-size="7" fill="#2b6cb0">EN: permissions</text>
  <circle cx="680" cy="150" r="4" fill="#d69e2e"/>
  <text x="700" y="147" font-size="7" fill="#744210">DE: Rechte</text>
  <circle cx="655" cy="180" r="4" fill="#4299e1"/>
  <text x="635" y="193" font-size="7" fill="#2b6cb0">EN: relationship DB</text>
  <circle cx="690" cy="175" r="4" fill="#d69e2e"/>
  <text x="712" y="172" font-size="7" fill="#744210">DE: Beziehungen</text>
  <circle cx="670" cy="195" r="4" fill="#e53e3e"/>
  <text x="670" y="212" text-anchor="middle" font-size="7" fill="#c53030">ZH: &#x5173;&#x7CFB;&#x6570;&#x636E;&#x5E93;</text>

  <!-- Cosine score -->
  <text x="670" y="240" text-anchor="middle" font-size="9" font-weight="bold" fill="#276749">cos=0.88</text>
  <text x="670" y="252" text-anchor="middle" font-size="8" fill="#48bb78">same concept, near vectors</text>

  <!-- Model comparison -->
  <rect x="30" y="290" width="840" height="180" rx="8" fill="#f7fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="450" y="315" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a202c">Embedding Model Options</text>

  <!-- Option 1: Selected -->
  <rect x="50" y="330" width="250" height="120" rx="6" fill="#f0fff4" stroke="#48bb78" stroke-width="2"/>
  <text x="175" y="352" text-anchor="middle" font-size="11" font-weight="bold" fill="#276749">&#x2713; Multilingual Model</text>
  <text x="175" y="367" text-anchor="middle" font-size="9" fill="#48bb78">e.g. multilingual-e5-large</text>
  <text x="60" y="387" font-size="8" fill="#4a5568">+ All languages in one space</text>
  <text x="60" y="400" font-size="8" fill="#4a5568">+ Single embedding per thought</text>
  <text x="60" y="413" font-size="8" fill="#4a5568">+ Drop-in replacement for current model</text>
  <text x="60" y="426" font-size="8" fill="#4a5568">+ Proven at scale (Cohere, BGE-M3)</text>
  <text x="60" y="439" font-size="8" fill="#276749">SELECTED: simplest, most effective</text>

  <!-- Option 2 -->
  <rect x="320" y="330" width="250" height="120" rx="6" fill="white" stroke="#e2e8f0"/>
  <text x="445" y="352" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a5568">Translation Layer</text>
  <text x="445" y="367" text-anchor="middle" font-size="9" fill="#718096">Translate → embed canonical</text>
  <text x="330" y="387" font-size="8" fill="#4a5568">+ Highest same-language accuracy</text>
  <text x="330" y="400" font-size="8" fill="#4a5568">- Adds latency per contribution</text>
  <text x="330" y="413" font-size="8" fill="#4a5568">- Translation errors compound</text>
  <text x="330" y="426" font-size="8" fill="#4a5568">- Loses cultural nuance</text>
  <text x="330" y="439" font-size="8" fill="#718096">DEFERRED: complexity without clear gain</text>

  <!-- Option 3 -->
  <rect x="590" y="330" width="260" height="120" rx="6" fill="white" stroke="#e2e8f0"/>
  <text x="720" y="352" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a5568">Dual Embedding</text>
  <text x="720" y="367" text-anchor="middle" font-size="9" fill="#718096">Original + canonical embedding</text>
  <text x="600" y="387" font-size="8" fill="#4a5568">+ Best of both worlds</text>
  <text x="600" y="400" font-size="8" fill="#4a5568">- 2x storage per thought</text>
  <text x="600" y="413" font-size="8" fill="#4a5568">- Complex search merging</text>
  <text x="600" y="426" font-size="8" fill="#4a5568">- 2x embedding compute</text>
  <text x="600" y="439" font-size="8" fill="#718096">FUTURE: when scale demands it</text>
</svg>