<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="a7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a5568"/>
    </marker>
    <marker id="a7g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#48bb78"/>
    </marker>
    <marker id="a7p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9f7aea"/>
    </marker>
  </defs>

  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a202c">Proactive Thought Push: Knowledge Finds You</text>
  <text x="450" y="50" text-anchor="middle" font-size="11" fill="#718096">Brain detects relevant thoughts and pushes them to working agents via A2A SSE</text>

  <!-- Left: Robin contributes -->
  <rect x="30" y="80" width="200" height="100" rx="8" fill="#ebf8ff" stroke="#4299e1" stroke-width="2"/>
  <text x="130" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6cb0">Robin's Agent</text>
  <text x="130" y="125" text-anchor="middle" font-size="9" fill="#4a5568">Writes to brain:</text>
  <text x="130" y="140" text-anchor="middle" font-size="9" font-style="italic" fill="#4299e1">"SpiceDB ist als</text>
  <text x="130" y="153" text-anchor="middle" font-size="9" font-style="italic" fill="#4299e1">Relationship-Layer relevant"</text>
  <text x="130" y="170" text-anchor="middle" font-size="8" fill="#718096">(German, 12:36 UTC)</text>

  <!-- Center: Brain processes -->
  <rect x="290" y="70" width="310" height="180" rx="8" fill="#f0fff4" stroke="#48bb78" stroke-width="2"/>
  <text x="445" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#276749">Brain (Qdrant + Relevance Engine)</text>

  <!-- Step 1: Embed -->
  <rect x="310" y="110" width="120" height="40" rx="4" fill="white" stroke="#48bb78"/>
  <text x="370" y="127" text-anchor="middle" font-size="9" font-weight="bold" fill="#276749">1. Embed</text>
  <text x="370" y="141" text-anchor="middle" font-size="8" fill="#48bb78">Multilingual model</text>

  <!-- Step 2: Compare -->
  <rect x="310" y="160" width="120" height="40" rx="4" fill="white" stroke="#48bb78"/>
  <text x="370" y="177" text-anchor="middle" font-size="9" font-weight="bold" fill="#276749">2. Compare</text>
  <text x="370" y="191" text-anchor="middle" font-size="8" fill="#48bb78">vs active missions</text>

  <!-- Step 3: Score -->
  <rect x="460" y="110" width="120" height="40" rx="4" fill="white" stroke="#48bb78"/>
  <text x="520" y="127" text-anchor="middle" font-size="9" font-weight="bold" fill="#276749">3. Score</text>
  <text x="520" y="141" text-anchor="middle" font-size="8" fill="#48bb78">0.87 match!</text>

  <!-- Step 4: Push -->
  <rect x="460" y="160" width="120" height="40" rx="4" fill="#c6f6d5" stroke="#276749" stroke-width="1.5"/>
  <text x="520" y="177" text-anchor="middle" font-size="9" font-weight="bold" fill="#276749">4. PUSH</text>
  <text x="520" y="191" text-anchor="middle" font-size="8" fill="#276749">via A2A SSE</text>

  <!-- Right: LIAISON receives -->
  <rect x="660" y="80" width="210" height="170" rx="8" fill="#faf5ff" stroke="#9f7aea" stroke-width="2"/>
  <text x="765" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#553c9a">LIAISON Agent</text>
  <text x="765" y="125" text-anchor="middle" font-size="9" fill="#4a5568">Working on:</text>
  <text x="765" y="140" text-anchor="middle" font-size="9" font-weight="bold" fill="#553c9a">Structured Knowledge Objects</text>
  <text x="765" y="160" text-anchor="middle" font-size="9" fill="#276749">Receives SSE event:</text>

  <rect x="675" y="170" width="180" height="60" rx="4" fill="#e9d8fd" stroke="#9f7aea"/>
  <text x="765" y="188" text-anchor="middle" font-size="8" font-weight="bold" fill="#553c9a">THOUGHT_RELEVANT</text>
  <text x="765" y="201" text-anchor="middle" font-size="8" fill="#6b46c1">Robin: SpiceDB evaluation</text>
  <text x="765" y="214" text-anchor="middle" font-size="8" fill="#6b46c1">Match: 0.87 to your mission</text>

  <!-- Arrows -->
  <line x1="230" y1="130" x2="285" y2="130" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a7)"/>
  <text x="258" y="122" text-anchor="middle" font-size="8" fill="#718096">contribute</text>

  <line x1="600" y1="180" x2="655" y2="180" stroke="#9f7aea" stroke-width="2" marker-end="url(#a7p)"/>
  <text x="628" y="172" text-anchor="middle" font-size="8" fill="#9f7aea">SSE push</text>

  <!-- Below: The contrast -->
  <rect x="30" y="290" width="410" height="160" rx="8" fill="#fff5f5" stroke="#fc8181" stroke-width="1.5"/>
  <text x="235" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#c53030">Without Proactive Push (today)</text>

  <text x="50" y="340" font-size="9" fill="#4a5568">1. Robin writes SpiceDB thought (12:36)</text>
  <text x="50" y="356" font-size="9" fill="#4a5568">2. LIAISON searches brain (13:00)</text>
  <text x="50" y="372" font-size="9" fill="#e53e3e">3. Top-5 results miss it (rank 50+ in 7,592 vectors)</text>
  <text x="50" y="388" font-size="9" fill="#e53e3e">4. LIAISON concludes: "not found = not there"</text>
  <text x="50" y="404" font-size="9" fill="#e53e3e">5. Thomas manually bridges the gap</text>
  <text x="50" y="420" font-size="9" fill="#e53e3e">6. 6 queries, 45 minutes, wrong conclusion</text>

  <rect x="460" y="290" width="410" height="160" rx="8" fill="#f0fff4" stroke="#48bb78" stroke-width="1.5"/>
  <text x="665" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#276749">With Proactive Push (target)</text>

  <text x="480" y="340" font-size="9" fill="#4a5568">1. Robin writes SpiceDB thought (12:36)</text>
  <text x="480" y="356" font-size="9" fill="#48bb78">2. Brain computes similarity to active missions</text>
  <text x="480" y="372" font-size="9" fill="#48bb78">3. Score 0.87 to Structured Knowledge Objects</text>
  <text x="480" y="388" font-size="9" fill="#48bb78">4. A2A sends THOUGHT_RELEVANT to LIAISON (12:36)</text>
  <text x="480" y="404" font-size="9" fill="#48bb78">5. LIAISON sees it instantly, integrates into mission</text>
  <text x="480" y="420" font-size="9" fill="#48bb78">6. 0 queries, 0 seconds, correct knowledge</text>

  <!-- Bottom annotation -->
  <text x="450" y="470" text-anchor="middle" font-size="10" fill="#4a5568">A2A message type THOUGHT_RELEVANT extends SSE transport (same as TASK_AVAILABLE). Threshold configurable per mission.</text>
</svg>