  <text x="550" y="700" text-anchor="middle" font-size="9" fill="#4a5568">Phase 1 (6 reqs, no deps) → Phase 2 (2 reqs, needs P1) → Phase 3 (2 reqs, needs P2) → Phase 4 (6 reqs, needs P1+P3) → Phase 5 (5 reqs, needs P2+P3+P4)</text>
