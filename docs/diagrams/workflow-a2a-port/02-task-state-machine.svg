<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" font-family="monospace" font-size="11">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#7d8590"/>
    </marker>
    <marker id="ag" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#22c55e"/>
    </marker>
    <marker id="ar" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#ef4444"/>
    </marker>
    <marker id="ay" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#eab308"/>
    </marker>
  </defs>
  <rect width="960" height="700" rx="12" fill="#0d1117"/>

  <text x="480" y="30" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold">Task Twin State Machine — WORKFLOW.md v19 (OO Encoding)</text>
  <text x="480" y="48" text-anchor="middle" fill="#7d8590" font-size="10">Each state knows its transitions, actors, DNA requirements, and role assignments</text>

  <!-- Legend -->
  <rect x="700" y="60" width="240" height="105" rx="6" fill="#161b22" stroke="#1c2128"/>
  <text x="720" y="80" fill="#7d8590" font-size="10" font-weight="bold">Legend</text>
  <circle cx="720" cy="95" r="5" fill="#7d8590"/><text x="732" y="99" fill="#7d8590" font-size="10">Queue state</text>
  <circle cx="720" cy="113" r="5" fill="#22c55e"/><text x="732" y="117" fill="#22c55e" font-size="10">Active state</text>
  <circle cx="720" cy="131" r="5" fill="#eab308"/><text x="732" y="135" fill="#eab308" font-size="10">Review/Gate state</text>
  <circle cx="720" cy="149" r="5" fill="#ef4444"/><text x="732" y="153" fill="#ef4444" font-size="10">Terminal / Meta state</text>
  <text x="840" y="99" fill="#7d8590" font-size="9">+role = fixed role</text>
  <text x="840" y="117" fill="#7d8590" font-size="9">~role = variable role</text>

  <!-- PENDING -->
  <rect x="60" y="100" width="120" height="45" rx="8" fill="#1c2128" stroke="#7d8590" stroke-width="1.5"/>
  <text x="120" y="120" text-anchor="middle" fill="#7d8590" font-size="12" font-weight="bold">pending</text>
  <text x="120" y="135" text-anchor="middle" fill="#7d8590" font-size="9">~role</text>

  <!-- READY -->
  <rect x="260" y="100" width="120" height="45" rx="8" fill="#1c2128" stroke="#7d8590" stroke-width="1.5"/>
  <text x="320" y="120" text-anchor="middle" fill="#7d8590" font-size="12" font-weight="bold">ready</text>
  <text x="320" y="135" text-anchor="middle" fill="#7d8590" font-size="9">+pdsa (task) / ~role</text>

  <!-- ACTIVE -->
  <rect x="260" y="220" width="120" height="45" rx="8" fill="#1c2128" stroke="#22c55e" stroke-width="2"/>
  <text x="320" y="240" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold">active</text>
  <text x="320" y="255" text-anchor="middle" fill="#22c55e" font-size="9">~role (match claim)</text>

  <!-- APPROVAL -->
  <rect x="60" y="320" width="120" height="45" rx="8" fill="#1c2128" stroke="#eab308" stroke-width="1.5"/>
  <text x="120" y="340" text-anchor="middle" fill="#eab308" font-size="12" font-weight="bold">approval</text>
  <text x="120" y="355" text-anchor="middle" fill="#eab308" font-size="9">+liaison (human gate)</text>

  <!-- APPROVED -->
  <rect x="60" y="420" width="120" height="45" rx="8" fill="#1c2128" stroke="#22c55e" stroke-width="1.5"/>
  <text x="120" y="440" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold">approved</text>
  <text x="120" y="455" text-anchor="middle" fill="#22c55e" font-size="9">+qa</text>

  <!-- TESTING -->
  <rect x="260" y="420" width="120" height="45" rx="8" fill="#1c2128" stroke="#22c55e" stroke-width="1.5"/>
  <text x="320" y="440" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold">testing</text>
  <text x="320" y="455" text-anchor="middle" fill="#22c55e" font-size="9">+qa</text>

  <!-- REVIEW -->
  <rect x="500" y="220" width="120" height="45" rx="8" fill="#1c2128" stroke="#eab308" stroke-width="2"/>
  <text x="560" y="240" text-anchor="middle" fill="#eab308" font-size="12" font-weight="bold">review</text>
  <text x="560" y="255" text-anchor="middle" fill="#eab308" font-size="9">~role (chain: qa→pdsa→liaison)</text>

  <!-- REWORK -->
  <rect x="500" y="100" width="120" height="45" rx="8" fill="#1c2128" stroke="#ef4444" stroke-width="1.5"/>
  <text x="560" y="120" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">rework</text>
  <text x="560" y="135" text-anchor="middle" fill="#ef4444" font-size="9">~role (target_role)</text>

  <!-- COMPLETE -->
  <rect x="500" y="370" width="120" height="45" rx="8" fill="#1c2128" stroke="#22c55e" stroke-width="2"/>
  <text x="560" y="390" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold">complete</text>
  <text x="560" y="405" text-anchor="middle" fill="#22c55e" font-size="9">+liaison (immutable)</text>

  <!-- BLOCKED -->
  <rect x="730" y="310" width="120" height="45" rx="8" fill="#1c2128" stroke="#ef4444" stroke-width="1.5"/>
  <text x="790" y="330" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">blocked</text>
  <text x="790" y="345" text-anchor="middle" fill="#ef4444" font-size="9">meta (pause+resume)</text>

  <!-- CANCELLED -->
  <rect x="730" y="410" width="120" height="45" rx="8" fill="#1c2128" stroke="#ef4444" stroke-width="1"/>
  <text x="790" y="430" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">cancelled</text>
  <text x="790" y="445" text-anchor="middle" fill="#ef4444" font-size="9">+liaison (terminal)</text>

  <!-- Transitions -->
  <!-- pending → ready -->
  <line x1="180" y1="122" x2="255" y2="122" stroke="#7d8590" stroke-width="1" marker-end="url(#a)"/>
  <text x="218" y="116" text-anchor="middle" fill="#7d8590" font-size="8">pdsa/liaison</text>

  <!-- ready → active -->
  <line x1="320" y1="145" x2="320" y2="215" stroke="#22c55e" stroke-width="1.2" marker-end="url(#ag)"/>
  <text x="332" y="180" fill="#22c55e" font-size="8">claim</text>
  <text x="332" y="190" fill="#7d8590" font-size="7">DNA: memory_query_session</text>

  <!-- active → approval (PDSA path) -->
  <line x1="260" y1="250" x2="180" y2="325" stroke="#eab308" stroke-width="1.2" marker-end="url(#ay)"/>
  <text x="195" y="280" fill="#eab308" font-size="8">pdsa submits</text>
  <text x="195" y="290" fill="#7d8590" font-size="7">DNA: pdsa_ref, memory_id</text>

  <!-- active → review (DEV path) -->
  <line x1="380" y1="240" x2="495" y2="240" stroke="#eab308" stroke-width="1.2" marker-end="url(#ay)"/>
  <text x="437" y="234" text-anchor="middle" fill="#eab308" font-size="8">dev submits</text>

  <!-- approval → approved -->
  <line x1="120" y1="365" x2="120" y2="415" stroke="#22c55e" stroke-width="1.2" marker-end="url(#ag)"/>
  <text x="60" y="392" fill="#22c55e" font-size="8">human approve</text>

  <!-- approved → testing -->
  <line x1="180" y1="442" x2="255" y2="442" stroke="#22c55e" stroke-width="1.2" marker-end="url(#ag)"/>

  <!-- testing → ready(dev) -->
  <path d="M320,420 Q320,395 320,360 Q320,330 400,180 Q410,160 395,145 L385,145" stroke="#7d8590" stroke-width="1" fill="none" marker-end="url(#a)" stroke-dasharray="4,3"/>
  <text x="370" y="280" fill="#7d8590" font-size="8" transform="rotate(-75,370,280)">→ ready+dev</text>

  <!-- review chain: qa → pdsa → liaison → complete -->
  <text x="560" y="290" text-anchor="middle" fill="#eab308" font-size="8">review chain:</text>
  <text x="560" y="302" text-anchor="middle" fill="#7d8590" font-size="8">qa → pdsa → liaison</text>

  <!-- review → complete -->
  <line x1="560" y1="265" x2="560" y2="365" stroke="#22c55e" stroke-width="1.2" marker-end="url(#ag)"/>
  <text x="575" y="330" fill="#22c55e" font-size="8">liaison+human</text>
  <text x="575" y="340" fill="#7d8590" font-size="7">DNA: abstract_ref, tests</text>

  <!-- review → rework -->
  <line x1="560" y1="220" x2="560" y2="150" stroke="#ef4444" stroke-width="1" marker-end="url(#ar)"/>
  <text x="575" y="185" fill="#ef4444" font-size="8">reject</text>

  <!-- rework → active -->
  <line x1="500" y1="135" x2="380" y2="225" stroke="#22c55e" stroke-width="1" marker-end="url(#ag)" stroke-dasharray="4,3"/>
  <text x="425" y="170" fill="#22c55e" font-size="8">reclaim</text>

  <!-- approval → rework -->
  <path d="M120,320 Q120,290 250,150 Q350,80 500,110" stroke="#ef4444" stroke-width="1" fill="none" marker-end="url(#ar)" stroke-dasharray="4,3"/>
  <text x="280" y="90" fill="#ef4444" font-size="8">human reject</text>

  <!-- any → blocked -->
  <path d="M620,240 L725,325" stroke="#ef4444" stroke-width="1" fill="none" marker-end="url(#ar)" stroke-dasharray="3,3"/>
  <text x="700" y="280" fill="#ef4444" font-size="8">any → blocked</text>
  <text x="700" y="290" fill="#7d8590" font-size="7">DNA: blocked_reason</text>

  <!-- blocked → restore -->
  <text x="790" y="375" text-anchor="middle" fill="#7d8590" font-size="8">restore → from_state</text>

  <!-- complete → rework (human only) -->
  <path d="M620,390 Q650,390 630,160 Q625,125 620,125" stroke="#ef4444" stroke-width="1" fill="none" marker-end="url(#ar)" stroke-dasharray="3,3"/>
  <text x="650" y="260" fill="#ef4444" font-size="8" transform="rotate(-85,650,260)">human reopen</text>

  <!-- Quality Gates Box -->
  <rect x="30" y="520" width="900" height="165" rx="8" fill="#161b22" stroke="#1c2128"/>
  <text x="50" y="545" fill="#e6edf3" font-size="12" font-weight="bold">Quality Gates (Twin-Enforced)</text>

  <text x="50" y="570" fill="#eab308" font-size="10">ready→active:</text>
  <text x="180" y="570" fill="#7d8590" font-size="10">memory_query_session (brain queried). Dev/QA also need pdsa_ref (design exists).</text>

  <text x="50" y="590" fill="#eab308" font-size="10">active→approval:</text>
  <text x="180" y="590" fill="#7d8590" font-size="10">pdsa_ref (GitHub URL), memory_contribution_id (brain contributed).</text>

  <text x="50" y="610" fill="#eab308" font-size="10">approval→approved:</text>
  <text x="200" y="610" fill="#7d8590" font-size="10">human_answer + human_answer_at + approval_mode (v19 audit trail).</text>

  <text x="50" y="630" fill="#eab308" font-size="10">review→complete:</text>
  <text x="185" y="630" fill="#7d8590" font-size="10">abstract_ref (GitHub URL), test_pass = test_total (100%), liaison review + 3 Qs.</text>

  <text x="50" y="650" fill="#eab308" font-size="10">PR merge gate:</text>
  <text x="170" y="650" fill="#7d8590" font-size="10">If feature_branch: pr_url + pr_review_verdict="merge" + pr_merge_sha.</text>

  <text x="50" y="670" fill="#ef4444" font-size="10">PROHIBITED:</text>
  <text x="150" y="670" fill="#7d8590" font-size="10">Any transition not in twin's state machine is REJECTED. No exceptions.</text>
</svg>