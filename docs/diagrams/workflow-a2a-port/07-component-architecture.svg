<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 780" font-family="monospace" font-size="11">
  <defs>
    <marker id="a7" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#8ab4f8"/>
    </marker>
    <marker id="a7g" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#22c55e"/>
    </marker>
  </defs>
  <rect width="960" height="780" rx="12" fill="#0d1117"/>

  <text x="480" y="30" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">Component Architecture — What Needs to Exist</text>
  <text x="480" y="48" text-anchor="middle" fill="#7d8590" font-size="10">Every box is a module. Every arrow is a function call. No ambiguity.</text>

  <!-- External: Agents + Browser -->
  <rect x="30" y="70" width="900" height="55" rx="8" fill="#161b22" stroke="#8ab4f8" stroke-width="1"/>
  <text x="50" y="95" fill="#8ab4f8" font-size="11" font-weight="bold">CLIENTS</text>
  <rect x="150" y="78" width="100" height="30" rx="4" fill="#0d1117" stroke="#8ab4f8"/>
  <text x="200" y="97" text-anchor="middle" fill="#8ab4f8" font-size="9">Agent (CLI)</text>
  <rect x="270" y="78" width="100" height="30" rx="4" fill="#0d1117" stroke="#8ab4f8"/>
  <text x="320" y="97" text-anchor="middle" fill="#8ab4f8" font-size="9">Agent (curl)</text>
  <rect x="390" y="78" width="120" height="30" rx="4" fill="#0d1117" stroke="#8ab4f8"/>
  <text x="450" y="97" text-anchor="middle" fill="#8ab4f8" font-size="9">Browser (a2a-client.js)</text>
  <rect x="530" y="78" width="100" height="30" rx="4" fill="#0d1117" stroke="#8ab4f8"/>
  <text x="580" y="97" text-anchor="middle" fill="#8ab4f8" font-size="9">Robin (viz)</text>
  <text x="680" y="97" fill="#7d8590" font-size="9">All write via POST /a2a/message only</text>

  <!-- A2A MESSAGE ROUTER -->
  <rect x="30" y="145" width="900" height="60" rx="8" fill="#161b22" stroke="#22c55e" stroke-width="2"/>
  <text x="50" y="170" fill="#22c55e" font-size="13" font-weight="bold">A2A MESSAGE ROUTER</text>
  <text x="280" y="170" fill="#7d8590" font-size="10">api/routes/a2a-message.ts — dispatches by message type</text>
  <text x="50" y="192" fill="#7d8590" font-size="9">Auth → Agent lookup → Handler dispatch → Response with workflow_context</text>

  <!-- HANDLER LAYER -->
  <rect x="30" y="225" width="900" height="130" rx="8" fill="#161b22" stroke="#1c2128"/>
  <text x="50" y="248" fill="#e6edf3" font-size="12" font-weight="bold">MESSAGE HANDLERS</text>

  <rect x="50" y="260" width="130" height="45" rx="6" fill="#0d1117" stroke="#22c55e" stroke-width="1.5"/>
  <text x="115" y="280" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold">OBJECT_CREATE</text>
  <text x="115" y="295" text-anchor="middle" fill="#7d8590" font-size="8">handleObjectCreate()</text>

  <rect x="195" y="260" width="130" height="45" rx="6" fill="#0d1117" stroke="#8ab4f8" stroke-width="1.5"/>
  <text x="260" y="280" text-anchor="middle" fill="#8ab4f8" font-size="10" font-weight="bold">OBJECT_UPDATE</text>
  <text x="260" y="295" text-anchor="middle" fill="#7d8590" font-size="8">handleObjectUpdate()</text>

  <rect x="340" y="260" width="130" height="45" rx="6" fill="#0d1117" stroke="#eab308" stroke-width="1.5"/>
  <text x="405" y="280" text-anchor="middle" fill="#eab308" font-size="10" font-weight="bold">TRANSITION</text>
  <text x="405" y="295" text-anchor="middle" fill="#7d8590" font-size="8">handleTransition()</text>

  <rect x="485" y="260" width="130" height="45" rx="6" fill="#0d1117" stroke="#7d8590"/>
  <text x="550" y="280" text-anchor="middle" fill="#7d8590" font-size="10">OBJECT_QUERY</text>
  <text x="550" y="295" text-anchor="middle" fill="#7d8590" font-size="8">handleObjectQuery()</text>

  <rect x="630" y="260" width="130" height="45" rx="6" fill="#0d1117" stroke="#7d8590"/>
  <text x="695" y="280" text-anchor="middle" fill="#7d8590" font-size="10">HEARTBEAT</text>
  <text x="695" y="295" text-anchor="middle" fill="#7d8590" font-size="8">+ lease renewal</text>

  <rect x="775" y="260" width="140" height="45" rx="6" fill="#0d1117" stroke="#7d8590"/>
  <text x="845" y="280" text-anchor="middle" fill="#7d8590" font-size="10">CONNECT / DISCONNECT</text>
  <text x="845" y="295" text-anchor="middle" fill="#7d8590" font-size="8">+ ROLE_SWITCH</text>

  <text x="50" y="340" fill="#7d8590" font-size="9">Each handler: validate → delegate to twin → persist → broadcast → return with workflow_context</text>

  <!-- TWIN MODULE LAYER -->
  <rect x="30" y="375" width="580" height="155" rx="8" fill="#161b22" stroke="#eab308" stroke-width="1.5"/>
  <text x="50" y="400" fill="#eab308" font-size="12" font-weight="bold">TWIN MODULES</text>
  <text x="210" y="400" fill="#7d8590" font-size="10">src/twins/ — objects that know their own lifecycle</text>

  <rect x="50" y="415" width="125" height="50" rx="6" fill="#0d1117" stroke="#22c55e"/>
  <text x="113" y="433" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold">mission-twin</text>
  <text x="113" y="448" text-anchor="middle" fill="#7d8590" font-size="8">create validate diff</text>
  <text x="113" y="458" text-anchor="middle" fill="#eab308" font-size="8">transition context</text>

  <rect x="190" y="415" width="125" height="50" rx="6" fill="#0d1117" stroke="#8ab4f8"/>
  <text x="253" y="433" text-anchor="middle" fill="#8ab4f8" font-size="10" font-weight="bold">capability-twin</text>
  <text x="253" y="448" text-anchor="middle" fill="#7d8590" font-size="8">create validate diff</text>
  <text x="253" y="458" text-anchor="middle" fill="#eab308" font-size="8">transition context</text>

  <rect x="330" y="415" width="125" height="50" rx="6" fill="#0d1117" stroke="#eab308"/>
  <text x="393" y="433" text-anchor="middle" fill="#eab308" font-size="10" font-weight="bold">requirement-twin</text>
  <text x="393" y="448" text-anchor="middle" fill="#7d8590" font-size="8">create validate diff</text>
  <text x="393" y="458" text-anchor="middle" fill="#eab308" font-size="8">transition context</text>

  <rect x="470" y="415" width="125" height="50" rx="6" fill="#0d1117" stroke="#ef4444"/>
  <text x="533" y="433" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="bold">task-twin</text>
  <text x="533" y="448" text-anchor="middle" fill="#7d8590" font-size="8">create validate diff</text>
  <text x="533" y="458" text-anchor="middle" fill="#eab308" font-size="8">transition context</text>

  <text x="50" y="490" fill="#7d8590" font-size="9">Each twin exposes: create(payload), validate(twin), diff(old,new),</text>
  <text x="50" y="503" fill="#eab308" font-size="9" font-weight="bold">transition(from, to, actor, role, dna), workflowContext(twin)</text>
  <text x="50" y="516" fill="#7d8590" font-size="9">Twin carries: valid states, state machine, quality gates, role assignments, DNA requirements</text>

  <!-- CASCADE ENGINE -->
  <rect x="630" y="375" width="300" height="80" rx="8" fill="#161b22" stroke="#eab308" stroke-width="1.5"/>
  <text x="650" y="400" fill="#eab308" font-size="12" font-weight="bold">CASCADE ENGINE</text>
  <text x="650" y="418" fill="#7d8590" font-size="9">api/lib/cascade-engine.ts</text>
  <text x="660" y="436" fill="#7d8590" font-size="9">task complete → check requirement</text>
  <text x="660" y="449" fill="#7d8590" font-size="9">requirement met → check capability</text>
  <text x="660" y="462" fill="#eab308" font-size="9">capability complete → check mission</text>

  <!-- LEASE MANAGER -->
  <rect x="630" y="470" width="300" height="60" rx="8" fill="#161b22" stroke="#ef4444" stroke-width="1"/>
  <text x="650" y="495" fill="#ef4444" font-size="12" font-weight="bold">LEASE MANAGER</text>
  <text x="650" y="513" fill="#7d8590" font-size="9">api/lib/lease-manager.ts — grant, extend, expire, release</text>
  <text x="650" y="524" fill="#7d8590" font-size="9">Heartbeat renews. Expiry → task back to ready.</text>

  <!-- PERSISTENCE LAYER -->
  <rect x="30" y="550" width="580" height="70" rx="8" fill="#161b22" stroke="#7d8590"/>
  <text x="50" y="575" fill="#7d8590" font-size="12" font-weight="bold">PERSISTENCE</text>
  <text x="50" y="595" fill="#7d8590" font-size="9">SQLite: missions, capabilities, requirements, tasks, task_transitions, task_leases</text>
  <text x="50" y="608" fill="#7d8590" font-size="9">api/lib/twin-formatter.ts — DB row ↔ twin conversion</text>

  <!-- SSE MANAGER -->
  <rect x="630" y="550" width="300" height="70" rx="8" fill="#161b22" stroke="#22c55e"/>
  <text x="650" y="575" fill="#22c55e" font-size="12" font-weight="bold">SSE BROADCAST</text>
  <text x="650" y="595" fill="#7d8590" font-size="9">api/lib/sse-manager.ts — real-time events</text>
  <text x="650" y="608" fill="#7d8590" font-size="9">object_created, transition, task_available, etc.</text>

  <!-- GITHUB INTEGRATION -->
  <rect x="30" y="640" width="440" height="60" rx="8" fill="#161b22" stroke="#8ab4f8"/>
  <text x="50" y="665" fill="#8ab4f8" font-size="12" font-weight="bold">GITHUB INTEGRATION</text>
  <text x="50" y="685" fill="#7d8590" font-size="9">api/lib/github-client.ts — PAT-based. Branch create, PR create, PR merge, status checks.</text>

  <!-- BRAIN INTEGRATION -->
  <rect x="490" y="640" width="440" height="60" rx="8" fill="#161b22" stroke="#22c55e"/>
  <text x="510" y="665" fill="#22c55e" font-size="12" font-weight="bold">BRAIN INTEGRATION</text>
  <text x="510" y="685" fill="#7d8590" font-size="9">Contribute on transitions: TASK active→approval, review→complete, etc.</text>

  <!-- FILES SUMMARY -->
  <rect x="30" y="720" width="900" height="48" rx="8" fill="#161b22" stroke="#1c2128"/>
  <text x="50" y="742" fill="#e6edf3" font-size="11" font-weight="bold">Files to Create/Modify:</text>
  <text x="50" y="757" fill="#22c55e" font-size="9">NEW: api/lib/cascade-engine.ts, api/lib/lease-manager.ts, api/lib/github-client.ts</text>
  <text x="480" y="757" fill="#8ab4f8" font-size="9">MODIFY: src/twins/*.js (+transition, +context), api/routes/a2a-message.ts, viz/.../a2a-client.js</text>
</svg>