<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="monospace" font-size="12">
  <defs>
    <marker id="a3" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#8ab4f8"/>
    </marker>
    <marker id="a3r" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#ef4444"/>
    </marker>
    <marker id="a3g" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#22c55e"/>
    </marker>
  </defs>
  <rect width="900" height="600" rx="12" fill="#0d1117"/>

  <text x="450" y="32" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">Enforcement Architecture — No Bypass</text>
  <text x="450" y="52" text-anchor="middle" fill="#7d8590" font-size="11">How A2A prevents direct DB access, CLI writes, and SQL data mutations</text>

  <!-- LEFT: Old World (crossed out) -->
  <rect x="30" y="75" width="250" height="220" rx="10" fill="#161b22" stroke="#ef4444" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="155" y="100" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold">RETIRED (Bootstrap)</text>
  <line x1="80" y1="95" x2="230" y2="95" stroke="#ef4444" stroke-width="1.5"/>

  <text x="50" y="130" fill="#7d8590" font-size="11">interface-cli.js</text>
  <text x="50" y="150" fill="#7d8590" font-size="11">  create / transition</text>
  <text x="50" y="170" fill="#7d8590" font-size="11">  update-dna</text>

  <text x="50" y="200" fill="#7d8590" font-size="11">workflow-engine.js</text>
  <text x="50" y="220" fill="#7d8590" font-size="11">  ALLOWED_TRANSITIONS</text>
  <text x="50" y="240" fill="#7d8590" font-size="11">  validateTransition()</text>

  <text x="50" y="270" fill="#7d8590" font-size="11">SQL migrations (data)</text>
  <text x="50" y="285" fill="#7d8590" font-size="11">  INSERT INTO missions...</text>

  <!-- Big X -->
  <line x1="40" y1="115" x2="270" y2="280" stroke="#ef4444" stroke-width="3" opacity="0.4"/>
  <line x1="270" y1="115" x2="40" y2="280" stroke="#ef4444" stroke-width="3" opacity="0.4"/>

  <!-- RIGHT: New World -->
  <rect x="340" y="75" width="530" height="240" rx="10" fill="#161b22" stroke="#22c55e" stroke-width="2"/>
  <text x="605" y="100" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="bold">A2A — Single Write Authority</text>

  <!-- Layer 1 -->
  <rect x="360" y="115" width="490" height="40" rx="6" fill="#0d1117" stroke="#22c55e" stroke-width="1"/>
  <text x="380" y="140" fill="#22c55e" font-size="11" font-weight="bold">Layer 1: Protocol Gate</text>
  <text x="580" y="140" fill="#7d8590" font-size="10">All writes → POST /a2a/message → handler dispatch</text>

  <!-- Layer 2 -->
  <rect x="360" y="165" width="490" height="40" rx="6" fill="#0d1117" stroke="#eab308" stroke-width="1"/>
  <text x="380" y="190" fill="#eab308" font-size="11" font-weight="bold">Layer 2: Twin Validation</text>
  <text x="580" y="190" fill="#7d8590" font-size="10">Twin.create() / validate() / transition() → reject or accept</text>

  <!-- Layer 3 -->
  <rect x="360" y="215" width="490" height="40" rx="6" fill="#0d1117" stroke="#8ab4f8" stroke-width="1"/>
  <text x="380" y="240" fill="#8ab4f8" font-size="11" font-weight="bold">Layer 3: Persistence</text>
  <text x="580" y="240" fill="#7d8590" font-size="10">Atomic DB write + SSE broadcast + audit trail</text>

  <!-- Layer 4 -->
  <rect x="360" y="265" width="490" height="40" rx="6" fill="#0d1117" stroke="#7d8590" stroke-width="1"/>
  <text x="380" y="290" fill="#7d8590" font-size="11" font-weight="bold">Layer 4: Audit</text>
  <text x="580" y="290" fill="#7d8590" font-size="10">task_transitions log + brain contribution + SSE to viz</text>

  <!-- Agents flow in -->
  <rect x="50" y="350" width="130" height="40" rx="6" fill="#1c2128" stroke="#8ab4f8"/>
  <text x="115" y="375" text-anchor="middle" fill="#8ab4f8" font-size="11">Agent (PDSA)</text>

  <rect x="200" y="350" width="130" height="40" rx="6" fill="#1c2128" stroke="#8ab4f8"/>
  <text x="265" y="375" text-anchor="middle" fill="#8ab4f8" font-size="11">Agent (DEV)</text>

  <rect x="350" y="350" width="130" height="40" rx="6" fill="#1c2128" stroke="#8ab4f8"/>
  <text x="415" y="375" text-anchor="middle" fill="#8ab4f8" font-size="11">Agent (QA)</text>

  <rect x="500" y="350" width="140" height="40" rx="6" fill="#1c2128" stroke="#8ab4f8"/>
  <text x="570" y="375" text-anchor="middle" fill="#8ab4f8" font-size="11">Browser (Viz)</text>

  <rect x="660" y="350" width="150" height="40" rx="6" fill="#1c2128" stroke="#8ab4f8"/>
  <text x="735" y="375" text-anchor="middle" fill="#8ab4f8" font-size="11">Agent (LIAISON)</text>

  <!-- Funnel to A2A -->
  <line x1="115" y1="350" x2="450" y2="315" stroke="#8ab4f8" stroke-width="1" marker-end="url(#a3)"/>
  <line x1="265" y1="350" x2="450" y2="315" stroke="#8ab4f8" stroke-width="1" marker-end="url(#a3)"/>
  <line x1="415" y1="350" x2="500" y2="315" stroke="#8ab4f8" stroke-width="1" marker-end="url(#a3)"/>
  <line x1="570" y1="350" x2="580" y2="315" stroke="#8ab4f8" stroke-width="1" marker-end="url(#a3)"/>
  <line x1="735" y1="350" x2="650" y2="315" stroke="#8ab4f8" stroke-width="1" marker-end="url(#a3)"/>

  <!-- Blocked paths -->
  <rect x="30" y="430" width="840" height="155" rx="10" fill="#161b22" stroke="#ef4444" stroke-width="1"/>
  <text x="450" y="455" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold">Blocked Bypass Paths</text>

  <text x="60" y="485" fill="#ef4444" font-size="11">1. Direct SQL:</text>
  <text x="200" y="485" fill="#7d8590" font-size="11">DB file only writable by API process. Agents have no sqlite3 write access to prod.</text>

  <text x="60" y="510" fill="#ef4444" font-size="11">2. CLI writes:</text>
  <text x="200" y="510" fill="#7d8590" font-size="11">interface-cli.js create/transition/update-dna REMOVED. CLI retained as read-only diagnostic.</text>

  <text x="60" y="535" fill="#ef4444" font-size="11">3. SQL migrations:</text>
  <text x="200" y="535" fill="#7d8590" font-size="11">Migrations are schema-only (ALTER TABLE, CREATE INDEX). No INSERT/UPDATE data in migrations.</text>

  <text x="60" y="560" fill="#ef4444" font-size="11">4. REST API bypass:</text>
  <text x="200" y="560" fill="#7d8590" font-size="11">Task/mission REST routes become read-only. All writes redirect through A2A message handler.</text>

  <text x="60" y="580" fill="#ef4444" font-size="11">5. Agent checkout:</text>
  <text x="200" y="580" fill="#7d8590" font-size="11">Rules live server-side in twin modules. Agents cannot modify rules by switching branches.</text>
</svg>