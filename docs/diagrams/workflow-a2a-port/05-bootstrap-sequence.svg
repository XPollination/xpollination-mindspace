<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="monospace" font-size="11">
  <defs>
    <marker id="a5" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#22c55e"/>
    </marker>
  </defs>
  <rect width="900" height="480" rx="12" fill="#0d1117"/>

  <text x="450" y="30" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold">Bootstrap Sequence — Building the Gate From Inside</text>
  <text x="450" y="48" text-anchor="middle" fill="#7d8590" font-size="10">To build A2A, we must temporarily bypass A2A. Each phase closes a bypass path.</text>

  <!-- Phase 0 -->
  <rect x="30" y="70" width="260" height="175" rx="8" fill="#161b22" stroke="#ef4444" stroke-width="1.5"/>
  <text x="160" y="95" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold">Phase 0: Bootstrap</text>
  <text x="160" y="112" text-anchor="middle" fill="#7d8590" font-size="9">(we are here)</text>
  <text x="50" y="135" fill="#7d8590" font-size="10">Bypass paths OPEN:</text>
  <text x="60" y="152" fill="#ef4444" font-size="10">- CLI create/transition</text>
  <text x="60" y="167" fill="#ef4444" font-size="10">- SQL migrations (data)</text>
  <text x="60" y="182" fill="#ef4444" font-size="10">- Direct DB writes</text>
  <text x="50" y="205" fill="#22c55e" font-size="10">Work:</text>
  <text x="60" y="222" fill="#7d8590" font-size="10">Implement OBJECT_CREATE</text>
  <text x="60" y="237" fill="#7d8590" font-size="10">Implement OBJECT_UPDATE</text>

  <!-- Arrow -->
  <line x1="290" y1="155" x2="315" y2="155" stroke="#22c55e" stroke-width="2" marker-end="url(#a5)"/>

  <!-- Phase 1 -->
  <rect x="320" y="70" width="260" height="175" rx="8" fill="#161b22" stroke="#eab308" stroke-width="1.5"/>
  <text x="450" y="95" text-anchor="middle" fill="#eab308" font-size="13" font-weight="bold">Phase 1: Self-Hosting</text>
  <text x="450" y="112" text-anchor="middle" fill="#7d8590" font-size="9">(A2A creates objects)</text>
  <text x="340" y="135" fill="#7d8590" font-size="10">Closes:</text>
  <text x="350" y="152" fill="#22c55e" font-size="10">- SQL data migrations</text>
  <text x="350" y="167" fill="#7d8590" font-size="10">Still open:</text>
  <text x="360" y="182" fill="#eab308" font-size="10">- CLI as dev fallback</text>
  <text x="340" y="205" fill="#22c55e" font-size="10">Work:</text>
  <text x="350" y="222" fill="#7d8590" font-size="10">Wire TRANSITION to twin</text>
  <text x="350" y="237" fill="#7d8590" font-size="10">Add workflow_context</text>

  <!-- Arrow -->
  <line x1="580" y1="155" x2="605" y2="155" stroke="#22c55e" stroke-width="2" marker-end="url(#a5)"/>

  <!-- Phase 2 -->
  <rect x="610" y="70" width="260" height="175" rx="8" fill="#161b22" stroke="#22c55e" stroke-width="2"/>
  <text x="740" y="95" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="bold">Phase 2: Gate Closure</text>
  <text x="740" y="112" text-anchor="middle" fill="#7d8590" font-size="9">(A2A is the only path)</text>
  <text x="630" y="135" fill="#7d8590" font-size="10">Closes:</text>
  <text x="640" y="152" fill="#22c55e" font-size="10">- CLI write access</text>
  <text x="640" y="167" fill="#22c55e" font-size="10">- Direct DB writes</text>
  <text x="640" y="182" fill="#22c55e" font-size="10">- REST write routes</text>
  <text x="630" y="205" fill="#22c55e" font-size="10">Result:</text>
  <text x="640" y="222" fill="#22c55e" font-size="10">A2A = single write path</text>
  <text x="640" y="237" fill="#22c55e" font-size="10">All agents use A2A client</text>

  <!-- Implementation Steps -->
  <rect x="30" y="265" width="840" height="200" rx="8" fill="#161b22" stroke="#1c2128"/>
  <text x="450" y="290" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">Implementation Sequence (I do this alone — critical path)</text>

  <!-- Step boxes -->
  <rect x="50" y="305" width="155" height="55" rx="6" fill="#0d1117" stroke="#ef4444"/>
  <text x="128" y="325" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="bold">Step 1</text>
  <text x="128" y="340" text-anchor="middle" fill="#7d8590" font-size="9">Twin state machines</text>
  <text x="128" y="352" text-anchor="middle" fill="#7d8590" font-size="8">task-twin.js + transition()</text>

  <line x1="205" y1="332" x2="220" y2="332" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a5)"/>

  <rect x="225" y="305" width="155" height="55" rx="6" fill="#0d1117" stroke="#eab308"/>
  <text x="303" y="325" text-anchor="middle" fill="#eab308" font-size="10" font-weight="bold">Step 2</text>
  <text x="303" y="340" text-anchor="middle" fill="#7d8590" font-size="9">OBJECT_CREATE handler</text>
  <text x="303" y="352" text-anchor="middle" fill="#7d8590" font-size="8">a2a-message.ts</text>

  <line x1="380" y1="332" x2="395" y2="332" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a5)"/>

  <rect x="400" y="305" width="155" height="55" rx="6" fill="#0d1117" stroke="#eab308"/>
  <text x="478" y="325" text-anchor="middle" fill="#eab308" font-size="10" font-weight="bold">Step 3</text>
  <text x="478" y="340" text-anchor="middle" fill="#7d8590" font-size="9">OBJECT_UPDATE handler</text>
  <text x="478" y="352" text-anchor="middle" fill="#7d8590" font-size="8">+ DNA validation</text>

  <line x1="555" y1="332" x2="570" y2="332" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a5)"/>

  <rect x="575" y="305" width="155" height="55" rx="6" fill="#0d1117" stroke="#22c55e"/>
  <text x="653" y="325" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold">Step 4</text>
  <text x="653" y="340" text-anchor="middle" fill="#7d8590" font-size="9">TRANSITION rewrite</text>
  <text x="653" y="352" text-anchor="middle" fill="#7d8590" font-size="8">Twin.transition() + gates</text>

  <line x1="730" y1="332" x2="745" y2="332" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a5)"/>

  <rect x="750" y="305" width="110" height="55" rx="6" fill="#0d1117" stroke="#22c55e"/>
  <text x="805" y="325" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold">Step 5</text>
  <text x="805" y="340" text-anchor="middle" fill="#7d8590" font-size="9">workflow_context</text>
  <text x="805" y="352" text-anchor="middle" fill="#7d8590" font-size="8">in all responses</text>

  <!-- Row 2 -->
  <rect x="50" y="380" width="155" height="55" rx="6" fill="#0d1117" stroke="#22c55e"/>
  <text x="128" y="400" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold">Step 6</text>
  <text x="128" y="415" text-anchor="middle" fill="#7d8590" font-size="9">a2a-client.js update</text>
  <text x="128" y="427" text-anchor="middle" fill="#7d8590" font-size="8">create() + update()</text>

  <line x1="205" y1="407" x2="220" y2="407" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a5)"/>

  <rect x="225" y="380" width="155" height="55" rx="6" fill="#0d1117" stroke="#22c55e"/>
  <text x="303" y="400" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold">Step 7</text>
  <text x="303" y="415" text-anchor="middle" fill="#7d8590" font-size="9">CLI → read-only</text>
  <text x="303" y="427" text-anchor="middle" fill="#7d8590" font-size="8">Remove write commands</text>

  <line x1="380" y1="407" x2="395" y2="407" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a5)"/>

  <rect x="400" y="380" width="155" height="55" rx="6" fill="#0d1117" stroke="#22c55e"/>
  <text x="478" y="400" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold">Step 8</text>
  <text x="478" y="415" text-anchor="middle" fill="#7d8590" font-size="9">Agent skills update</text>
  <text x="478" y="427" text-anchor="middle" fill="#7d8590" font-size="8">Use A2A not CLI</text>

  <line x1="555" y1="407" x2="570" y2="407" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a5)"/>

  <rect x="575" y="380" width="155" height="55" rx="6" fill="#0d1117" stroke="#ef4444" stroke-width="2"/>
  <text x="653" y="400" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="bold">Step 9</text>
  <text x="653" y="415" text-anchor="middle" fill="#ef4444" font-size="9">GATE CLOSED</text>
  <text x="653" y="427" text-anchor="middle" fill="#ef4444" font-size="8">No bypass path remains</text>

  <!-- Verification -->
  <rect x="750" y="380" width="110" height="55" rx="6" fill="#0d1117" stroke="#22c55e" stroke-width="2"/>
  <text x="805" y="400" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold">Verify</text>
  <text x="805" y="415" text-anchor="middle" fill="#7d8590" font-size="9">Acceptance test</text>
  <text x="805" y="427" text-anchor="middle" fill="#7d8590" font-size="8">Full lifecycle</text>
</svg>