<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; fill: #1a1a2e; }
    .subtitle { font-size: 12px; fill: #666; }
    .phase { font-size: 12px; font-weight: 600; fill: #fff; }
    .desc { font-size: 10px; fill: #333; }
    .mono { font-size: 9px; fill: #1a1a2e; font-family: monospace; }
  </style>

  <text x="400" y="28" text-anchor="middle" class="title">Ownership Transfer — Private to Public</text>
  <text x="400" y="46" text-anchor="middle" class="subtitle">A twin's journey: created on device → docked at station → transferred to collective ownership → persistent forever</text>

  <!-- Phase 1: Created on device -->
  <rect x="30" y="70" width="170" height="160" rx="8" fill="#e07020" opacity="0.15" stroke="#e07020" stroke-width="1.5"/>
  <rect x="30" y="70" width="170" height="26" rx="8" fill="#e07020"/>
  <text x="115" y="88" text-anchor="middle" class="phase">1. CREATED</text>
  <text x="45" y="112" class="desc">Twin born on Thomas's device</text>
  <text x="45" y="128" class="mono">owner: thomas.pichler</text>
  <text x="45" y="142" class="mono">visibility: private</text>
  <text x="45" y="156" class="mono">persists: device only</text>
  <text x="45" y="176" class="desc">Browser IndexedDB</text>
  <text x="45" y="190" class="desc">Diagrams embedded</text>
  <text x="45" y="204" class="desc">Signed by thomas's key</text>
  <text x="45" y="220" font-size="9" fill="#e07020" font-weight="600">Only Thomas can see it</text>

  <!-- Arrow 1→2 -->
  <line x1="200" y1="150" x2="230" y2="150" stroke="#666" stroke-width="1.5" marker-end="url(#oa)"/>
  <text x="215" y="142" font-size="8" fill="#666">dock</text>

  <!-- Phase 2: Docked at station -->
  <rect x="230" y="70" width="170" height="160" rx="8" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="230" y="70" width="170" height="26" rx="8" fill="#3b82f6"/>
  <text x="315" y="88" text-anchor="middle" class="phase">2. DOCKED</text>
  <text x="245" y="112" class="desc">Twin cached at xp0.ai hub</text>
  <text x="245" y="128" class="mono">owner: thomas.pichler</text>
  <text x="245" y="142" class="mono">visibility: project members</text>
  <text x="245" y="156" class="mono">persists: device + station</text>
  <text x="245" y="176" class="desc">Station indexes for search</text>
  <text x="245" y="190" class="desc">Other project members see it</text>
  <text x="245" y="204" class="desc">Provenance event: DOCK</text>
  <text x="245" y="220" font-size="9" fill="#3b82f6" font-weight="600">Thomas still owns it</text>

  <!-- Arrow 2→3 -->
  <line x1="400" y1="150" x2="430" y2="150" stroke="#666" stroke-width="1.5" marker-end="url(#oa)"/>
  <text x="412" y="140" font-size="7" fill="#666">transfer</text>

  <!-- Phase 3: Ownership transferred -->
  <rect x="430" y="70" width="170" height="160" rx="8" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="430" y="70" width="170" height="26" rx="8" fill="#22c55e"/>
  <text x="515" y="88" text-anchor="middle" class="phase">3. TRANSFERRED</text>
  <text x="445" y="112" class="desc">Ownership → xp0.ai collective</text>
  <text x="445" y="128" class="mono">owner: xp0.ai</text>
  <text x="445" y="142" class="mono">visibility: public</text>
  <text x="445" y="156" class="mono">persists: ALL stations</text>
  <text x="445" y="176" class="desc">Signed transfer event:</text>
  <text x="445" y="190" class="mono">from: thomas → to: xp0.ai</text>
  <text x="445" y="204" class="mono">sig: ed25519(thomas_key)</text>
  <text x="445" y="220" font-size="9" fill="#22c55e" font-weight="600">Collective owns it now</text>

  <!-- Arrow 3→4 -->
  <line x1="600" y1="150" x2="630" y2="150" stroke="#666" stroke-width="1.5" marker-end="url(#oa)"/>
  <text x="612" y="140" font-size="7" fill="#666">replicate</text>

  <!-- Phase 4: Persistent forever -->
  <rect x="630" y="70" width="140" height="160" rx="8" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="630" y="70" width="140" height="26" rx="8" fill="#8b5cf6"/>
  <text x="700" y="88" text-anchor="middle" class="phase">4. PERSISTENT</text>
  <text x="645" y="112" class="desc">Available forever</text>
  <text x="645" y="128" class="mono">CID: bafyr...abc</text>
  <text x="645" y="142" class="mono">replicas: N stations</text>
  <text x="645" y="162" class="desc">Any station serves it</text>
  <text x="645" y="176" class="desc">IPFS-compatible CID</text>
  <text x="645" y="190" class="desc">If 1 station dies,</text>
  <text x="645" y="204" class="desc">others still have it</text>
  <text x="645" y="220" font-size="9" fill="#8b5cf6" font-weight="600">Cannot be deleted</text>

  <!-- Provenance chain below -->
  <rect x="30" y="260" width="740" height="100" rx="8" fill="#1a1a2e" opacity="0.05" stroke="#1a1a2e" stroke-width="1"/>
  <text x="400" y="282" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a2e">Provenance Chain (append-only, signed, forge-proof)</text>

  <rect x="55" y="296" width="110" height="42" rx="4" fill="#e07020" opacity="0.2"/>
  <text x="110" y="312" text-anchor="middle" font-size="9" fill="#1a1a2e" font-weight="500">CREATE</text>
  <text x="110" y="326" text-anchor="middle" font-size="8" fill="#888">thomas • cid:abc</text>

  <line x1="165" y1="317" x2="195" y2="317" stroke="#666" stroke-width="1"/>
  <rect x="195" y="296" width="110" height="42" rx="4" fill="#3b82f6" opacity="0.2"/>
  <text x="250" y="312" text-anchor="middle" font-size="9" fill="#1a1a2e" font-weight="500">UPDATE (agent)</text>
  <text x="250" y="326" text-anchor="middle" font-size="8" fill="#888">pdsa • cid:def</text>

  <line x1="305" y1="317" x2="335" y2="317" stroke="#666" stroke-width="1"/>
  <rect x="335" y="296" width="110" height="42" rx="4" fill="#3b82f6" opacity="0.2"/>
  <text x="390" y="312" text-anchor="middle" font-size="9" fill="#1a1a2e" font-weight="500">UPDATE (dev)</text>
  <text x="390" y="326" text-anchor="middle" font-size="8" fill="#888">dev • cid:ghi</text>

  <line x1="445" y1="317" x2="475" y2="317" stroke="#666" stroke-width="1"/>
  <rect x="475" y="296" width="130" height="42" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="540" y="312" text-anchor="middle" font-size="9" fill="#1a1a2e" font-weight="600">OWNERSHIP_TRANSFER</text>
  <text x="540" y="326" text-anchor="middle" font-size="8" fill="#888">thomas→xp0.ai • cid:jkl</text>

  <line x1="605" y1="317" x2="635" y2="317" stroke="#666" stroke-width="1"/>
  <rect x="635" y="296" width="110" height="42" rx="4" fill="#8b5cf6" opacity="0.2"/>
  <text x="690" y="312" text-anchor="middle" font-size="9" fill="#1a1a2e" font-weight="500">UPDATE (robin)</text>
  <text x="690" y="326" text-anchor="middle" font-size="8" fill="#888">robin • cid:mno</text>

  <!-- Token flow -->
  <rect x="30" y="380" width="740" height="80" rx="8" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="402" text-anchor="middle" font-size="13" font-weight="600" fill="#f59e0b">Token Attribution (flows backward through chain)</text>
  <text x="400" y="422" text-anchor="middle" font-size="10" fill="#666">When capability-as-service generates revenue → tokens distribute to every contributor:</text>
  <text x="400" y="440" text-anchor="middle" font-size="10" fill="#333">thomas (create + transfer) • pdsa (design) • dev (implementation) • robin (extension)</text>
  <text x="400" y="455" text-anchor="middle" font-size="9" fill="#f59e0b">Payout = Role Share × Reputation (0.7-1.5x) × Fruit Score (0.5-2.0x) × Service Revenue</text>

  <defs><marker id="oa" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#666"/></marker></defs>
</svg>
