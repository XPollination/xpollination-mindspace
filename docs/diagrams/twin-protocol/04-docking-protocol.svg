<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; fill: #1a1a2e; }
    .subtitle { font-size: 12px; fill: #666; }
    .actor { font-size: 12px; font-weight: 600; fill: #1a1a2e; }
    .msg { font-size: 10px; fill: #333; }
    .msg-type { font-size: 9px; font-weight: 600; }
    .note { font-size: 9px; fill: #888; font-style: italic; }
  </style>

  <text x="400" y="28" text-anchor="middle" class="title">Docking Protocol — Twin Arrives at Station</text>
  <text x="400" y="46" text-anchor="middle" class="subtitle">Sequence: connect → announce → negotiate version → sync → dock</text>

  <!-- Actors -->
  <rect x="80" y="65" width="120" height="30" rx="6" fill="#e07020"/>
  <text x="140" y="85" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">Browser (Twin)</text>
  <line x1="140" y1="95" x2="140" y2="560" stroke="#e07020" stroke-width="1" stroke-dasharray="4,4"/>

  <rect x="340" y="65" width="120" height="30" rx="6" fill="#1a1a2e"/>
  <text x="400" y="85" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">Station (Hub)</text>
  <line x1="400" y1="95" x2="400" y2="560" stroke="#1a1a2e" stroke-width="1" stroke-dasharray="4,4"/>

  <rect x="600" y="65" width="120" height="30" rx="6" fill="#3b82f6"/>
  <text x="660" y="85" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">Other Peers</text>
  <line x1="660" y1="95" x2="660" y2="560" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 1: Connect -->
  <line x1="145" y1="120" x2="395" y2="120" stroke="#e07020" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="270" y="115" text-anchor="middle" class="msg-type" fill="#e07020">1. POST /a2a/connect</text>
  <text x="270" y="130" text-anchor="middle" class="msg">{ identity: {name, session_id}, role, project, state, metadata }</text>
  <text x="270" y="142" text-anchor="middle" class="note">JWT from cookie OR API key in body</text>

  <!-- Step 2: Welcome + version info -->
  <line x1="395" y1="165" x2="145" y2="165" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="270" y="160" text-anchor="middle" class="msg-type" fill="#1a1a2e">2. WELCOME</text>
  <text x="270" y="175" text-anchor="middle" class="msg">{ agent_id, session_id, max_schema_versions: {mission:5, task:3} }</text>
  <text x="270" y="187" text-anchor="middle" class="note">Station tells twin what versions it supports</text>

  <!-- Step 3: Open SSE -->
  <line x1="145" y1="210" x2="395" y2="210" stroke="#e07020" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="270" y="205" text-anchor="middle" class="msg-type" fill="#e07020">3. GET /a2a/stream/{agent_id}</text>
  <text x="270" y="222" text-anchor="middle" class="note">SSE stream opens — push updates flow</text>

  <!-- Step 4: Announce twins (CIDs) -->
  <line x1="145" y1="250" x2="395" y2="250" stroke="#e07020" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="270" y="245" text-anchor="middle" class="msg-type" fill="#e07020">4. TWIN_ANNOUNCE</text>
  <text x="270" y="262" text-anchor="middle" class="msg">{ twins: [{type:'mission', id:'m1', cid:'bafyr..a', version:5}, ...] }</text>
  <text x="270" y="274" text-anchor="middle" class="note">Browser tells station which twins it has + their CIDs</text>

  <!-- Step 5: Station compares -->
  <rect x="345" y="290" width="110" height="30" rx="4" fill="#1a1a2e" opacity="0.1"/>
  <text x="400" y="308" text-anchor="middle" font-size="9" fill="#1a1a2e">Compare CIDs</text>
  <text x="400" y="320" text-anchor="middle" class="note">Same CID = in sync. Different = needs exchange.</text>

  <!-- Step 6: Delta sync -->
  <line x1="395" y1="340" x2="145" y2="340" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="270" y="335" text-anchor="middle" class="msg-type" fill="#1a1a2e">5. TWIN_DELTA</text>
  <text x="270" y="352" text-anchor="middle" class="msg">{ updated: [{twin with new CID}], conflicts: [{both versions}] }</text>
  <text x="270" y="364" text-anchor="middle" class="note">Only changed twins transferred — CID dedup</text>

  <!-- Step 7: Browser sends its updates -->
  <line x1="145" y1="385" x2="395" y2="385" stroke="#e07020" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="270" y="380" text-anchor="middle" class="msg-type" fill="#e07020">6. OBJECT_UPDATE (queued offline mutations)</text>
  <text x="270" y="397" text-anchor="middle" class="msg">{ twin, diff, cid_before, cid_after, signature }</text>
  <text x="270" y="409" text-anchor="middle" class="note">Mutations made while offline are replayed</text>

  <!-- Step 8: Station broadcasts to other peers -->
  <line x1="405" y1="430" x2="655" y2="430" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="530" y="425" text-anchor="middle" class="msg-type" fill="#1a1a2e">7. SSE broadcast</text>
  <text x="530" y="442" text-anchor="middle" class="msg">{ event: 'transition', twin_cid, actor }</text>
  <text x="530" y="454" text-anchor="middle" class="note">All connected peers get the update in real-time</text>

  <!-- Step 9: Version migration -->
  <rect x="50" y="470" width="700" height="55" rx="6" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="490" text-anchor="middle" font-size="11" font-weight="600" fill="#f59e0b">Version Negotiation (Step 5 detail)</text>
  <text x="400" y="506" text-anchor="middle" font-size="10" fill="#666">Twin at v5 docks at station supporting v3: station runs migration v3→v4→v5 from twin's DNA.</text>
  <text x="400" y="518" text-anchor="middle" font-size="10" fill="#666">Twin at v3 docks at station supporting v5: station upgrades twin using its own migration chain. Twin returns at v5.</text>

  <text x="400" y="550" text-anchor="middle" class="note">The twin teaches the station. The station teaches the twin. Both learn from the exchange.</text>

  <defs>
    <marker id="a1" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#e07020"/></marker>
    <marker id="a2" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#1a1a2e"/></marker>
    <marker id="a3" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#1a1a2e"/></marker>
  </defs>
</svg>
