<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; fill: #1a1a2e; }
    .subtitle { font-size: 12px; fill: #666; }
    .device-label { font-size: 12px; font-weight: 600; fill: #1a1a2e; }
    .twin-label { font-size: 9px; fill: #fff; font-weight: 500; }
    .note { font-size: 10px; fill: #666; }
    .protocol { font-size: 9px; fill: #e07020; font-weight: 600; }
  </style>

  <text x="450" y="28" text-anchor="middle" class="title">Peer-to-Peer Twin Network</text>
  <text x="450" y="46" text-anchor="middle" class="subtitle">No center. Stations are peers. Twins travel between devices. CID = universal address.</text>

  <!-- Thomas's Device -->
  <rect x="30" y="80" width="230" height="200" rx="10" fill="#e07020" opacity="0.1" stroke="#e07020" stroke-width="1.5"/>
  <text x="145" y="100" text-anchor="middle" class="device-label">Thomas's Device</text>
  <text x="50" y="120" font-size="10" fill="#666">Browser IndexedDB + A2A Client</text>

  <!-- Thomas's twins -->
  <rect x="50" y="135" width="90" height="26" rx="4" fill="#22c55e"/>
  <text x="95" y="152" text-anchor="middle" class="twin-label">MissionTwin v5</text>
  <rect x="150" y="135" width="90" height="26" rx="4" fill="#3b82f6"/>
  <text x="195" y="152" text-anchor="middle" class="twin-label">TaskTwin v3</text>
  <rect x="50" y="170" width="90" height="26" rx="4" fill="#8ab4f8"/>
  <text x="95" y="187" text-anchor="middle" class="twin-label">CapTwin v5</text>
  <rect x="150" y="170" width="90" height="26" rx="4" fill="#f59e0b"/>
  <text x="195" y="187" text-anchor="middle" class="twin-label">ProjectTwin v2</text>

  <text x="145" y="220" text-anchor="middle" font-size="10" fill="#e07020" font-weight="600">OWNER: thomas.pichler</text>
  <text x="145" y="235" text-anchor="middle" font-size="9" fill="#888">ed25519 key pair</text>
  <rect x="50" y="245" width="190" height="22" rx="4" fill="#e07020" opacity="0.2"/>
  <text x="145" y="260" text-anchor="middle" font-size="9" fill="#e07020">Twins persist here when offline</text>

  <!-- Robin's Device -->
  <rect x="30" y="330" width="230" height="180" rx="10" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="145" y="350" text-anchor="middle" class="device-label">Robin's Local Station</text>
  <text x="50" y="370" font-size="10" fill="#666">Full Mindspace instance + own DB</text>

  <rect x="50" y="385" width="90" height="26" rx="4" fill="#22c55e"/>
  <text x="95" y="402" text-anchor="middle" class="twin-label">MissionTwin v3</text>
  <rect x="150" y="385" width="90" height="26" rx="4" fill="#3b82f6"/>
  <text x="195" y="402" text-anchor="middle" class="twin-label">TaskTwin v3</text>
  <rect x="50" y="420" width="90" height="26" rx="4" fill="#ef4444"/>
  <text x="95" y="437" text-anchor="middle" class="twin-label">NEW TaskTwin v3</text>

  <text x="145" y="470" text-anchor="middle" font-size="10" fill="#3b82f6" font-weight="600">OWNER: robin</text>
  <text x="145" y="485" text-anchor="middle" font-size="9" fill="#888">Robin's twins at v3 (station at v3)</text>

  <!-- Hub Station (xp0.ai) -->
  <rect x="370" y="130" width="250" height="280" rx="10" fill="#1a1a2e" opacity="0.08" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="495" y="155" text-anchor="middle" class="device-label">xp0.ai Hub Station</text>
  <text x="390" y="175" font-size="10" fill="#666">mindspace.xpollination.earth</text>

  <rect x="390" y="195" width="100" height="20" rx="3" fill="#22c55e" opacity="0.7"/>
  <text x="440" y="209" text-anchor="middle" font-size="9" fill="#fff">Twin Cache</text>
  <rect x="500" y="195" width="100" height="20" rx="3" fill="#8b5cf6" opacity="0.7"/>
  <text x="550" y="209" text-anchor="middle" font-size="9" fill="#fff">Qdrant Index</text>
  <rect x="390" y="225" width="100" height="20" rx="3" fill="#f59e0b" opacity="0.7"/>
  <text x="440" y="239" text-anchor="middle" font-size="9" fill="#fff">Provenance Ledger</text>
  <rect x="500" y="225" width="100" height="20" rx="3" fill="#ef4444" opacity="0.7"/>
  <text x="550" y="239" text-anchor="middle" font-size="9" fill="#fff">Access Control</text>

  <!-- Cached twins at hub -->
  <text x="390" y="268" font-size="10" fill="#666">Cached twins (ALL versions):</text>
  <rect x="390" y="278" width="75" height="20" rx="3" fill="#22c55e" opacity="0.5"/>
  <text x="427" y="292" text-anchor="middle" font-size="8" fill="#fff">Mission v5</text>
  <rect x="470" y="278" width="75" height="20" rx="3" fill="#3b82f6" opacity="0.5"/>
  <text x="507" y="292" text-anchor="middle" font-size="8" fill="#fff">Task v3 ×508</text>
  <rect x="550" y="278" width="55" height="20" rx="3" fill="#8ab4f8" opacity="0.5"/>
  <text x="577" y="292" text-anchor="middle" font-size="8" fill="#fff">Cap v5</text>

  <text x="495" y="330" text-anchor="middle" font-size="10" fill="#1a1a2e" font-weight="600">NOT THE OWNER</text>
  <text x="495" y="345" text-anchor="middle" font-size="9" fill="#888">Station = cache + index + rendezvous</text>
  <text x="495" y="360" text-anchor="middle" font-size="9" fill="#888">If station dies → twins exist on devices</text>
  <text x="495" y="380" text-anchor="middle" font-size="9" fill="#888">New station → twins dock → network rebuilds</text>

  <!-- Future Station -->
  <rect x="700" y="200" width="170" height="120" rx="10" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="785" y="225" text-anchor="middle" class="device-label">Future Station</text>
  <text x="785" y="245" text-anchor="middle" font-size="9" fill="#666">Any new Mindspace</text>
  <text x="785" y="260" text-anchor="middle" font-size="9" fill="#666">instance joins the</text>
  <text x="785" y="275" text-anchor="middle" font-size="9" fill="#666">network. Twins dock</text>
  <text x="785" y="290" text-anchor="middle" font-size="9" fill="#666">automatically via CID.</text>

  <!-- Connections -->
  <line x1="260" y1="180" x2="370" y2="220" stroke="#e07020" stroke-width="2"/>
  <text x="310" y="190" class="protocol">A2A dock</text>

  <line x1="260" y1="410" x2="370" y2="330" stroke="#3b82f6" stroke-width="2"/>
  <text x="305" y="380" class="protocol">TWIN_SYNC</text>

  <line x1="620" y1="260" x2="700" y2="260" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="660" y="252" font-size="8" fill="#22c55e">federation</text>

  <!-- Version negotiation note -->
  <rect x="280" y="430" width="330" height="65" rx="6" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1"/>
  <text x="445" y="450" text-anchor="middle" font-size="11" font-weight="600" fill="#f59e0b">Version Negotiation</text>
  <text x="445" y="466" text-anchor="middle" font-size="9" fill="#666">Robin's MissionTwin v3 docks at hub (v5). Hub runs</text>
  <text x="445" y="479" text-anchor="middle" font-size="9" fill="#666">migration chain v3→v4→v5 in-memory. Robin gets v5 back.</text>
  <text x="445" y="492" text-anchor="middle" font-size="9" fill="#666">Robin's station learns v5 from the twin, not from deployment.</text>

  <text x="450" y="535" text-anchor="middle" class="note">Ownership: private (device) → public (xp0.ai) via signed OWNERSHIP_TRANSFER event. After transfer: persistent for all, forever.</text>
</svg>
