<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 520" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; fill: #1a1a2e; }
    .subtitle { font-size: 12px; fill: #666; }
    .phase-num { font-size: 16px; font-weight: 700; fill: #fff; }
    .phase-title { font-size: 10px; font-weight: 600; fill: #1a1a2e; }
    .phase-desc { font-size: 8px; fill: #666; }
    .enables { font-size: 8px; fill: #e07020; font-weight: 500; }
  </style>

  <text x="425" y="28" text-anchor="middle" class="title">Implementation Phases — From Bootstrap to P2P</text>
  <text x="425" y="46" text-anchor="middle" class="subtitle">Each phase is independently deployable. Database works throughout. Authority inverts gradually.</text>

  <!-- Phase 1 -->
  <rect x="30" y="70" width="120" height="100" rx="8" fill="#e07020" opacity="0.15" stroke="#e07020" stroke-width="2"/>
  <circle cx="55" cy="90" r="14" fill="#e07020"/>
  <text x="55" y="95" text-anchor="middle" class="phase-num">1</text>
  <text x="90" y="94" class="phase-title">Envelope</text>
  <text x="40" y="114" class="phase-desc">_schema_version</text>
  <text x="40" y="126" class="phase-desc">_cid (content hash)</text>
  <text x="40" y="138" class="phase-desc">_provenance</text>
  <text x="40" y="156" class="enables">→ twin sovereignty</text>

  <!-- Phase 2 -->
  <rect x="170" y="70" width="120" height="100" rx="8" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="195" cy="90" r="14" fill="#f59e0b"/>
  <text x="195" y="95" text-anchor="middle" class="phase-num">2</text>
  <text x="230" y="94" class="phase-title">Migration</text>
  <text x="180" y="114" class="phase-desc">Schema versions per type</text>
  <text x="180" y="126" class="phase-desc">migrateTwin(v1→v5)</text>
  <text x="180" y="138" class="phase-desc">Auto-upgrade on read</text>
  <text x="180" y="156" class="enables">→ self-healing schema</text>

  <!-- Phase 3 -->
  <rect x="310" y="70" width="120" height="100" rx="8" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="335" cy="90" r="14" fill="#3b82f6"/>
  <text x="335" y="95" text-anchor="middle" class="phase-num">3</text>
  <text x="370" y="94" class="phase-title">Write Path</text>
  <text x="320" y="114" class="phase-desc">OBJECT_CREATE handler</text>
  <text x="320" y="126" class="phase-desc">OBJECT_UPDATE handler</text>
  <text x="320" y="138" class="phase-desc">CID-based concurrency</text>
  <text x="320" y="156" class="enables">→ twin writes to station</text>

  <!-- Connections 1→2, 1→3 (parallel) -->
  <line x1="150" y1="120" x2="170" y2="120" stroke="#666" stroke-width="1.5" marker-end="url(#pa)"/>
  <line x1="150" y1="130" x2="170" y2="170" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Phase 4 -->
  <rect x="170" y="200" width="120" height="100" rx="8" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="2"/>
  <circle cx="195" cy="220" r="14" fill="#22c55e"/>
  <text x="195" y="225" text-anchor="middle" class="phase-num">4</text>
  <text x="230" y="224" class="phase-title">Provenance</text>
  <text x="180" y="244" class="phase-desc">twin_events table</text>
  <text x="180" y="256" class="phase-desc">Signed events (ed25519)</text>
  <text x="180" y="268" class="phase-desc">Merkle DAG chain</text>
  <text x="180" y="286" class="enables">→ forge-proof attribution</text>

  <!-- Phase 5 -->
  <rect x="310" y="200" width="120" height="100" rx="8" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="2"/>
  <circle cx="335" cy="220" r="14" fill="#8b5cf6"/>
  <text x="335" y="225" text-anchor="middle" class="phase-num">5</text>
  <text x="370" y="224" class="phase-title">Edge Persist</text>
  <text x="320" y="244" class="phase-desc">Browser IndexedDB</text>
  <text x="320" y="256" class="phase-desc">Offline mutations</text>
  <text x="320" y="268" class="phase-desc">Sync on reconnect</text>
  <text x="320" y="286" class="enables">→ device ownership</text>

  <!-- Phase 6 -->
  <rect x="450" y="200" width="120" height="100" rx="8" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="2"/>
  <circle cx="475" cy="220" r="14" fill="#ef4444"/>
  <text x="475" y="225" text-anchor="middle" class="phase-num">6</text>
  <text x="510" y="224" class="phase-title">Authority Flip</text>
  <text x="460" y="244" class="phase-desc">twin_json = source of truth</text>
  <text x="460" y="256" class="phase-desc">DB columns = cache</text>
  <text x="460" y="268" class="phase-desc">Dual-write transition</text>
  <text x="460" y="286" class="enables">→ station as cache</text>

  <!-- Connections 3→4,5,6 (parallel) -->
  <line x1="370" y1="170" x2="230" y2="200" stroke="#666" stroke-width="1"/>
  <line x1="370" y1="170" x2="370" y2="200" stroke="#666" stroke-width="1"/>
  <line x1="370" y1="170" x2="510" y2="200" stroke="#666" stroke-width="1"/>

  <!-- Phase 7 -->
  <rect x="450" y="340" width="120" height="100" rx="8" fill="#14b8a6" opacity="0.15" stroke="#14b8a6" stroke-width="2"/>
  <circle cx="475" cy="360" r="14" fill="#14b8a6"/>
  <text x="475" y="365" text-anchor="middle" class="phase-num">7</text>
  <text x="510" y="364" class="phase-title">Negotiate</text>
  <text x="460" y="384" class="phase-desc">v5 twin docks at v3 station</text>
  <text x="460" y="396" class="phase-desc">Forward compat rules</text>
  <text x="460" y="408" class="phase-desc">Unknown field preserve</text>
  <text x="460" y="426" class="enables">→ heterogeneous network</text>

  <!-- Phase 8 -->
  <rect x="600" y="340" width="200" height="100" rx="8" fill="#1a1a2e" opacity="0.1" stroke="#1a1a2e" stroke-width="2"/>
  <circle cx="625" cy="360" r="14" fill="#1a1a2e"/>
  <text x="625" y="365" text-anchor="middle" class="phase-num">8</text>
  <text x="670" y="364" class="phase-title">P2P Federation</text>
  <text x="610" y="384" class="phase-desc">TWIN_SYNC: station-to-station</text>
  <text x="610" y="396" class="phase-desc">CID-based delta exchange</text>
  <text x="610" y="408" class="phase-desc">Conflict resolution (merge/flag)</text>
  <text x="610" y="426" class="enables">→ peer-to-peer knowledge network</text>

  <!-- Connections to 7,8 -->
  <line x1="510" y1="300" x2="510" y2="340" stroke="#666" stroke-width="1"/>
  <line x1="290" y1="300" x2="510" y2="340" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="370" y1="300" x2="510" y2="340" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="570" y1="390" x2="600" y2="390" stroke="#666" stroke-width="1.5" marker-end="url(#pa)"/>

  <!-- End state -->
  <rect x="30" y="460" width="770" height="40" rx="6" fill="#1a1a2e" opacity="0.05" stroke="#1a1a2e"/>
  <text x="425" y="480" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a2e">End State: No database authority. Twins are sovereign. Stations are peers. Math is trust. Network is resilient.</text>
  <text x="425" y="496" text-anchor="middle" font-size="10" fill="#666">Phases 1-3: foundation | Phases 4-6: parallel after 3 | Phases 7-8: sequential, last</text>

  <defs><marker id="pa" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#666"/></marker></defs>
</svg>
