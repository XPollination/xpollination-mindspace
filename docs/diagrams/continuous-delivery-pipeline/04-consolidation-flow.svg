<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a5568"/>
    </marker>
    <marker id="ar-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#48bb78"/>
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a202c">Branch Consolidation Flow</text>

  <!-- Step 1: 100 branches -->
  <rect x="40" y="60" width="200" height="65" rx="8" fill="#edf2f7" stroke="#a0aec0" stroke-width="2"/>
  <text x="140" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d3748">100 Feature Branches</text>
  <text x="140" y="103" text-anchor="middle" font-size="10" fill="#718096">All on remote, develop untouched</text>
  <text x="140" y="117" text-anchor="middle" font-size="9" fill="#a0aec0">feature/task-slug-1..100</text>

  <line x1="240" y1="92" x2="290" y2="92" stroke="#4a5568" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Step 2: Create merge tasks -->
  <rect x="295" y="60" width="200" height="65" rx="8" fill="#ebf8ff" stroke="#4299e1" stroke-width="2"/>
  <text x="395" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6cb0">Create Merge Tasks</text>
  <text x="395" y="103" text-anchor="middle" font-size="10" fill="#4a7fb5">1 task per branch</text>
  <text x="395" y="117" text-anchor="middle" font-size="9" fill="#4a7fb5">feature_branch in DNA</text>

  <line x1="495" y1="92" x2="545" y2="92" stroke="#4a5568" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Step 3: LIAISON processes -->
  <rect x="550" y="60" width="210" height="65" rx="8" fill="#fffaf0" stroke="#ed8936" stroke-width="2"/>
  <text x="655" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#c05621">LIAISON Autonomous</text>
  <text x="655" y="103" text-anchor="middle" font-size="10" fill="#dd6b20">--wait → claim → review</text>
  <text x="655" y="117" text-anchor="middle" font-size="9" fill="#dd6b20">Auto mode, sequential</text>

  <!-- Per-branch processing -->
  <rect x="100" y="170" width="600" height="130" rx="10" fill="#f7fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="192" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a5568">Per Branch (repeated 100x)</text>

  <!-- gh pr create -->
  <rect x="120" y="205" width="120" height="40" rx="6" fill="#fff" stroke="#a0aec0" stroke-width="1"/>
  <text x="180" y="222" text-anchor="middle" font-size="10" font-weight="bold" fill="#4a5568">gh pr create</text>
  <text x="180" y="237" text-anchor="middle" font-size="8" fill="#718096">feature→develop</text>

  <line x1="240" y1="225" x2="270" y2="225" stroke="#4a5568" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- gh pr diff -->
  <rect x="275" y="205" width="120" height="40" rx="6" fill="#fff" stroke="#a0aec0" stroke-width="1"/>
  <text x="335" y="222" text-anchor="middle" font-size="10" font-weight="bold" fill="#4a5568">gh pr diff</text>
  <text x="335" y="237" text-anchor="middle" font-size="8" fill="#718096">Review vs PDSA</text>

  <line x1="395" y1="225" x2="425" y2="225" stroke="#4a5568" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Decision -->
  <polygon points="475,205 520,225 475,245 430,225" fill="#fefcbf" stroke="#d69e2e" stroke-width="1.5"/>
  <text x="475" y="228" text-anchor="middle" font-size="9" font-weight="bold" fill="#744210">OK?</text>

  <!-- Merge -->
  <line x1="520" y1="225" x2="560" y2="225" stroke="#48bb78" stroke-width="1.5" marker-end="url(#ar-g)"/>
  <rect x="565" y="205" width="120" height="40" rx="6" fill="#f0fff4" stroke="#48bb78" stroke-width="1.5"/>
  <text x="625" y="222" text-anchor="middle" font-size="10" font-weight="bold" fill="#276749">gh pr merge</text>
  <text x="625" y="237" text-anchor="middle" font-size="8" fill="#48bb78">--delete-branch</text>

  <!-- Rework -->
  <line x1="475" y1="245" x2="475" y2="275" stroke="#e53e3e" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="500" y="265" font-size="8" fill="#e53e3e">rework</text>
  <rect x="415" y="275" width="120" height="20" rx="4" fill="#fff5f5" stroke="#e53e3e" stroke-width="1"/>
  <text x="475" y="289" text-anchor="middle" font-size="8" fill="#c53030">→ rework task for dev</text>

  <!-- Result -->
  <line x1="400" y1="300" x2="400" y2="330" stroke="#4a5568" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="250" y="335" width="300" height="65" rx="8" fill="#ebf8ff" stroke="#4299e1" stroke-width="2"/>
  <text x="400" y="358" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b6cb0">develop = Integrated</text>
  <text x="400" y="376" text-anchor="middle" font-size="10" fill="#4a7fb5">All features merged, beta shows result</text>
  <text x="400" y="392" text-anchor="middle" font-size="10" fill="#4a7fb5">Thomas reviews → release/v0.0.X → main</text>
</svg>
