<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a5568"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#48bb78"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e53e3e"/>
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a202c">PR Merge Gate — Hard Gate on review→complete</text>

  <!-- Entry: review+liaison -->
  <rect x="300" y="50" width="200" height="50" rx="8" fill="#ebf8ff" stroke="#4299e1" stroke-width="2"/>
  <text x="400" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b6cb0">review + liaison</text>
  <text x="400" y="90" text-anchor="middle" font-size="10" fill="#4a7fb5">Task arrives for completion</text>

  <!-- Decision: feature_branch? -->
  <polygon points="400,120 480,155 400,190 320,155" fill="#fefcbf" stroke="#d69e2e" stroke-width="2"/>
  <text x="400" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="#744210">feature_branch?</text>

  <line x1="400" y1="100" x2="400" y2="120" stroke="#4a5568" stroke-width="2" marker-end="url(#arr)"/>

  <!-- NO path (left) -->
  <line x1="320" y1="155" x2="160" y2="155" stroke="#718096" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="240" y="147" text-anchor="middle" font-size="10" fill="#718096">NO</text>

  <rect x="40" y="130" width="120" height="50" rx="8" fill="#f0fff4" stroke="#48bb78" stroke-width="2"/>
  <text x="100" y="152" text-anchor="middle" font-size="12" font-weight="bold" fill="#276749">complete</text>
  <text x="100" y="168" text-anchor="middle" font-size="9" fill="#48bb78">Existing flow</text>

  <!-- YES path (down) -->
  <line x1="400" y1="190" x2="400" y2="220" stroke="#4a5568" stroke-width="2" marker-end="url(#arr)"/>
  <text x="415" y="208" font-size="10" fill="#4a5568">YES</text>

  <!-- Step 1: Create/Find PR -->
  <rect x="300" y="220" width="200" height="45" rx="8" fill="#fff" stroke="#a0aec0" stroke-width="1.5"/>
  <text x="400" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d3748">1. Create/Find PR</text>
  <text x="400" y="255" text-anchor="middle" font-size="9" fill="#718096">gh pr create --base develop</text>

  <line x1="400" y1="265" x2="400" y2="285" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Review Diff -->
  <rect x="300" y="285" width="200" height="45" rx="8" fill="#fff" stroke="#a0aec0" stroke-width="1.5"/>
  <text x="400" y="305" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d3748">2. Review PR Diff</text>
  <text x="400" y="320" text-anchor="middle" font-size="9" fill="#718096">gh pr diff — check vs PDSA</text>

  <line x1="400" y1="330" x2="400" y2="350" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decision: Merge or Rework? -->
  <polygon points="400,350 480,385 400,420 320,385" fill="#fefcbf" stroke="#d69e2e" stroke-width="2"/>
  <text x="400" y="388" text-anchor="middle" font-size="11" font-weight="bold" fill="#744210">Verdict?</text>

  <!-- MERGE path (right) -->
  <line x1="480" y1="385" x2="570" y2="385" stroke="#48bb78" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="525" y="377" text-anchor="middle" font-size="10" font-weight="bold" fill="#48bb78">MERGE</text>

  <rect x="575" y="355" width="200" height="65" rx="8" fill="#f0fff4" stroke="#276749" stroke-width="2"/>
  <text x="675" y="375" text-anchor="middle" font-size="11" font-weight="bold" fill="#276749">complete</text>
  <text x="675" y="393" text-anchor="middle" font-size="9" fill="#48bb78">pr_review_verdict = merge</text>
  <text x="675" y="406" text-anchor="middle" font-size="9" fill="#48bb78">pr_merge_sha = abc1234</text>

  <!-- REWORK path (left) -->
  <line x1="320" y1="385" x2="210" y2="385" stroke="#e53e3e" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="265" y="377" text-anchor="middle" font-size="10" font-weight="bold" fill="#e53e3e">REWORK</text>

  <rect x="40" y="355" width="170" height="65" rx="8" fill="#fff5f5" stroke="#e53e3e" stroke-width="2"/>
  <text x="125" y="375" text-anchor="middle" font-size="11" font-weight="bold" fill="#c53030">rework + dev</text>
  <text x="125" y="393" text-anchor="middle" font-size="9" fill="#e53e3e">pr_rework_reason set</text>
  <text x="125" y="406" text-anchor="middle" font-size="9" fill="#e53e3e">verdict + sha cleared</text>

  <!-- Gate Box -->
  <rect x="250" y="445" width="300" height="45" rx="6" fill="#f7fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="400" y="462" text-anchor="middle" font-size="10" font-weight="bold" fill="#e53e3e">ENGINE GATE (blocks without):</text>
  <text x="400" y="478" text-anchor="middle" font-size="9" fill="#4a5568">pr_url + verdict=merge + reasoning(50+) + merge_sha</text>
</svg>
