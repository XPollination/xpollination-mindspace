<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a5568"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#48bb78"/>
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a202c">Environment Architecture</text>

  <!-- Git Layer -->
  <rect x="30" y="50" width="740" height="80" rx="10" fill="#f7fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="72" font-size="11" font-weight="bold" fill="#718096">GIT</text>

  <!-- Feature branches -->
  <rect x="50" y="80" width="140" height="35" rx="6" fill="#edf2f7" stroke="#a0aec0" stroke-width="1.5"/>
  <text x="120" y="102" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a5568">feature/*</text>

  <line x1="190" y1="97" x2="290" y2="97" stroke="#4299e1" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="240" y="90" text-anchor="middle" font-size="9" fill="#4299e1">PR merge</text>

  <!-- Develop -->
  <rect x="295" y="80" width="140" height="35" rx="6" fill="#ebf8ff" stroke="#4299e1" stroke-width="2"/>
  <text x="365" y="102" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6cb0">develop</text>

  <line x1="435" y1="97" x2="535" y2="97" stroke="#48bb78" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="485" y="90" text-anchor="middle" font-size="9" fill="#276749">release</text>

  <!-- Main -->
  <rect x="540" y="80" width="140" height="35" rx="6" fill="#f0fff4" stroke="#276749" stroke-width="2"/>
  <text x="610" y="102" text-anchor="middle" font-size="11" font-weight="bold" fill="#276749">main</text>

  <!-- Server Layer -->
  <rect x="30" y="155" width="740" height="200" rx="10" fill="#f7fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="177" font-size="11" font-weight="bold" fill="#718096">HETZNER CX22</text>

  <!-- BETA Environment -->
  <rect x="200" y="195" width="220" height="140" rx="8" fill="#ebf8ff" stroke="#4299e1" stroke-width="2"/>
  <text x="310" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6cb0">BETA / DEV</text>
  <text x="310" y="240" text-anchor="middle" font-size="10" fill="#4a7fb5">beta-mindspace.xpollination.earth</text>
  <line x1="220" y1="250" x2="400" y2="250" stroke="#bee3f8" stroke-width="1"/>
  <text x="230" y="268" font-size="10" fill="#4a5568">Port: 4201</text>
  <text x="230" y="284" font-size="10" fill="#4a5568">Branch: develop</text>
  <text x="230" y="300" font-size="10" fill="#4a5568">Service: mindspace-beta</text>
  <text x="230" y="316" font-size="10" fill="#4a5568">Worktree: mcp-server-beta</text>

  <!-- PROD Environment -->
  <rect x="470" y="195" width="220" height="140" rx="8" fill="#f0fff4" stroke="#276749" stroke-width="2"/>
  <text x="580" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#276749">PRODUCTION</text>
  <text x="580" y="240" text-anchor="middle" font-size="10" fill="#48bb78">mindspace.xpollination.earth</text>
  <line x1="490" y1="250" x2="670" y2="250" stroke="#c6f6d5" stroke-width="1"/>
  <text x="500" y="268" font-size="10" fill="#4a5568">Port: 4200</text>
  <text x="500" y="284" font-size="10" fill="#4a5568">Branch: main</text>
  <text x="500" y="300" font-size="10" fill="#4a5568">Service: mindspace-test</text>
  <text x="500" y="316" font-size="10" fill="#4a5568">Worktree: mcp-server-test</text>

  <!-- Arrows from branches to environments -->
  <path d="M 365 115 Q 365 155 310 190" stroke="#4299e1" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#a)"/>
  <path d="M 610 115 Q 610 155 580 190" stroke="#48bb78" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#ag)"/>

  <!-- .env.template note -->
  <rect x="40" y="210" width="140" height="55" rx="6" fill="#fffaf0" stroke="#ed8936" stroke-width="1.5"/>
  <text x="110" y="230" text-anchor="middle" font-size="10" font-weight="bold" fill="#c05621">.env.template</text>
  <text x="110" y="246" text-anchor="middle" font-size="9" fill="#c05621">Zero-knowledge</text>
  <text x="110" y="258" text-anchor="middle" font-size="9" fill="#c05621">deployment (CMM3)</text>
</svg>
