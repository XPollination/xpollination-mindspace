# Mindspace Docker Compose — Production (full stack)
#
# Runs the complete Mindspace system in Docker:
#   qdrant (6333) → brain (3200) → mindspace (API 3100 + viz 4200)
#
# Health-checked startup order ensures each service is ready before
# the next one starts. All data on bind mounts (survives container
# destruction). restart: unless-stopped handles reboots.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Requires .env with: BRAIN_API_KEY, JWT_SECRET, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mindspace-qdrant
    ports:
      - "10.33.33.1:6333:6333"
    volumes:
      - /mnt/HC_Volume_105173237/mindspace/qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  brain:
    build:
      context: .
      dockerfile: Dockerfile.brain
    container_name: mindspace-brain
    ports:
      - "3200:3200"
    volumes:
      - /mnt/HC_Volume_105173237/mindspace/brain-data:/app/data
    environment:
      - NODE_ENV=production
      - QDRANT_URL=http://qdrant:6333
      - BRAIN_API_KEY=${BRAIN_API_KEY:-changeme}
      - BRAIN_PUBLIC_URL=https://hive.xpollination.earth
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3200/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  mindspace:
    build: .
    container_name: mindspace-prod
    ports:
      - "10.33.33.1:3100:3100"
      - "10.33.33.1:4200:4200"
    volumes:
      - /mnt/HC_Volume_105173237/mindspace/data-prod:/app/data
      - /home/developer/workspaces/github/PichlerThomas:/workspace:ro
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/mindspace.db
      - API_PORT=3100
      - VIZ_PORT=4200
      - XPO_WORKSPACE_PATH=/workspace
      - BRAIN_API_URL=http://brain:3200
      - BRAIN_API_KEY=${BRAIN_API_KEY:-changeme}
      - JWT_SECRET=${JWT_SECRET:-changeme}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=https://mindspace.xpollination.earth/api/auth/oauth/google/callback
      - FRONTEND_URL=https://mindspace.xpollination.earth
    depends_on:
      brain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3100/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
