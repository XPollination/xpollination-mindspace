# Mindspace Docker Compose — Production (Brain + Qdrant only)
#
# Viz (4200) and API (3100) are served by systemd services on the host.
# Only brain and qdrant remain in Docker.
#
# Startup order: qdrant (healthy) → brain
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mindspace-qdrant
    ports:
      - "10.33.33.1:6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  brain:
    build:
      context: ./brain
      dockerfile: Dockerfile
    container_name: mindspace-brain
    ports:
      - "10.33.33.1:3200:3200"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - BRAIN_API_KEY=${BRAIN_API_KEY:-changeme}
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3200/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  qdrant-data:
    driver: local
