# Mindspace Docker Compose — Dev Standalone
#
# Runs only the mindspace service on dev ports.
# Brain (3200) and Qdrant (6333) are already running on the host.
# startup.sh waits for Brain API before running migrations.
#
# Usage:
#   docker compose -f docker-compose.dev-standalone.yml up --build
#
# Ports:
#   API:  3101 (dev)
#   Viz:  4201 (dev)

services:
  mindspace:
    build: .
    ports:
      - "3101:3101"
      - "4201:4201"
    volumes:
      - mindspace-dev-data:/app/data
      - ${XPO_WORKSPACE_PATH:-.}:/workspace
    environment:
      - NODE_ENV=development
      - DATABASE_PATH=/app/data/mindspace.db
      - API_PORT=3101
      - VIZ_PORT=4201
      - XPO_WORKSPACE_PATH=/workspace
      - BRAIN_API_URL=http://host.docker.internal:3200
      - BRAIN_API_KEY=${BRAIN_API_KEY:-changeme}
      - JWT_SECRET=${JWT_SECRET:-xpo-dev-jwt-secret-2026}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3101/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: "no"

volumes:
  mindspace-dev-data:
    driver: local
